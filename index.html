<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題作成サイト</title>
  <style>
    :root{
      --bg1:#f8faff;
      --bg2:#eef2f8;
      --panel:#ffffff;
      --line:#d8dbe5;
      --text:#1f2430;
      --muted:#6b7280;
      --accent:#2f6fed;
      --accent2:#1f5ad1;
      --good:#118a3a;
      --bad:#d33c3c;
      --radius:18px;
      --shadow:0 12px 30px rgba(20,25,40,.08);
    }

    body.dark{
      --bg1:#0b1120;
      --bg2:#111827;
      --panel:#111827;
      --line:#243043;
      --text:#e7ecf7;
      --muted:#9aa4b2;
      --accent:#5b8cff;
      --accent2:#7aa2ff;
      --good:#39c66d;
      --bad:#ff7676;
      --shadow:0 12px 30px rgba(0,0,0,.26);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    button,input,textarea{font:inherit}
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
    }

    a{color:inherit}

    .page{
      max-width:980px;
      margin:0 auto;
      padding:16px;
      min-height:100vh;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      position:sticky;
      top:0;
      padding:8px 0 12px;
      backdrop-filter:blur(8px);
      z-index:5;
    }

    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.1;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(15,23,42,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .hero{
      max-width:860px;
      margin:36px auto 0;
      display:grid;
      gap:16px;
    }

    .bigBtn,.primary{
      background:var(--accent);
      color:#fff;
      font-weight:800;
    }

    .ghost{
      background:#eef3ff;
      color:#244a9c;
      border:1px solid #d7e2ff;
      font-weight:700;
    }

    body.dark .ghost{
      background:#182133;
      color:#d7e5ff;
      border-color:#2d3a4f;
    }

    .danger{
      background:#ffeded;
      color:#a72b2b;
      border:1px solid #ffc7c7;
      font-weight:800;
    }

    body.dark .danger{
      background:#2a1620;
      color:#ffaaaa;
      border-color:#5b2a39;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .input{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 15px;
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .input:focus{
      border-color:#9ab8ff;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }

    .label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .gridEditor{
      display:grid;
      grid-template-columns:64px 1fr;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      min-height:420px;
      background:var(--panel);
    }

    .gutter{
      background:rgba(127,127,127,.07);
      border-right:1px solid var(--line);
      padding:14px 10px 14px 0;
      text-align:right;
      color:#8a93a8;
      font:600 14px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      user-select:none;
      overflow:hidden;
    }

    .textarea{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:14px;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      overflow:auto;
      tab-size:2;
      background:var(--panel);
      color:var(--text);
    }

    .help,.note{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .quiz{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .progress{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .sectionText{
      font-size:18px;
      font-weight:900;
      line-height:1.35;
      color:#334155;
      word-break:break-word;
    }

    body.dark .sectionText{
      color:#d7def0;
    }

    .question{
      font-size:clamp(22px,4vw,32px);
      font-weight:900;
      line-height:1.4;
      word-break:break-word;
    }

    .answer{
      width:100%;
      font-size:18px;
      padding:16px;
      border-radius:16px;
      border:1px solid var(--line);
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .submit{
      background:var(--accent);
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .next{
      background:#1c9c59;
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .good{
      border:1px solid rgba(17,138,58,.22);
      background:#effaf3;
      color:var(--good);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }

    .bad{
      border:1px solid rgba(211,60,60,.22);
      background:#fff3f3;
      color:var(--bad);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }

    .explain{
      background:#f8faff;
      border:1px solid #dbe4fb;
      padding:14px 16px;
      border-radius:16px;
      line-height:1.8;
      word-break:break-word;
      color:#2b3241;
    }

    body.dark .explain{
      background:#182133;
      border-color:#2d3a4f;
      color:#e7ecf7;
    }

    .summary{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .score{
      font-size:28px;
      font-weight:1000;
      line-height:1.2;
    }

    .reviewList{
      display:grid;
      gap:10px;
    }

    .reviewItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 15px;
      background:var(--panel);
      display:grid;
      gap:6px;
    }

    .reviewSection{
      font-size:15px;
      font-weight:900;
      color:#334155;
      line-height:1.4;
    }

    body.dark .reviewSection{
      color:#d7def0;
    }

    .reviewQ{
      font-weight:900;
      font-size:16px;
      word-break:break-word;
    }

    .reviewA{
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .listGrid{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      box-shadow:var(--shadow);
      padding:14px 15px;
    }

    .listMeta{
      min-width:0;
      display:grid;
      gap:4px;
      flex:1;
    }

    .listActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .miniAction{
      padding:10px 12px;
      font-size:13px;
      border-radius:12px;
      white-space:nowrap;
    }

    .metaLine{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    @media (max-width:640px){
      .page{padding:14px}
      .title{font-size:22px}
      .gridEditor{grid-template-columns:52px 1fr;min-height:380px}
      .question{font-size:22px}
      .answer{font-size:16px}
      .bigBtn{width:100%}
      .actions{justify-content:stretch}
      .actions button{flex:1}
      .topbar{align-items:flex-start}
      .listItem{align-items:flex-start;flex-direction:column}
      .listActions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsiyr6pq0CLo4dT2c7QtoshZBqBKsviwE",
      authDomain: "quiz-f46d6.firebaseapp.com",
      projectId: "quiz-f46d6",
      storageBucket: "quiz-f46d6.firebasestorage.app",
      messagingSenderId: "75573053604",
      appId: "1:75573053604:web:6b20006ca68e685e18fe31",
      measurementId: "G-KQVMD2YYDP"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const db = getFirestore(appFirebase);

    const root = document.getElementById("app");
    if (!root) throw new Error('Missing <div id="app"></div>');

    const COLLECTION = "quizzes";
    const OWNER_COOKIE = "qb_owner_token";
    const LIST_KEY = "qb_my_quizzes";

    const state = {
      screen: "loading",
      docId: "",
      doc: null,
      draft: null,
      quiz: {
        phase: "question",
        order: [],
        index: 0,
        typedAnswer: "",
        lastResult: null,
        attempts: {}
      }
    };

    let resultEnterHandler = null;
    const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");

    function uid() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID().replace(/-/g, "");
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function slugify(text) {
      return (text || "quiz")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^\p{L}\p{N}\-]+/gu, "")
        .replace(/\-+/g, "-")
        .replace(/^-+|-+$/g, "") || "quiz";
    }

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function norm(s) {
      return String(s ?? "")
        .replace(/\u3000/g, " ")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase();
    }

    function splitAnswers(text) {
      return String(text ?? "")
        .split(/[、,]/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function parseLine(line) {
      const raw = String(line ?? "").trim();
      if (!raw) return null;

      const hasEq = raw.includes("=") || raw.includes("＝");
      if (!hasEq) {
        return { kind: "section", text: raw };
      }

      const parts = raw.split(/[=＝]/).map(v => v.trim());
      if (parts.length < 2) return null;

      const question = parts[0];
      if (!question) return null;

      let answerText = "";
      if ((parts[1] || "").toLowerCase() === "choice") {
        answerText = parts.slice(2).join("=");
      } else {
        answerText = parts.slice(1).join("=");
      }

      const answers = splitAnswers(answerText);
      if (!answers.length) return null;

      return { kind: "item", question, answers };
    }

    function parseItems(text) {
      const lines = String(text ?? "").split(/\r?\n/);
      const items = [];
      let currentSection = "";

      for (const line of lines) {
        const parsed = parseLine(line);
        if (!parsed) continue;

        if (parsed.kind === "section") {
          currentSection = parsed.text;
          continue;
        }

        items.push({
          section: currentSection,
          question: parsed.question,
          answers: parsed.answers,
          rawLine: line.trim()
        });
      }

      return items;
    }

    function itemsToRawText(items) {
      const lines = [];
      let lastSection = null;

      for (const item of items || []) {
        if (item.section && item.section !== lastSection) {
          lines.push(item.section);
          lastSection = item.section;
        }
        lines.push(`${item.question}=${(item.answers || []).join(",")}`);
      }

      return lines.join("\n");
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setCookie(name, value, days = 3650) {
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`;
    }

    function getCookie(name) {
      const parts = document.cookie ? document.cookie.split("; ") : [];
      for (const part of parts) {
        const idx = part.indexOf("=");
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : "");
      }
      return "";
    }

    function safeLocalGet(key) {
      try { return localStorage.getItem(key); } catch { return null; }
    }

    function safeLocalSet(key, value) {
      try { localStorage.setItem(key, value); } catch {}
    }

    function loadMyQuizList() {
      try {
        const raw = safeLocalGet(LIST_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch {
        return [];
      }
    }

    function saveMyQuizList(list) {
      safeLocalSet(LIST_KEY, JSON.stringify(list.slice(0, 50)));
    }

    function upsertMyQuizMeta(meta) {
      const list = loadMyQuizList();
      const id = String(meta?.id || "");
      if (!id) return;

      const next = {
        id,
        title: String(meta.title || ""),
        subtitle: String(meta.subtitle || ""),
        createdAt: Number(meta.createdAt || Date.now()),
        updatedAt: Number(meta.updatedAt || Date.now())
      };

      const idx = list.findIndex(v => v.id === id);
      if (idx >= 0) {
        list[idx] = { ...list[idx], ...next };
      } else {
        list.unshift(next);
      }

      list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      saveMyQuizList(list);
    }

    function removeMyQuizMeta(id) {
      const next = loadMyQuizList().filter(v => v.id !== id);
      saveMyQuizList(next);
    }

    function normalizeTs(value) {
      if (typeof value === "number") return value;
      if (!value) return null;
      if (typeof value.toDate === "function") {
        const d = value.toDate();
        return d instanceof Date ? d.getTime() : null;
      }
      if (typeof value.seconds === "number") {
        return value.seconds * 1000 + Math.floor((value.nanoseconds || 0) / 1e6);
      }
      return null;
    }

    function formatMinute(value) {
      const ts = normalizeTs(value);
      if (!ts) return "—";
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function applySystemTheme() {
      document.body.classList.toggle("dark", !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches));
    }

    function clearResultEnterHandler() {
      if (resultEnterHandler) {
        window.removeEventListener("keydown", resultEnterHandler);
        resultEnterHandler = null;
      }
    }

    function enableResultEnterHandler() {
      clearResultEnterHandler();

      const isDesktop = window.matchMedia && window.matchMedia("(pointer:fine)").matches && window.innerWidth >= 700;
      if (!isDesktop) return;

      resultEnterHandler = (e) => {
        if (e.key !== "Enter") return;
        const active = document.activeElement;
        if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) return;
        e.preventDefault();
        nextQuestion();
      };

      window.addEventListener("keydown", resultEnterHandler);
    }

    function basePath() {
      const p = location.pathname;
      if (p.endsWith("/")) return p;
      const i = p.lastIndexOf("/");
      return i >= 0 ? p.slice(0, i + 1) : "/";
    }

    function prettyLink(id) {
      return `${location.origin}${basePath()}#/${encodeURIComponent(id)}`;
    }

    function editLink(id) {
      return `${location.origin}${basePath()}#/edit/${encodeURIComponent(id)}`;
    }

    function route() {
      const raw = location.hash.replace(/^#/, "");
      const parts = raw.split("/").filter(Boolean);
      if (!parts.length) return { name: "home" };
      if (parts[0] === "create") return { name: "create" };
      if (parts[0] === "edit" && parts[1]) return { name: "edit", id: decodeURIComponent(parts[1]) };
      return { name: "quiz", id: decodeURIComponent(parts[0]) };
    }

    function isOwner() {
      return !!(state.doc?.ownerToken && getCookie(OWNER_COOKIE) === state.doc.ownerToken);
    }

    function keyUnlocked() {
      return !!(state.docId && getCookie(`qb_key_${state.docId}`) === "1");
    }

    function canEdit() {
      if (!state.doc) return false;
      if (state.doc.keyMode === "open") return true;
      return isOwner() || keyUnlocked();
    }

    function currentQuestion() {
      if (!state.doc?.items?.length) return null;
      const idx = state.quiz.order[state.quiz.index];
      if (idx === undefined) return null;
      return { idx, item: state.doc.items[idx] };
    }

    function blankDraft() {
      return {
        title: "",
        subtitle: "",
        rawText: "",
        keyMode: "key",
        key: ""
      };
    }

    function openEditFromDoc() {
      state.draft = {
        title: state.doc?.title || "",
        subtitle: state.doc?.subtitle || "",
        rawText: itemsToRawText(state.doc?.items || []),
        keyMode: state.doc?.keyMode || "key",
        key: state.doc?.key || ""
      };
      state.screen = "editor";
      render();
    }

    function startQuiz(docData, id) {
      state.doc = docData;
      state.docId = id;
      state.quiz = {
        phase: "question",
        order: shuffle((docData.items || []).map((_, i) => i)),
        index: 0,
        typedAnswer: "",
        lastResult: null,
        attempts: {}
      };
      state.screen = "quiz";
      document.title = docData.title ? `${docData.title} | 問題作成サイト` : "問題作成サイト";

      if (isOwner()) {
        upsertMyQuizMeta({
          id,
          title: docData.title || "",
          subtitle: docData.subtitle || "",
          createdAt: normalizeTs(docData.createdAt) || Date.now(),
          updatedAt: Date.now()
        });
      }

      render();
    }

    function restartQuiz() {
      if (!state.doc) return;
      startQuiz(state.doc, state.docId);
    }

    function nextQuestion() {
      state.quiz.index += 1;
      state.quiz.typedAnswer = "";
      state.quiz.lastResult = null;
      state.quiz.phase = state.quiz.index >= state.quiz.order.length ? "done" : "question";
      render();
    }

    function submitAnswer() {
      const q = currentQuestion();
      if (!q) return;

      const given = state.quiz.typedAnswer;
      if (!String(given || "").trim()) {
        alert("答えを入れてね");
        return;
      }

      const correct = q.item.answers.map(norm).includes(norm(given));
      state.quiz.attempts[q.idx] = { given, correct };
      state.quiz.lastResult = { idx: q.idx, given, correct };
      state.quiz.phase = "result";
      render();
    }

    function lineNumbers(textarea, gutter) {
      const count = Math.max(1, textarea.value.split(/\r?\n/).length + 1);
      gutter.textContent = Array.from({ length: count }, (_, i) => i + 1).join("\n");
      gutter.scrollTop = textarea.scrollTop;
    }

    function topButtonHtml() {
      return `<button class="ghost" id="topBtn">トップ</button>`;
    }

    function bindTopButton() {
      const topBtn = document.getElementById("topBtn");
      if (topBtn) {
        topBtn.addEventListener("click", () => {
          location.hash = "";
        });
      }
    }

    function bindHomeActions() {
      document.querySelectorAll("[data-open-quiz]").forEach(btn => {
        btn.addEventListener("click", () => {
          location.hash = `#/${encodeURIComponent(btn.dataset.openQuiz || "")}`;
        });
      });

      document.querySelectorAll("[data-edit-quiz]").forEach(btn => {
        btn.addEventListener("click", () => {
          location.hash = `#/edit/${encodeURIComponent(btn.dataset.editQuiz || "")}`;
        });
      });

      document.querySelectorAll("[data-copy-quiz]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.copyQuiz || "";
          const link = prettyLink(id);
          try {
            await navigator.clipboard.writeText(link);
            alert("リンクをコピーしたよ");
          } catch {
            prompt("コピーできない環境だったよ。手動でコピーしてね", link);
          }
        });
      });

      const createBtn = document.getElementById("createBtn");
      if (createBtn) {
        createBtn.addEventListener("click", () => {
          location.hash = "#/create";
        });
      }
    }

    function renderHome() {
      clearResultEnterHandler();
      document.title = "問題作成サイト";

      const myQuizzes = loadMyQuizList();
      const listHtml = myQuizzes.length ? myQuizzes.map(item => `
        <div class="listItem">
          <div class="listMeta">
            <div class="reviewQ">${esc(item.title || "無題")}</div>
            <div class="reviewA">${esc(item.subtitle || "")}</div>
            <div class="metaLine">作成: ${esc(formatMinute(item.createdAt))}</div>
            <div class="metaLine">最終編集: ${esc(formatMinute(item.updatedAt))}</div>
          </div>
          <div class="listActions">
            <button class="ghost miniAction" data-open-quiz="${esc(item.id)}">開く</button>
            <button class="ghost miniAction" data-edit-quiz="${esc(item.id)}">編集</button>
            <button class="ghost miniAction" data-copy-quiz="${esc(item.id)}">コピー</button>
          </div>
        </div>
      `).join("") : `
        <div class="note">まだないよ。作成ボタンからどうぞ。</div>
      `;

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">問題作成サイト</h1>
              <div class="sub">作って、そのまま遊べる</div>
            </div>
          </div>

          <div class="hero">
            <div class="card">
              <h1 style="margin:0;font-size:clamp(34px,6vw,54px);line-height:1.05;letter-spacing:-.03em">作成して、公開して、答える。</h1>
              <p style="margin:12px 0 0;color:var(--muted);line-height:1.8;font-size:16px">
                1行ごとに <b>問題=答え</b> を入れるだけ。<br>
                <b>= なしの行</b> は共通見出しになるよ。たとえば「日本について」の下にいくつか問題を並べられる。
              </p>
              <div style="height:14px"></div>
              <button class="bigBtn" id="createBtn">作成</button>
              <div style="height:10px"></div>
              <div class="note">cookie で作成者を覚えるよ。Key が open なら誰でも編集できる。</div>
            </div>

            <div class="card">
              <div class="label" style="font-size:14px">自分が作ったやつ</div>
              <div class="listGrid">
                ${listHtml}
              </div>
            </div>
          </div>
        </div>
      `;

      bindHomeActions();
    }

    function renderEditor() {
      clearResultEnterHandler();
      const d = state.draft || blankDraft();
      document.title = "作成 / 編集 | 問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">作成 / 編集</h1>
              <div class="sub">タイトルの右に Key ボタン</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
            </div>
          </div>

          <div class="card" style="display:grid;gap:14px">
            <div class="row">
              <div style="flex:1;min-width:220px">
                <div class="label">タイトル</div>
                <input id="titleInput" class="input" type="text" placeholder="タイトル" value="${esc(d.title)}">
              </div>
              <button class="ghost" id="keyBtn" style="height:48px;align-self:end">Key</button>
            </div>

            <div>
              <div class="label">サブタイトル</div>
              <input id="subInput" class="input" type="text" placeholder="サブタイトル" value="${esc(d.subtitle)}">
            </div>

            <div>
              <div class="label">問題欄</div>
              <div class="gridEditor">
                <div id="gutter" class="gutter"></div>
                <textarea id="problemText" class="textarea" wrap="off" spellcheck="false" placeholder="例:
日本について
首都=東京
人口=約1.2億人
面積=377975km²
">${esc(d.rawText)}</textarea>
              </div>
              <div class="help">
                1行に1つ書くよ。<br>
                <b>= なしの行</b> は共通見出し。<br>
                <b>問題=答え</b> で普通の問題。<br>
                <b>問題=答え1,答え2</b> で複数正解。
              </div>
            </div>

            <div class="row" style="justify-content:space-between">
              <div id="keyStatus" class="note"></div>
              <button class="primary" id="saveBtn">保存</button>
            </div>

            <div class="row" style="justify-content:space-between; margin-top:6px">
              <div class="note">削除すると元に戻せないよ。ちゃんと確認する。</div>
              <button class="danger" id="deleteBtn">削除</button>
            </div>
          </div>
        </div>
      `;

      const titleInput = document.getElementById("titleInput");
      const subInput = document.getElementById("subInput");
      const problemText = document.getElementById("problemText");
      const gutter = document.getElementById("gutter");
      const keyBtn = document.getElementById("keyBtn");
      const keyStatus = document.getElementById("keyStatus");
      const saveBtn = document.getElementById("saveBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const topBtn = document.getElementById("topBtn");

      function refreshKeyStatus() {
        keyStatus.textContent = d.keyMode === "open" ? "Key: open（誰でも編集）" : (d.key ? "Key: 設定済み" : "Key: 未設定");
      }

      titleInput.addEventListener("input", e => d.title = e.target.value);
      subInput.addEventListener("input", e => d.subtitle = e.target.value);
      problemText.addEventListener("input", e => {
        d.rawText = e.target.value;
        lineNumbers(problemText, gutter);
      });
      problemText.addEventListener("scroll", () => {
        gutter.scrollTop = problemText.scrollTop;
      });

      keyBtn.addEventListener("click", () => {
        const cur = d.keyMode === "open" ? "open" : (d.key || "");
        const next = prompt("Key を入力。open で誰でも編集。", cur);
        if (next === null) return;
        const v = next.trim();
        if (!v) {
          d.keyMode = "key";
          d.key = "";
        } else if (v.toLowerCase() === "open") {
          d.keyMode = "open";
          d.key = "";
        } else {
          d.keyMode = "key";
          d.key = v;
        }
        refreshKeyStatus();
      });

      if (topBtn) {
        topBtn.addEventListener("click", () => {
          location.hash = "";
        });
      }

      saveBtn.addEventListener("click", async () => {
        const title = d.title.trim();
        const subtitle = d.subtitle.trim();
        const items = parseItems(d.rawText);

        if (!title) return alert("タイトルを入れてね");
        if (!items.length) return alert("問題が1つも読めなかったよ。");

        const newId = slugify(title);
        const oldId = state.docId || "";
        const ownerToken = getCookie(OWNER_COOKIE) || uid();
        setCookie(OWNER_COOKIE, ownerToken);

        const existingCreatedAt = normalizeTs(state.doc?.createdAt) || Date.now();

        const payload = {
          title,
          subtitle,
          items,
          problems: items,
          rawText: d.rawText,
          keyMode: d.keyMode,
          key: d.keyMode === "open" ? "" : d.key,
          ownerToken,
          slug: newId,
          createdAt: existingCreatedAt,
          updatedAt: Date.now()
        };

        saveBtn.disabled = true;
        saveBtn.textContent = "保存中...";

        try {
          await setDoc(doc(db, COLLECTION, newId), payload, { merge: true });

          if (oldId && oldId !== newId) {
            try {
              await deleteDoc(doc(db, COLLECTION, oldId));
            } catch (_) {}
            removeMyQuizMeta(oldId);
          }

          state.docId = newId;
          state.doc = { ...payload, items };
          upsertMyQuizMeta({
            id: newId,
            title: payload.title,
            subtitle: payload.subtitle,
            createdAt: payload.createdAt,
            updatedAt: payload.updatedAt
          });

          location.hash = `#/${encodeURIComponent(newId)}`;
          const link = prettyLink(newId);
          navigator.clipboard?.writeText(link).catch(() => {});
          alert(`保存したよ！\n\n${link}`);

          startQuiz(state.doc, newId);
        } catch (err) {
          console.error("save failed:", err);
          alert(`保存で失敗したよ: ${err?.message || err}`);
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = "保存";
        }
      });

      deleteBtn.addEventListener("click", async () => {
        if (!state.docId) {
          alert("まだ保存されてないから削除できないよ");
          return;
        }

        const title = state.doc?.title || state.draft?.title || "";
        const typed = prompt(`削除するには、タイトル「${title}」をそのまま入力してね`, "");
        if (typed === null) return;
        if (typed.trim() !== title.trim()) {
          alert("タイトルが違うから削除をやめたよ");
          return;
        }

        if (!confirm(`本当に「${title}」を削除する？\nこの操作は戻せないよ。`)) return;

        deleteBtn.disabled = true;

        try {
          await deleteDoc(doc(db, COLLECTION, state.docId));
          removeMyQuizMeta(state.docId);
          state.docId = "";
          state.doc = null;
          state.draft = null;
          location.hash = "";
          alert("削除したよ");
          render();
        } catch (err) {
          console.error("delete failed:", err);
          alert(`削除で失敗したよ: ${err?.message || err}`);
        } finally {
          deleteBtn.disabled = false;
        }
      });

      lineNumbers(problemText, gutter);
      refreshKeyStatus();
      titleInput.focus();
    }

    function renderQuestion() {
      clearResultEnterHandler();
      const q = currentQuestion();
      if (!q) {
        state.quiz.phase = "done";
        render();
        return;
      }

      document.title = state.doc.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">${esc(state.doc.title || "問題")}</h1>
              <div class="sub">${esc(state.doc.subtitle || "")}</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
              <button class="ghost" id="editBtn">${canEdit() ? "編集" : "Keyを入力して編集"}</button>
            </div>
          </div>

          <div class="quiz">
            <div class="card">
              <div class="progress">
                <div>問題 ${state.quiz.index + 1} / ${state.quiz.order.length}</div>
                <div>${state.doc.items.length}問中</div>
              </div>
              <div style="height:12px"></div>
              ${q.item.section ? `<div class="sectionText">${esc(q.item.section)}</div><div style="height:10px"></div>` : ""}
              <div class="question">${esc(q.item.question)}</div>
            </div>

            <div class="card" style="display:grid;gap:10px">
              <div class="label">答え</div>
              <input id="answerInput" class="answer" type="text" placeholder="ここに入力" autocomplete="off" autocapitalize="off" spellcheck="false">
              <div class="actions">
                <button class="submit" id="submitBtn">✅</button>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => {
        location.hash = "";
      });

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open") return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      const input = document.getElementById("answerInput");
      input.focus();
      input.addEventListener("input", e => state.quiz.typedAnswer = e.target.value);
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          submitAnswer();
        }
      });

      document.getElementById("submitBtn").addEventListener("click", submitAnswer);
    }

    function renderResult() {
      const r = state.quiz.lastResult;
      if (!r) {
        state.quiz.phase = "question";
        render();
        return;
      }

      const q = state.doc.items[r.idx];
      document.title = state.doc.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">${esc(state.doc.title || "問題")}</h1>
              <div class="sub">${esc(state.doc.subtitle || "")}</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
              <button class="ghost" id="editBtn">${canEdit() ? "編集" : "Keyを入力して編集"}</button>
            </div>
          </div>

          <div class="quiz">
            <div class="${r.correct ? "good" : "bad"}">${r.correct ? "正解！" : "ちがう！"}</div>

            <div class="card">
              ${q.section ? `<div class="sectionText">${esc(q.section)}</div><div style="height:10px"></div>` : ""}
              <div class="label">問題</div>
              <div class="question" style="font-size:22px">${esc(q.question)}</div>
              <div style="height:12px"></div>
              <div class="label">答え</div>
              <div class="explain">${esc(q.answers.join(" / "))}</div>
              <div style="height:12px"></div>
              <div class="label">あなたの答え</div>
              <div class="explain">${esc(r.given)}</div>
            </div>

            <div class="actions">
              <button class="next" id="nextBtn">次へ</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => {
        location.hash = "";
      });

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open") return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      document.getElementById("nextBtn").addEventListener("click", nextQuestion);
      enableResultEnterHandler();
    }

    function renderDone() {
      clearResultEnterHandler();
      const total = state.doc.items.length;
      const correctCount = Object.values(state.quiz.attempts).filter(v => v.correct).length;

      document.title = state.doc.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">${esc(state.doc.title || "問題")}</h1>
              <div class="sub">${esc(state.doc.subtitle || "")}</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
              <button class="ghost" id="editBtn">${canEdit() ? "編集" : "Keyを入力して編集"}</button>
            </div>
          </div>

          <div class="summary">
            <div class="card">
              <div class="score">${correctCount} / ${total} 問正解</div>
              <div class="note" style="margin-top:10px">もう一回やり直せるよ。</div>
            </div>

            <div class="actions" style="justify-content:flex-start">
              <button class="primary" id="restartBtn">もう一度！</button>
            </div>

            <div class="card">
              <div class="label">全問題と答え</div>
              <div class="reviewList">
                ${state.doc.items.map(item => `
                  <div class="reviewItem">
                    ${item.section ? `<div class="reviewSection">${esc(item.section)}</div>` : ""}
                    <div class="reviewQ">${esc(item.question)}</div>
                    <div class="reviewA">答え: ${esc(item.answers.join(" / "))}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => {
        location.hash = "";
      });

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open") return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      document.getElementById("restartBtn").addEventListener("click", restartQuiz);
    }

    function renderLoading() {
      clearResultEnterHandler();
      document.title = "読み込み中 | 問題作成サイト";
      root.innerHTML = `
        <div class="page">
          <div class="hero">
            <div class="card">
              <h1 style="margin:0">読み込み中…</h1>
              <p style="margin:12px 0 0;color:var(--muted)">Firestore からデータを取ってるよ。</p>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.screen === "loading") return renderLoading();
      if (state.screen === "home") return renderHome();
      if (state.screen === "editor") return renderEditor();

      if (state.screen === "quiz") {
        if (!state.doc || !state.doc.items || !state.doc.items.length) {
          state.screen = "home";
          return render();
        }
        if (state.quiz.phase === "question") return renderQuestion();
        if (state.quiz.phase === "result") return renderResult();
        if (state.quiz.phase === "done") return renderDone();
      }
    }

    async function openEditRoute(id) {
      state.screen = "loading";
      render();

      try {
        const snap = await getDoc(doc(db, COLLECTION, id));
        if (!snap.exists()) {
          state.screen = "home";
          render();
          return;
        }

        const data = snap.data() || {};
        const items = Array.isArray(data.items)
          ? data.items
          : Array.isArray(data.problems)
            ? data.problems.map(p => ({
                section: p.section || "",
                question: p.question,
                answers: p.answers || [],
                rawLine: p.rawLine || ""
              }))
            : parseItems(data.rawText || "");

        state.docId = id;
        state.doc = {
          title: data.title || "問題",
          subtitle: data.subtitle || "",
          items,
          problems: items,
          rawText: data.rawText || "",
          keyMode: data.keyMode || "key",
          key: data.key || "",
          ownerToken: data.ownerToken || "",
          slug: data.slug || id,
          createdAt: data.createdAt || null,
          updatedAt: data.updatedAt || null
        };

        if (canEdit() || state.doc.keyMode === "open") {
          openEditFromDoc();
          return;
        }

        const entered = prompt("Key を入力して編集", "");
        if (entered === null) {
          location.hash = `#/${encodeURIComponent(id)}`;
          return;
        }

        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          openEditFromDoc();
        } else {
          alert("Key が違うよ");
          location.hash = `#/${encodeURIComponent(id)}`;
        }
      } catch (err) {
        console.error(err);
        state.screen = "home";
        render();
      }
    }

    async function loadRoute() {
      applySystemTheme();
      const r = route();

      if (r.name === "home") {
        state.screen = "home";
        render();
        return;
      }

      if (r.name === "create") {
        state.draft = blankDraft();
        state.screen = "editor";
        render();
        return;
      }

      if (r.name === "edit") {
        await openEditRoute(r.id);
        return;
      }

      if (r.name === "quiz") {
        state.screen = "loading";
        render();

        try {
          const snap = await getDoc(doc(db, COLLECTION, r.id));
          if (!snap.exists()) {
            state.screen = "home";
            render();
            return;
          }

          const data = snap.data() || {};
          const items = Array.isArray(data.items)
            ? data.items
            : Array.isArray(data.problems)
              ? data.problems.map(p => ({
                  section: p.section || "",
                  question: p.question,
                  answers: p.answers || [],
                  rawLine: p.rawLine || ""
                }))
              : parseItems(data.rawText || "");

          startQuiz({
            title: data.title || "問題",
            subtitle: data.subtitle || "",
            items,
            problems: items,
            rawText: data.rawText || "",
            keyMode: data.keyMode || "key",
            key: data.key || "",
            ownerToken: data.ownerToken || "",
            slug: data.slug || r.id,
            createdAt: data.createdAt || null,
            updatedAt: data.updatedAt || null
          }, r.id);
        } catch (err) {
          console.error(err);
          state.screen = "home";
          render();
        }
      }
    }

    if (systemDark) {
      const onThemeChange = () => {
        applySystemTheme();
        render();
      };
      if (systemDark.addEventListener) {
        systemDark.addEventListener("change", onThemeChange);
      } else if (systemDark.addListener) {
        systemDark.addListener(onThemeChange);
      }
    }

    window.addEventListener("hashchange", loadRoute);
    loadRoute();
  </script>
</body>
</html>
