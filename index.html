<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題作成サイト</title>
  <style>
    :root{
      --bg1:#f8faff;
      --bg2:#eef2f8;
      --panel:#fff;
      --line:#d8dbe5;
      --text:#1f2430;
      --muted:#6b7280;
      --accent:#2f6fed;
      --good:#118a3a;
      --bad:#d33c3c;
      --radius:18px;
      --shadow:0 12px 30px rgba(20,25,40,.08);
      --ownerBg:rgba(47,111,237,.08);
      --ownerLine:rgba(47,111,237,.42);
      --editorBg:rgba(58,168,255,.08);
      --editorLine:rgba(58,168,255,.42);
    }

    body.dark{
      --bg1:#0b1120;
      --bg2:#111827;
      --panel:#111827;
      --line:#243043;
      --text:#e7ecf7;
      --muted:#9aa4b2;
      --accent:#5b8cff;
      --good:#39c66d;
      --bad:#ff7676;
      --shadow:0 12px 30px rgba(0,0,0,.26);
      --ownerBg:rgba(91,140,255,.12);
      --ownerLine:rgba(91,140,255,.45);
      --editorBg:rgba(58,168,255,.12);
      --editorLine:rgba(88,189,255,.45);
    }

    html, body{ overflow-x:auto; }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    button,input,textarea,select{font:inherit}
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
    }

    .hide{display:none !important;}
    .page{max-width:980px;margin:0 auto;padding:16px;min-height:100vh;}

    .titleArea{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      min-width:0;
    }
    .titleBlock{min-width:0}

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      position:sticky;
      top:0;
      padding:8px 0 12px;
      backdrop-filter:blur(8px);
      z-index:5;
    }

    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.1;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
      word-break:break-word;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(15,23,42,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .hero{
      max-width:860px;
      margin:36px auto 0;
      display:grid;
      gap:16px;
    }

    .bigBtn,.primary{
      background:var(--accent);
      color:#fff;
      font-weight:800;
    }

    .ghost{
      background:#eef3ff;
      color:#244a9c;
      border:1px solid #d7e2ff;
      font-weight:700;
    }

    body.dark .ghost{
      background:#182133;
      color:#d7e5ff;
      border-color:#2d3a4f;
    }

    .danger{
      background:#ffeded;
      color:#a72b2b;
      border:1px solid #ffc7c7;
      font-weight:800;
    }

    body.dark .danger{
      background:#2a1620;
      color:#ffaaaa;
      border-color:#5b2a39;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .input{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 15px;
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .input:focus{
      border-color:#9ab8ff;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }

    .label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .gridEditor{
      display:grid;
      grid-template-columns:64px 1fr;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      min-height:420px;
      background:var(--panel);
      align-items:stretch;
    }

    .gutter{
      background:rgba(127,127,127,.07);
      border-right:1px solid var(--line);
      padding:14px 10px 14px 0;
      text-align:right;
      color:#8a93a8;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      user-select:none;
      overflow:hidden;
      align-self:stretch;
      min-height:420px;
    }

    .textarea{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      min-height:420px;
      padding:14px;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      overflow:auto;
      touch-action:pan-x pan-y;
      tab-size:2;
      background:var(--panel);
      color:var(--text);
      scrollbar-gutter:stable;
    }

    .help,.note{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .quiz{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .progress{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .sectionText{
      font-size:18px;
      font-weight:900;
      line-height:1.35;
      color:#334155;
      word-break:break-word;
    }

    body.dark .sectionText{
      color:#d7def0;
    }

    .question{
      font-size:clamp(22px,4vw,32px);
      font-weight:900;
      line-height:1.4;
      word-break:break-word;
    }

    .answer{
      width:100%;
      font-size:18px;
      padding:16px;
      border-radius:16px;
      border:1px solid var(--line);
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .submit{
      background:var(--accent);
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .next{
      background:#1c9c59;
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .good{
      border:1px solid rgba(47,111,237,.22);
      background:#eef4ff;
      color:var(--accent);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }

    body.dark .good{
      border-color:rgba(91,140,255,.35);
      background:#13264a;
      color:#9ebdff;
    }

    .bad{
      border:1px solid rgba(211,60,60,.22);
      background:#fff3f3;
      color:var(--bad);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }

    .explain{
      background:#f8faff;
      border:1px solid #dbe4fb;
      padding:14px 16px;
      border-radius:16px;
      line-height:1.8;
      word-break:break-word;
      color:#2b3241;
    }

    body.dark .explain{
      background:#182133;
      border-color:#2d3a4f;
      color:#e7ecf7;
    }

    .summary{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .score{
      font-size:28px;
      font-weight:1000;
      line-height:1.2;
    }

    .reviewList{
      display:grid;
      gap:10px;
    }

    .reviewItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 15px;
      background:var(--panel);
      display:grid;
      gap:6px;
    }

    .reviewItem.reviewGood{
      border-color:rgba(47,111,237,.35);
      background:rgba(47,111,237,.06);
    }

    .reviewItem.reviewBad{
      border-color:rgba(211,60,60,.35);
      background:rgba(211,60,60,.06);
    }

    body.dark .reviewItem.reviewGood{
      border-color:rgba(91,140,255,.40);
      background:rgba(91,140,255,.10);
    }

    body.dark .reviewItem.reviewBad{
      border-color:rgba(255,118,118,.35);
      background:rgba(255,118,118,.08);
    }

    .reviewSection{
      font-size:15px;
      font-weight:900;
      color:#334155;
      line-height:1.4;
    }

    body.dark .reviewSection{
      color:#d7def0;
    }

    .reviewQ{
      font-weight:900;
      font-size:16px;
      word-break:break-word;
    }

    .reviewA{
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .listGrid{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      box-shadow:var(--shadow);
      padding:14px 15px;
    }

    .listMeta{
      min-width:0;
      display:grid;
      gap:4px;
      flex:1;
    }

    .listActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .miniAction{
      padding:10px 12px;
      font-size:13px;
      border-radius:12px;
      white-space:nowrap;
    }

    .metaLine{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .commentWrap{
      display:grid;
      gap:12px;
    }

    .commentForm{
      display:grid;
      gap:10px;
    }

    .commentHeader{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .commentToggleRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .commentBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      font-weight:800;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(127,127,127,.08);
      color:var(--text);
    }

    .commentPrivateNote{
      font-size:12px;
      color:var(--muted);
    }

    .commentMask{
      font-weight:900;
      font-size:18px;
      line-height:1.4;
    }

    .commentBody{
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      color:var(--text);
    }

    .scoreToken{
      color:#14994a;
      font-weight:900;
    }

    .timeToken{
      color:#2f6fed;
      font-weight:900;
    }

    body.dark .scoreToken{
      color:#66e08d;
    }

    body.dark .timeToken{
      color:#8db2ff;
    }

    .commentItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 15px;
      background:var(--panel);
      display:grid;
      gap:6px;
    }

    .commentOwner{
      border-color:var(--ownerLine);
      background:var(--ownerBg);
    }

    .commentEditor{
      border-color:var(--editorLine);
      background:var(--editorBg);
    }

    .commentViewer{
      border-color:var(--line);
      background:var(--panel);
    }

    .choiceGrid{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    }

    .choiceBtn{
      text-align:center;
      width:100%;
    }

    .selected{
      background:#dfe9ff !important;
      border-color:#9ab8ff !important;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }

    .homeControls{
      display:grid;
      gap:10px;
    }

    .homeTopRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .tabSelect{
      min-width:220px;
      max-width:100%;
      height:48px;
    }

    .searchWrap{
      display:flex;
      gap:8px;
      align-items:center;
      flex:1;
      min-width:220px;
    }

    .searchInput{
      flex:1;
      height:48px;
    }

    .homeSectionTitle{
      font-size:16px;
      font-weight:900;
      margin:0 0 10px;
      color:var(--text);
    }

    .dividerLine{
      text-align:center;
      color:var(--muted);
      font-weight:900;
      margin:10px 0 6px;
      user-select:none;
    }

    .publicBadge{
      font-size:12px;
      font-weight:900;
      color:var(--accent);
      border:1px solid rgba(47,111,237,.2);
      background:rgba(47,111,237,.08);
      padding:4px 8px;
      border-radius:999px;
      white-space:nowrap;
    }

    body.dark .publicBadge{
      color:#a9c0ff;
      border-color:rgba(91,140,255,.28);
      background:rgba(91,140,255,.10);
    }

    .homeMeta{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .editorHost,
    .commentInputHost{
      position:relative;
    }

    .floatSuggest{
      position:absolute;
      z-index:40;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:8px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      max-width:min(420px, calc(100% - 16px));
    }

    .replyBox{
      border:1px solid var(--line);
      background:rgba(127,127,127,.06);
      border-radius:14px;
      padding:10px 12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }

    .replyLabel{font-size:13px;font-weight:900;color:var(--text);}
    .replyHint{font-size:12px;color:var(--muted);}
    .timeOnlyNote{font-size:12px;color:var(--muted);}

    .settingsScreen{
      display:grid;
      gap:14px;
    }

    .settingList{
      display:grid;
      gap:10px;
    }

    .settingRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      width:100%;
      text-align:left;
      padding:16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:var(--shadow);
      color:var(--text);
    }

    .settingText{
      display:grid;
      gap:4px;
      min-width:0;
      flex:1;
    }

    .settingLabel{
      font-size:16px;
      font-weight:900;
      line-height:1.2;
    }

    .settingHint{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .toggleSwitch{
      position:relative;
      width:58px;
      height:34px;
      border-radius:999px;
      background:#c8d0df;
      transition:.2s background;
      flex:none;
    }

    body.dark .toggleSwitch{
      background:#42506a;
    }

    .toggleSwitch.on{
      background:var(--accent);
    }

    .toggleKnob{
      position:absolute;
      top:3px;
      left:3px;
      width:28px;
      height:28px;
      border-radius:50%;
      background:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.15);
      transition:.2s transform;
    }

    .toggleSwitch.on .toggleKnob{
      transform:translateX(24px);
    }

    .settingHeader{
      display:grid;
      gap:8px;
    }

    .settingTitle{
      font-size:26px;
      font-weight:1000;
      line-height:1.1;
      margin:0;
    }

    .settingSub{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    #tutorialLayer,
    #partnerLayer{
      position:fixed;
      inset:0;
      z-index:1000;
      pointer-events:none;
    }

    .tutorialOverlay,
    .partnerOverlay{
      position:fixed;
      inset:0;
      pointer-events:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(6,10,18,.64);
      backdrop-filter:blur(8px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .tutorialOverlay.closing,
    .partnerOverlay.closing{
      opacity:0;
      transform:translateY(18px);
    }

    .tutorialPanel,
    .partnerPanel{
      width:min(860px, 100%);
      max-height:min(86vh, 860px);
      overflow:hidden;
      border-radius:28px;
      background:var(--panel);
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 30px 80px rgba(0,0,0,.38);
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    .tutorialTop,
    .partnerTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:16px 18px 0;
    }

    .tutorialTitle,
    .partnerTitle{
      font-size:24px;
      font-weight:1000;
      line-height:1.1;
      margin:0;
    }

    .tutorialSub,
    .partnerSub{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .tutorialClose,
    .partnerClose{
      width:44px;
      height:44px;
      border-radius:14px;
      padding:0;
      background:rgba(127,127,127,.10);
      color:var(--text);
      font-size:22px;
      font-weight:900;
    }

    .tutorialBody,
    .partnerBody{
      padding:14px 18px 6px;
      overflow:auto;
    }

    .tutorialPage{
      min-height:340px;
      display:grid;
      gap:14px;
      animation-duration:.26s;
      animation-fill-mode:both;
    }

    .tutorialPage.anim-open{animation-name:tutInOpen;}
    .tutorialPage.anim-next{animation-name:tutInRight;}
    .tutorialPage.anim-prev{animation-name:tutInLeft;}
    .tutorialPage.anim-close{animation-name:tutOutDown;}

    .tutorialCard{
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      background:rgba(127,127,127,.05);
    }

    body.dark .tutorialCard{
      background:rgba(255,255,255,.03);
    }

    .tutorialHero{
      display:grid;
      gap:8px;
    }

    .tutorialHero h2{
      margin:0;
      font-size:28px;
      line-height:1.1;
      letter-spacing:-.03em;
    }

    .tutorialHero p{
      margin:0;
      line-height:1.8;
      color:var(--muted);
      font-size:15px;
    }

    .tutorialCode{
      background:#0f172a;
      color:#e8f0ff;
      border-radius:16px;
      padding:14px 16px;
      overflow:auto;
      font:600 14px/1.7 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre-wrap;
      word-break:break-word;
    }

    body.dark .tutorialCode{
      background:#0a1220;
    }

    .tutorialFooter,
    .partnerFooter{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      padding:0 18px 18px;
      flex-wrap:wrap;
    }

    .tutorialDots{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
      flex:1;
    }

    .dot{
      width:8px;height:8px;border-radius:999px;
      background:rgba(127,127,127,.35);
    }

    .dot.active{background:var(--accent);}

    .tutorialNavBtn{
      min-width:110px;
      font-weight:900;
    }

    .partnerMenu{
      display:grid;
      gap:10px;
      padding:4px 0 0;
    }

    .partnerMenuBtn{
      width:100%;
      text-align:left;
      padding:16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      box-shadow:var(--shadow);
      font-weight:900;
    }

    .partnerMenuBtn.primary{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }

    .pictureWrap{
      display:grid;
      gap:10px;
      margin:8px 0 12px;
    }

    .quizPicture{
      width:100%;
      max-width:100%;
      border-radius:16px;
      display:block;
      object-fit:contain;
      background:rgba(127,127,127,.08);
      border:1px solid var(--line);
    }

    .pictureMissing{
      border:1px dashed var(--line);
      border-radius:16px;
      padding:12px 14px;
      color:var(--muted);
      font-size:13px;
      background:rgba(127,127,127,.06);
    }

    .pictureThumbGrid{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      margin-top:10px;
    }

    .pictureThumb{
      display:grid;
      gap:6px;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:var(--panel);
    }

    .pictureThumb img{
      width:100%;
      aspect-ratio:1 / 1;
      object-fit:cover;
      display:block;
      background:rgba(127,127,127,.08);
    }

    .pictureThumbLabel{
      padding:0 10px 10px;
      font-size:12px;
      color:var(--muted);

  <input id="pictureInput" type="file" accept="image/*" class="hide" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import {
      getFirestore,

    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsiyr6pq0CLo4dT2c7QtoshZBqBKsviwE",
      authDomain: "quiz-f46d6.firebaseapp.com",
      projectId: "quiz-f46d6",
      storageBucket: "quiz-f46d6.firebasestorage.app",
      messagingSenderId: "75573053604",
      appId: "1:75573053604:web:6b20006ca68e685e18fe31",
      measurementId: "G-KQVMD2YYDP"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const db = getFirestore(appFirebase);

    const root = document.getElementById("app");
    const tutorialLayer = document.getElementById("tutorialLayer");
    const partnerLayer = document.getElementById("partnerLayer");
    const pictureInput = document.getElementById("pictureInput");
    if (!root) throw new Error("Missing #app");

    const COLLECTION = "quizzes";
    const OWNER_COOKIE = "qb_owner_token";

    const MY_KEY = "qb_my_quizzes";

    const COMMENT_TOKEN_KEY = "qb_comment_token";
    const COMMENT_NAME_KEY = "qb_comment_name";
    const TUTORIAL_COOKIE = "qb_tutorial_seen";
    const PARTNER_LINK_LOCAL_KEY = "qb_partner_link";
    const SETTINGS_COLLECTION = "siteSettings";
    const SETTINGS_DOC_ID = "main";
    const TAGS = ["random", "choice", "random choice", "number", "open"];
    const PICTURE_TAG_RE = /\[picture\((\d+)\)\]/ig;

    const CONTROL_LABELS = {
      random: "問題順ランダム"
    };

    const CONTROL_HINTS = {
      random: "問題の順番をランダムにする"
    };

    const state = {
      screen: "loading",
      docId: "",
      doc: null,
      draft: null,
      accessMode: "none",
      showComments: false,
      allDocs: [],
      catalogLoaded: false,
      homeTab: localStorage.getItem("qb_home_tab") || "library",
      homeQueries: { library: "", public: "" },
      homeVisibleCount: { library: 20, public: 12 },
      publicOrder: [],
      commentDraft: { name: "", text: "", isPrivate: false, replyTo: "", scoreWanted: false },
      partnerLink: safeLocalGet(PARTNER_LINK_LOCAL_KEY) || "",
      quiz: {
        phase: "question",
        order: [],
        index: 0,
        typedAnswer: "",
        lastResult: null,
        attempts: {},
        onlyWrong: false,
        startedAt: 0,
        finishedAt: 0,
        elapsedMs: 0,
        baseFlags: {},
        activeFlags: {},
        settingValues: {},
        onOffControls: [],
        items: [],
        pendingOrder: null,
        pendingOnlyWrong: false
      },
      tutorial: {
        open: false,
        page: 0,
        seen: false,
        autoShown: false,
        closing: false,
        motion: "open"
      },
      partnerModal: { open: false },
      pictureUploadNumber: null
    };

    let resultEnterHandler = null;
    let homeObserver = null;
    const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");

    function uid() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID().replace(/-/g, "");
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function suffix4() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID().replace(/-/g, "").slice(0, 4);
      return Math.random().toString(16).slice(2, 6).padEnd(4, "0");
    }

    function slugify(text) {
      return (text || "quiz")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^\p{L}\p{N}\-]+/gu, "")
        .replace(/\-+/g, "-")
        .replace(/^-+|-+$/g, "") || "quiz";
    }

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function norm(s) {
      return String(s ?? "")
        .replace(/\u3000/g, " ")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase();
    }

    function splitAnswers(text) {
      return String(text ?? "")
        .split(/[、,]/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function splitSearchTerms(q) {
      return String(q ?? "")
        .trim()
        .split(/[\s\u3000]+/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function normalizeOnOffTarget(raw) {
      const t = String(raw ?? "").trim().toLowerCase();
      if (t === "random") return t;
      return null;
    }

    function parseLeadingMeta(line) {
      let rest = String(line ?? "").trimStart();
      const tags = [];
      const onOffControls = [];
      const pictures = [];

      while (rest.startsWith("[")) {
        const picMatch = rest.match(/^\[picture\((\d+)\)\]/i);
        if (picMatch) {
          pictures.push(String(Number(picMatch[1])));
          rest = rest.slice(picMatch[0].length).trimStart();
          continue;
        }

        const tagMatch = rest.match(/^\[([^\]]+)\]/);
        if (!tagMatch) break;

        const token = tagMatch[1].trim().toLowerCase();
        const after = rest.slice(tagMatch[0].length).trimStart();

        if (token.startsWith("onoroff:")) {
          const target = normalizeOnOffTarget(token.slice("onoroff:".length));
          if (target) onOffControls.push(target);
          rest = after;
          continue;
        }

        if (TAGS.includes(token)) {
          tags.push(token);
          rest = after;
          continue;
        }

        break;
      }

      return { tags, onOffControls: Array.from(new Set(onOffControls)), pictures, rest };
    }

    function mergeFlags(base, tags) {
      const out = { ...base };
      for (const t of tags) {
        if (t === "random") out.random = true;
        if (t === "choice") out.choice = true;
        if (t === "random choice") { out.choice = true; out.randomChoice = true; }
        if (t === "number") out.number = true;
        if (t === "open") out.open = true;
      }
      return out;
    }

    function pickMode(globalFlags, localTags) {
      const localNumber = localTags.includes("number");
      const localChoice = localTags.includes("choice") || localTags.includes("random choice");
      const localRandomChoice = localTags.includes("random choice");
      if (localNumber) return { mode: "number", randomChoice: false };
      if (localChoice) return { mode: "choice", randomChoice: localRandomChoice || !!globalFlags.randomChoice };
      if (globalFlags.number) return { mode: "number", randomChoice: false };
      if (globalFlags.choice || globalFlags.randomChoice) return { mode: "choice", randomChoice: !!globalFlags.randomChoice };
      return { mode: "text", randomChoice: false };
    }

    function normalizeItem(item) {
      if (!item || typeof item !== "object") return item;
      return {
        ...item,
        pictures: Array.isArray(item.pictures) ? item.pictures.map(v => String(Number(v))).filter(Boolean)
                 : Array.isArray(item.localPictures) ? item.localPictures.map(v => String(Number(v))).filter(Boolean)
                 : []
      };
    }

    function parseQuestionLine(line, globalFlags) {
      const meta = parseLeadingMeta(line);
      const raw = meta.rest.trim();
      if (!raw) return null;
      const parts = raw.split(/[=＝]/);
      if (parts.length < 2) return null;
      const question = parts[0].trim();
      if (!question) return null;
      const { mode, randomChoice } = pickMode(globalFlags, meta.tags);

      if (mode === "choice") {
        const rawOptions = splitAnswers(parts.slice(1).join("=").trim());
        const options = rawOptions.map(opt => {
          let text = opt.trim(), correct = false;
          if (text.startsWith("!") || text.startsWith("*") || text.startsWith("＊")) {
            correct = true;
            text = text.slice(1).trim();
          }
          return { text, correct };
        }).filter(o => o.text);
        if (!options.length) return null;
        if (!options.some(o => o.correct)) options[options.length - 1].correct = true;
        return {
          type: "question",
          mode: "choice",
          question,
          options,
          randomChoice,
          pictures: meta.pictures,
          localTags: meta.tags,
          localOnOffControls: meta.onOffControls
        };
      }

      if (mode === "number") {
        const answerText = parts.slice(1).join("=").trim();
        if (!answerText) return null;
        return {
          type: "question",
          mode: "number",
          question,
          answers: [answerText],
          pictures: meta.pictures,
          localTags: meta.tags,
          localOnOffControls: meta.onOffControls
        };
      }

      const answers = splitAnswers(parts.slice(1).join("=").trim());
      if (!answers.length) return null;
      return {
        type: "question",
        mode: "text",
        question,
        answers,
        pictures: meta.pictures,
        localTags: meta.tags,
        localOnOffControls: meta.onOffControls
      };
    }

    function parseItems(text, overrideFlags = null) {
      const lines = String(text ?? "").split(/\r?\n/);
      const items = [];
      let globalFlags = { random: false, choice: false, randomChoice: false, number: false, open: false };
      let onOffControls = [];

      let i = 0;
      while (i < lines.length && !String(lines[i]).trim()) i++;

      while (i < lines.length) {
        const raw = String(lines[i] ?? "");
        const trimmed = raw.trim();
        if (!trimmed) { i++; continue; }

        const parsed = parseLeadingMeta(raw);
        if (!parsed.rest && (parsed.tags.length || parsed.onOffControls.length)) {
          globalFlags = mergeFlags(globalFlags, parsed.tags);
          onOffControls = Array.from(new Set([...onOffControls, ...parsed.onOffControls]));
          i++;
          continue;
        }

        break;
      }

      let currentSection = "";
      for (; i < lines.length; i++) {
        const line = String(lines[i] ?? "");
        const trimmed = line.trim();
        if (!trimmed) continue;

        const parsedSettings = parseLeadingMeta(line);
        if (!parsedSettings.rest && (parsedSettings.tags.length || parsedSettings.onOffControls.length)) {
          globalFlags = mergeFlags(globalFlags, parsedSettings.tags);
          onOffControls = Array.from(new Set([...onOffControls, ...parsedSettings.onOffControls]));
          continue;
        }

        const parsed = parseQuestionLine(line, overrideFlags || globalFlags);
        if (parsed) {
          items.push(normalizeItem({ id: uid(), section: currentSection, ...parsed }));
          continue;
        }

        if (!trimmed.startsWith("[")) currentSection = trimmed;
      }

      return { globalFlags, onOffControls, items };
    }

    function itemsToRawText(items, globalFlags = { random:false, choice:false, randomChoice:false, number:false, open:false }, onOffControls = []) {
      const lines = [];
      const gf = [];
      if (globalFlags.open) gf.push("[open]");
      if (globalFlags.random) gf.push("[random]");
      if (globalFlags.choice && globalFlags.randomChoice) gf.push("[random choice]");
      else if (globalFlags.choice) gf.push("[choice]");
      if (globalFlags.number) gf.push("[number]");
      if (gf.length) lines.push(gf.join(" "));
      if (onOffControls?.length) lines.push(onOffControls.map(t => `[ONorOFF:${t}]`).join(" "));

      let lastSection = null;
      for (const item of items || []) {
        const cur = normalizeItem(item);
        if (cur.section && cur.section !== lastSection) {
          lines.push(cur.section);
          lastSection = cur.section;
        }
        const picPrefix = (cur.pictures || []).map(n => `[picture(${n})]`).join(" ");
        let prefix = "";
        if (cur.mode === "choice") prefix = cur.randomChoice ? "[random choice] " : "[choice] ";
        if (cur.mode === "number") prefix = "[number] ";
        const allPrefix = [picPrefix, prefix.trim()].filter(Boolean).join(" ");
        if (cur.mode === "choice") {
          const opts = (cur.options || []).map(o => `${o.correct ? "!" : ""}${o.text}`).join(",");
          lines.push(`${allPrefix ? allPrefix + " " : ""}${cur.question}=${opts}`);
        } else {
          lines.push(`${allPrefix ? allPrefix + " " : ""}${cur.question}=${(cur.answers || []).join(",")}`);
        }
      }
      return lines.join("\n");
    }

    const shuffle = (arr) => {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    function setCookie(name, value, days = 3650) {
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`;
    }

    function getCookie(name) {
      const parts = document.cookie ? document.cookie.split("; ") : [];
      for (const part of parts) {
        const idx = part.indexOf("=");
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : "");
      }
      return "";
    }

    function safeLocalGet(key) { try { return localStorage.getItem(key); } catch { return null; } }
    function safeLocalSet(key, value) { try { localStorage.setItem(key, value); } catch {} }

    function loadMyList() {
      try {
        const raw = safeLocalGet(MY_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch { return []; }
    }

    function saveMyList(list) { safeLocalSet(MY_KEY, JSON.stringify(list.slice(0, 50))); }

    function loadAccessList() {
      try {
        const raw = safeLocalGet(ACCESS_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch { return []; }
    }

    function saveAccessList(list) { safeLocalSet(ACCESS_KEY, JSON.stringify(list.slice(0, 50))); }

    function findAccessRecord(id) { return loadAccessList().find(v => v.id === id) || null; }

    function rememberAccess(id, key, meta = {}) {
      if (!id || !key) return;
      const list = loadAccessList();
      const next = {
        id,
        key,
        title: String(meta.title || ""),
        subtitle: String(meta.subtitle || ""),
        createdAt: Number(meta.createdAt || Date.now()),
        updatedAt: Number(meta.updatedAt || Date.now())
      };
      const idx = list.findIndex(v => v.id === id);
      if (idx >= 0) list[idx] = { ...list[idx], ...next };
      else list.unshift(next);
      list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      saveAccessList(list);
    }

    function removeAccessRecord(id) { saveAccessList(loadAccessList().filter(v => v.id !== id)); }

    function upsertMyMeta(meta) {
      const list = loadMyList();
      const id = String(meta?.id || "");
      if (!id) return;
      const next = {
        id,
        title: String(meta.title || ""),
        subtitle: String(meta.subtitle || ""),
        createdAt: Number(meta.createdAt || Date.now()),
        updatedAt: Number(meta.updatedAt || Date.now())
      };
      const idx = list.findIndex(v => v.id === id);
      if (idx >= 0) list[idx] = { ...list[idx], ...next };
      else list.unshift(next);
      list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      saveMyList(list);
    }

    function removeMyMeta(id) { saveMyList(loadMyList().filter(v => v.id !== id)); }

    function normalizeTs(value) {
      if (typeof value === "number") return value;
      if (!value) return null;
      if (typeof value.toDate === "function") {
        const d = value.toDate();
        return d instanceof Date ? d.getTime() : null;
      }
      if (typeof value.seconds === "number") return value.seconds * 1000 + Math.floor((value.nanoseconds || 0) / 1e6);
      return null;
    }

    function formatMinute(value) {
      const ts = normalizeTs(value);
      if (!ts) return "—";
      const d = new Date(ts), pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function formatElapsed(ms) {
      const capped = Math.min(Math.max(0, Math.floor(ms || 0)), 3599990);
      const totalSeconds = Math.floor(capped / 1000);
      const minutes = Math.min(59, Math.floor(totalSeconds / 60));
      const seconds = Math.min(59, totalSeconds % 60);
      const hundredths = Math.min(99, Math.floor((capped % 1000) / 10));
      const pad = n => String(n).padStart(2, "0");
      return `${pad(minutes)}:${pad(seconds)}:${pad(hundredths)}`;
    }

    function applySystemTheme() {
      document.body.classList.toggle("dark", !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches));
    }

    function clearResultEnterHandler() {
      if (resultEnterHandler) {
        window.removeEventListener("keydown", resultEnterHandler);
        resultEnterHandler = null;
      }
    }

    function enableResultEnterHandler() {
      clearResultEnterHandler();
      const isDesktop = window.matchMedia && window.matchMedia("(pointer:fine)").matches && window.innerWidth >= 700;
      if (!isDesktop) return;

      resultEnterHandler = (e) => {
        if (e.key !== "Enter") return;
        const active = document.activeElement;
        if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) return;
        e.preventDefault();
        nextQuestion();
      };

      window.addEventListener("keydown", resultEnterHandler);
    }

    const basePath = () => {
      const p = location.pathname;
      if (p.endsWith("/")) return p;
      const i = p.lastIndexOf("/");
      return i >= 0 ? p.slice(0, i + 1) : "/";
    };

    const prettyLink = (id) => `${location.origin}${basePath()}#/${encodeURIComponent(id)}`;

    function route() {
      const raw = location.hash.replace(/^#/, "");
      const parts = raw.split("/").filter(Boolean);
      if (!parts.length) return { name: "home" };
      if (parts[0] === "create") return { name: "create" };
      if (parts[0] === "edit" && parts[1]) return { name: "edit", id: decodeURIComponent(parts[1]) };
      return { name: "quiz", id: decodeURIComponent(parts[0]) };
    }

    function getCommentToken() {
      let token = safeLocalGet(COMMENT_TOKEN_KEY);
      if (!token) {
        token = uid();
        safeLocalSet(COMMENT_TOKEN_KEY, token);
      }
      return token;
    }

    function getCommentName() {
      const n = safeLocalGet(COMMENT_NAME_KEY);
      if (!n) {
        safeLocalSet(COMMENT_NAME_KEY, "匿名");
        return "匿名";
      }
      return n;
    }

    function setCommentName(name) {
      safeLocalSet(COMMENT_NAME_KEY, name || "匿名");
    }

    function sortComments(comments) {
      return (comments || []).slice().sort((a, b) => (normalizeTs(b.createdAt) || 0) - (normalizeTs(a.createdAt) || 0));
    }

    function isPerfectScore() {
      const m = currentScoreMeta();
      return m.total > 0 && m.correctCount === m.total;
    }

    function canViewComment(comment) {
      if (!comment?.isPrivate) return true;
      if (!state.doc) return false;
      if (state.accessMode === "owner" || state.accessMode === "key" || state.accessMode === "open") return true;
      return comment.authorToken && comment.authorToken === getCommentToken();
    }

    function canManageComment(comment) {
      if (!comment || !state.doc) return false;
      if (state.accessMode === "owner") return true;
      return comment.authorToken && comment.authorToken === getCommentToken();
    }

    function setAccessModeForDoc(docData, id) {
      if (docData.keyMode === "open" || docData.globalFlags?.open) {
        state.accessMode = isOwner() ? "owner" : "open";
        return;
      }
      if (isOwner()) {
        state.accessMode = "owner";
        return;
      }
      const rec = findAccessRecord(id);
      if (rec && docData.key && rec.key === docData.key) {
        state.accessMode = "key";
        return;
      }
      state.accessMode = "none";
    }

    function isOwner() {
      return !!(state.doc?.ownerToken && getCookie(OWNER_COOKIE) === state.doc.ownerToken);
    }

    function canEdit() {
      if (!state.doc) return false;
      if (state.doc.keyMode === "open" || state.doc.globalFlags?.open) return true;
      return state.accessMode === "owner" || state.accessMode === "key" || state.accessMode === "open";
    }

    const canManageQuiz = () => canEdit();

    function currentQuestion() {
      if (!state.quiz?.items?.length) return null;
      const idx = state.quiz.order[state.quiz.index];
      if (idx === undefined) return null;
      return { idx, item: state.quiz.items[idx] };
    }

    function currentScoreMeta() {
      const total = state.quiz.order.length || (state.quiz.items?.length || 0);
      const correctCount = Object.values(state.quiz.attempts || {}).filter(v => v.correct).length;
      return { correctCount, total, label: `${correctCount}/${total}` };
    }

    function makeCommentSuggestionItems() {
      const items = [{ label: "点数", value: "[[SCORE]]" }];
      if (isPerfectScore()) items.push({ label: "時間", value: "[[TIME]]" });
      return items;
    }

    function blankDraft() {
      return { title: "", subtitle: "", rawText: "", keyMode: "key", key: "", images: {} };
    }

    function openCreate() {
      state.doc = null;
      state.docId = "";
      state.accessMode = "none";
      state.draft = blankDraft();
      state.showComments = false;
      state.screen = "editor";
      render();
    }

    function openEditFromDoc() {
      state.draft = {
        title: state.doc?.title || "",
        subtitle: state.doc?.subtitle || "",
        rawText: state.doc?.rawText || itemsToRawText(state.doc?.items || [], state.doc?.globalFlags || { random:false, choice:false, randomChoice:false, number:false, open:false }, state.doc?.onOffControls || []),
        keyMode: state.doc?.keyMode || "key",
        key: state.doc?.key || "",
        images: { ...(state.doc?.images || {}) }
      };
      state.screen = "editor";
      render();
    }

    function defaultSettingValues(controls, baseFlags) {
      const out = {};
      for (const c of controls || []) out[c] = !!baseFlags?.[c];
      return out;
    }

    function buildActiveFlagsFromSettings() {
      const out = { ...state.quiz.baseFlags };
      for (const c of state.quiz.onOffControls || []) {
        const enabled = !!state.quiz.settingValues?.[c];
        if (c === "random") out.random = enabled;
      }
      return out;
    }

    function applyOnOffDefaultsToQuiz() {
      state.quiz.settingValues = defaultSettingValues(state.quiz.onOffControls, state.quiz.baseFlags);
    }

    function beginQuizRun(orderIndices = null, onlyWrong = false) {
      const activeFlags = buildActiveFlagsFromSettings();
      const parsed = parseItems(
        state.doc?.rawText || itemsToRawText(state.doc?.items || [], state.doc?.globalFlags || { random:false, choice:false, randomChoice:false, number:false, open:false }, state.doc?.onOffControls || []),
        activeFlags
      );

      const quizItems = (parsed.items && parsed.items.length) ? parsed.items : (state.doc?.items || []);
      const allIndices = quizItems.map((_, i) => i);
      const order = Array.isArray(orderIndices) ? orderIndices.slice() : (activeFlags.random ? shuffle(allIndices) : allIndices);

      state.quiz.activeFlags = activeFlags;
      state.quiz.items = quizItems;
      state.quiz.order = order;
      state.quiz.index = 0;
      state.quiz.typedAnswer = "";
      state.quiz.lastResult = null;
      state.quiz.attempts = {};
      state.quiz.onlyWrong = !!onlyWrong;
      state.quiz.startedAt = Date.now();
      state.quiz.finishedAt = 0;
      state.quiz.elapsedMs = 0;
      state.quiz.phase = "question";
      state.screen = "quiz";
      document.title = state.doc?.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";
      render();
    }

    function startQuiz(docData, id, orderIndices = null, onlyWrong = false) {
      state.doc = { ...docData, comments: sortComments(docData.comments || []), images: docData.images || {} };
      state.docId = id;
      setAccessModeForDoc(state.doc, id);
      state.showComments = false;
      state.commentDraft = { name: getCommentName(), text: "", isPrivate: false, replyTo: "", scoreWanted: false };

      if (state.accessMode === "key") {
        rememberAccess(id, docData.key, {
          title: docData.title || "",
          subtitle: docData.subtitle || "",
          createdAt: normalizeTs(docData.createdAt) || Date.now(),
          updatedAt: normalizeTs(docData.updatedAt) || Date.now()
        });
      }

      if (state.accessMode === "owner") {
        upsertMyMeta({
          id,
          title: docData.title || "",
          subtitle: docData.subtitle || "",
          createdAt: normalizeTs(docData.createdAt) || Date.now(),
          updatedAt: normalizeTs(docData.updatedAt) || Date.now()
        });
      }

      state.quiz.baseFlags = { ...(docData.globalFlags || {}) };
      state.quiz.onOffControls = Array.from(new Set(docData.onOffControls || []));
      applyOnOffDefaultsToQuiz();
      state.quiz.pendingOrder = orderIndices || null;
      state.quiz.pendingOnlyWrong = !!onlyWrong;

      if (state.quiz.onOffControls.length) {
        state.quiz.phase = "settings";
        state.screen = "quiz";
        render();
      } else {
        beginQuizRun(orderIndices, onlyWrong);
      }
    }

    function restartQuiz() {
      if (!state.doc) return;
      beginQuizRun(state.quiz.onlyWrong ? state.quiz.order : null, state.quiz.onlyWrong);
    }

    function startWrongOnlyQuiz() {
      if (!state.doc) return;
      const wrong = state.quiz.order.filter(idx => !state.quiz.attempts[idx]?.correct);
      if (!wrong.length) return alert("間違えた問題がないよ");
      beginQuizRun(wrong, true);
    }

    function finalizeQuizTime() {
      if (!state.quiz.finishedAt) {
        state.quiz.finishedAt = Date.now();
        state.quiz.elapsedMs = Math.max(0, state.quiz.finishedAt - (state.quiz.startedAt || state.quiz.finishedAt));
      }
    }

    function forceFinishAsWrong() {
      if (!state.doc) return;
      const q = currentQuestion();
      if (q && !state.quiz.attempts[q.idx]) state.quiz.attempts[q.idx] = { given: "", correct: false };
      const nextIndex = state.quiz.phase === "question" ? state.quiz.index + 1 : state.quiz.index;
      for (const idx of state.quiz.order.slice(nextIndex)) {
        if (!state.quiz.attempts[idx]) state.quiz.attempts[idx] = { given: "", correct: false };
      }
      finalizeQuizTime();
      state.quiz.phase = "done";
      render();
    }

    function nextQuestion() {
      state.quiz.index += 1;
      state.quiz.typedAnswer = "";
      state.quiz.lastResult = null;
      if (state.quiz.index >= state.quiz.order.length) {
        finalizeQuizTime();
        state.quiz.phase = "done";
      } else {
        state.quiz.phase = "question";
      }
      render();
    }

    function submitAnswer() {
      const q = currentQuestion();
      if (!q) return;
      const given = state.quiz.typedAnswer;
      if (!String(given || "").trim()) return alert("答えを入れてね");

      let correct = false;
      if (q.item.mode === "choice") {
        const normalizedGiven = norm(given);
        const correctOptions = (q.item.options || []).filter(o => o.correct).map(o => norm(o.text));
        correct = correctOptions.includes(normalizedGiven);
      } else if (q.item.mode === "number") {
        correct = (q.item.answers || []).map(v => String(v).replace(/\D/g, "")).includes(String(given).replace(/\D/g, ""));
      } else {
        correct = (q.item.answers || []).map(norm).includes(norm(given));
      }

      state.quiz.attempts[q.idx] = { given, correct };
      state.quiz.lastResult = { idx: q.idx, given, correct };
      state.quiz.phase = "result";
      render();
    }

    function syncEditorArea(textarea, gutter) {
      textarea.style.height = "auto";
      const next = Math.max(420, textarea.scrollHeight);
      textarea.style.height = `${next}px`;
      gutter.style.height = `${next}px`;
      const count = Math.max(1, textarea.value.split(/\r?\n/).length);
      gutter.textContent = Array.from({ length: count }, (_, i) => i + 1).join("\n");
    }

    let editorRaf = 0;
    const scheduleEditorSync = (textarea, gutter) => {
      cancelAnimationFrame(editorRaf);
      editorRaf = requestAnimationFrame(() => syncEditorArea(textarea, gutter));
    };

    function caretCoordinates(textarea, pos) {
      const style = getComputedStyle(textarea);
      const div = document.createElement("div");
      const span = document.createElement("span");
      const props = ["boxSizing","width","height","overflowX","overflowY","borderTopWidth","borderRightWidth","borderBottomWidth","borderLeftWidth","paddingTop","paddingRight","paddingBottom","paddingLeft","fontStyle","fontVariant","fontWeight","fontStretch","fontSize","fontFamily","lineHeight","letterSpacing","textIndent","textTransform","wordSpacing","tabSize","MozTabSize"];
      props.forEach(p => { div.style[p] = style[p]; });
      div.style.position = "absolute";
      div.style.visibility = "hidden";
      div.style.whiteSpace = "pre-wrap";
      div.style.wordWrap = "break-word";
      div.style.overflow = "auto";
      div.style.left = "-9999px";
      div.style.top = "0";
      div.style.width = `${textarea.offsetWidth}px`;
      div.textContent = textarea.value.substring(0, pos);
      span.textContent = textarea.value.substring(pos) || ".";
      div.appendChild(span);
      document.body.appendChild(div);
      div.scrollTop = textarea.scrollTop;
      div.scrollLeft = textarea.scrollLeft;
      const rect = span.getBoundingClientRect();
      const dRect = div.getBoundingClientRect();
      const out = { left: rect.left - dRect.left, top: rect.top - dRect.top, height: parseFloat(style.lineHeight) || 20 };
      document.body.removeChild(div);
      return out;
    }

    function replaceTriggerAtCaret(textarea, triggerChar, insertValue) {
      const pos = textarea.selectionStart ?? 0;
      const end = textarea.selectionEnd ?? pos;
      if (pos <= 0) return;
      if (textarea.value[pos - 1] !== triggerChar) return;
      const start = pos - 1;
      textarea.value = textarea.value.slice(0, start) + insertValue + textarea.value.slice(end);
      const newPos = start + insertValue.length;
      textarea.selectionStart = textarea.selectionEnd = newPos;
      textarea.focus();
      textarea.dispatchEvent(new Event("input", { bubbles: true }));
    }

    function nextPictureNumber(text, images = {}) {
      let max = 0;
      const scan = String(text ?? "");
      let m;
      while ((m = PICTURE_TAG_RE.exec(scan))) max = Math.max(max, Number(m[1]) || 0);
      for (const k of Object.keys(images || {})) max = Math.max(max, Number(k) || 0);
      return max + 1;
    }

    function resizeImageFile(file, maxSide = 1280, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = async () => {
          try {
            const { width, height } = img;
            const scale = Math.min(1, maxSide / Math.max(width, height));
            const targetW = Math.max(1, Math.round(width * scale));
            const targetH = Math.max(1, Math.round(height * scale));
            const canvas = document.createElement("canvas");
            canvas.width = targetW;
            canvas.height = targetH;
            const ctx = canvas.getContext("2d");
            if (!ctx) throw new Error("Canvas context unavailable");
            ctx.drawImage(img, 0, 0, targetW, targetH);
            const type = "image/jpeg";
            const dataUrl = canvas.toDataURL(type, quality);
            URL.revokeObjectURL(url);
            resolve(dataUrl);
          } catch (err) {
            URL.revokeObjectURL(url);
            reject(err);
          }
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("画像の読み込みに失敗したよ"));
        };
        img.src = url;
      });
    }

    function renderRichTextWithPictures(text, images = {}) {
      const source = String(text ?? "");
      let html = "";
      let last = 0;
      const regex = /\[picture\((\d+)\)\]/ig;
      let m;
      while ((m = regex.exec(source))) {
        const before = source.slice(last, m.index);
        html += esc(before).replace(/\n/g, "<br>");
        const n = String(Number(m[1]));
        const src = images?.[n];
        html += src
          ? `<img class="quizPicture" src="${esc(src)}" alt="picture ${esc(n)}" loading="lazy">`
          : `<div class="pictureMissing">[picture(${esc(n)})] の画像がまだないよ</div>`;
        last = m.index + m[0].length;
      }
      html += esc(source.slice(last)).replace(/\n/g, "<br>");
      return html;
    }

    function setupFloatingTriggerSuggestions({ host, textarea, box, triggerChar, items, onPick }) {
      if (!host || !textarea || !box) return;

      const hide = () => {
        box.innerHTML = "";
        box.classList.add("hide");
      };

      const getItems = () => typeof items === "function" ? items() : items;

      const refresh = () => {
        const pos = textarea.selectionStart ?? 0;
        const active = pos > 0 && textarea.value[pos - 1] === triggerChar;
        if (!active) return hide();

        const list = getItems() || [];
        box.classList.remove("hide");
        box.innerHTML = list.map(it => `<button type="button" class="ghost miniAction suggestChip" data-value="${esc(it.value)}">${esc(it.label)}</button>`).join("");

        const hostRect = host.getBoundingClientRect();
        const taRect = textarea.getBoundingClientRect();
        const caret = caretCoordinates(textarea, pos);

        let left = taRect.left - hostRect.left + caret.left + 10;
        let top = taRect.top - hostRect.top + caret.top + caret.height + 8;

        requestAnimationFrame(() => {
          const maxLeft = Math.max(8, host.clientWidth - box.offsetWidth - 8);
          const maxTop = Math.max(8, host.clientHeight - box.offsetHeight - 8);
          if (left > maxLeft) left = maxLeft;
          if (top > maxTop) top = Math.max(8, (taRect.top - hostRect.top) + caret.top - box.offsetHeight - 12);
          box.style.left = `${Math.max(8, left)}px`;
          box.style.top = `${Math.max(8, top)}px`;
        });

        box.querySelectorAll(".suggestChip").forEach(btn => {
          btn.addEventListener("mousedown", e => e.preventDefault());
          btn.addEventListener("click", () => {
            const value = btn.dataset.value || "";
            replaceTriggerAtCaret(textarea, triggerChar, value);
            if (typeof onPick === "function") onPick(value);
            hide();
          });
        });
      };

      textarea.addEventListener("input", refresh);
      textarea.addEventListener("keyup", refresh);
      textarea.addEventListener("click", refresh);
      textarea.addEventListener("focus", refresh);
      textarea.addEventListener("scroll", refresh);
      textarea.addEventListener("blur", () => setTimeout(hide, 120));
      refresh();
    }

    function isOpenDoc(docData) {
      return !!(docData?.globalFlags?.open || docData?.keyMode === "open");

    async function addComment() {
      if (!state.docId || !state.doc) return;

      let name = (state.commentDraft?.name || getCommentName()).trim() || "匿名";
      const text = (state.commentDraft?.text || "").trim();
      const isPrivate = !!state.commentDraft?.isPrivate;
      const replyTo = String(state.commentDraft?.replyTo || "");
      if (!text) return alert("コメントを書いてね");

      if (name !== "匿名" && latestCommentNameConflict(name)) {
        const yes = confirm(`「${name}」はもう使われてるよ。\n後ろに -uuid(4桁) を追加して投稿する？`);
        if (yes) name = `${name}-${suffix4()}`;
      }

      const role = state.accessMode === "owner" ? "owner" : (state.accessMode === "key" ? "editor" : "viewer");
      const proofs = {};
      if (text.includes("[[SCORE]]")) proofs.scoreLabel = currentScoreMeta().label;
      if (text.includes("[[TIME]]") && isPerfectScore()) {
        proofs.timeLabel = formatElapsed(state.quiz.elapsedMs || (Date.now() - (state.quiz.startedAt || Date.now())));
      }

      const comment = {
        id: uid(),
        authorToken: getCommentToken(),
        authorName: name,
        authorRole: role,
        text,
        isPrivate,
        parentId: replyTo || null,
        proofs,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      setCommentName(name);
      const next = sortComments([...(state.doc.comments || []), comment]);
      await persistComments(next);

      state.commentDraft.text = "";
      state.commentDraft.isPrivate = false;
      state.commentDraft.name = name;
      state.commentDraft.replyTo = "";
      state.commentDraft.scoreWanted = false;
      state.showComments = true;
      render();

    async function ensureUniqueTitleAndId(baseTitle, currentId = "") {
      let candidateTitle = baseTitle.trim();
      while (true) {
        const candidateId = slugify(candidateTitle);
        const snap = await getDocs(collection(db, COLLECTION));
        const exists = snap.docs.some(d => {
          if (d.id === currentId) return false;
          const data = d.data() || {};
          const docTitle = String(data.title || "").trim();
          return d.id === candidateId || docTitle === candidateTitle;
        });
        if (!exists) return { title: candidateTitle, id: candidateId };
        const yes = confirm(`「${candidateTitle}」はもうあるよ。\n後ろに -uuid(4桁) を追加しますか？`);
        if (!yes) throw new Error("SAVE_CANCELLED");
        candidateTitle = `${candidateTitle}-${suffix4()}`;
      }
    }

    async function loadCatalog(force = false) {
      if (state.catalogLoaded && !force) return;
      const snap = await getDocs(collection(db, COLLECTION));
      state.allDocs = snap.docs.map(d => normalizeDoc(d.id, d.data() || {}));
      state.catalogLoaded = true;
      rebuildPublicOrder();

    function rebuildPublicOrder() {
      state.publicOrder = shuffle(state.allDocs.filter(isOpenDoc).map(d => d.id));
    }

    function normalizeDoc(id, data) {
      const parsed = data.rawText ? parseItems(data.rawText) : { globalFlags: { random:false, choice:false, randomChoice:false, number:false, open:false }, onOffControls: [], items: [] };
      const items = Array.isArray(data.items) && data.items.length ? data.items.map(normalizeItem) : parsed.items.map(normalizeItem);
      const globalFlags = {
        random: !!(data.globalFlags?.random ?? parsed.globalFlags?.random),
        choice: !!(data.globalFlags?.choice ?? parsed.globalFlags?.choice),
        randomChoice: !!(data.globalFlags?.randomChoice ?? parsed.globalFlags?.randomChoice),
        number: !!(data.globalFlags?.number ?? parsed.globalFlags?.number),
        open: !!(data.globalFlags?.open ?? parsed.globalFlags?.open)
      };
      return {
        id,
        title: data.title || "問題",
        subtitle: data.subtitle || "",
        items,
        rawText: data.rawText || "",
        globalFlags,
        onOffControls: Array.from(new Set(data.onOffControls || parsed.onOffControls || [])),
        keyMode: data.keyMode || "key",
        key: data.key || "",
        ownerToken: data.ownerToken || "",
        slug: data.slug || id,
        createdAt: data.createdAt || null,
        updatedAt: data.updatedAt || null,
        comments: sortComments(Array.isArray(data.comments) ? data.comments : []),
        images: data.images || {}
      };
    }

    function buildCodeText(docData) {
      const parts = [];
      if (docData.rawText) parts.push(docData.rawText);
      for (const item of docData.items || []) {
        if (item.section) parts.push(item.section);
        parts.push(item.question || "");
        if (item.mode === "choice") parts.push((item.options || []).map(o => o.text).join(" "));
        else parts.push((item.answers || []).join(" "));
      }
      return parts.join(" ").toLowerCase();
    }

    function scoreDocForQuery(docData, query) {
      const terms = splitSearchTerms(query);
      if (!terms.length) return null;
      const title = String(docData.title || "").toLowerCase();
      const subtitle = String(docData.subtitle || "").toLowerCase();
      const code = buildCodeText(docData);
      let group = 3, score = 0;
      for (const termRaw of terms) {
        const term = termRaw.toLowerCase();
        if (title.includes(term)) { score += term.length * 10; group = Math.min(group, 0); }
        else if (subtitle.includes(term)) { score += term.length * 5; group = Math.min(group, 1); }
        else if (code.includes(term)) { score += term.length * 1; group = Math.min(group, 2); }
        else return null;
      }
      return { group, score };
    }

    function getLibraryDocs() {
      const mineIds = new Set(loadMyList().map(v => v.id));
      const accessIds = new Set(loadAccessList().map(v => v.id));
      const ownerToken = getCookie(OWNER_COOKIE);
      const mine = [], access = [];
      for (const d of state.allDocs) {
        const ownedByMe = !!(ownerToken && d.ownerToken && d.ownerToken === ownerToken) || mineIds.has(d.id);
        const accessed = accessIds.has(d.id);
        if (ownedByMe) mine.push(d);
        else if (accessed) access.push(d);
      }
      mine.sort((a, b) => (normalizeTs(b.updatedAt) || 0) - (normalizeTs(a.updatedAt) || 0));
      access.sort((a, b) => (normalizeTs(b.updatedAt) || 0) - (normalizeTs(a.updatedAt) || 0));
      return { mine, access };
    }

    const getPublicDocs = () => state.allDocs.filter(isOpenDoc);

    function canEditDocMeta(docData) {
      if (docData.globalFlags?.open || docData.keyMode === "open") return true;
      const ownerToken = getCookie(OWNER_COOKIE);
      if (ownerToken && docData.ownerToken && ownerToken === docData.ownerToken) return true;
      const rec = findAccessRecord(docData.id);
      return !!(rec && docData.key && rec.key === docData.key);
    }

    function searchDocs(docs, query) {
      const q = String(query || "").trim();
      if (!q) return docs.slice();
      const ranked = [];
      for (const d of docs) {
        const result = scoreDocForQuery(d, q);
        if (!result) continue;
        ranked.push({ doc: d, ...result });
      }
      ranked.sort((a, b) => a.group !== b.group ? a.group - b.group : b.score !== a.score ? b.score - a.score : (normalizeTs(b.doc.updatedAt) || 0) - (normalizeTs(a.doc.updatedAt) || 0));
      return ranked.map(r => r.doc);
    }

    function getSearchResultsForHomeTab() {
      const tab = state.homeTab;
      const query = state.homeQueries[tab] || "";
      if (tab === "library") {
        const { mine, access } = getLibraryDocs();
        const union = [];
        const seen = new Set();
        const add = (docData, source) => {
          if (seen.has(docData.id)) return;
          seen.add(docData.id);
          union.push({ ...docData, source });
        };
        searchDocs(mine, query).forEach(d => add(d, "mine"));
        searchDocs(access, query).forEach(d => add(d, "access"));
        return union;
      }
      return searchDocs(getPublicDocs(), query);
    }

    function attachHomeObserver(tab, hasMore) {
      if (homeObserver) {
        homeObserver.disconnect();
        homeObserver = null;
      }
      const sentinel = document.getElementById("homeSentinel");
      if (!sentinel || !hasMore || !("IntersectionObserver" in window)) return;
      homeObserver = new IntersectionObserver(entries => {
        if (entries.some(e => e.isIntersecting)) {
          state.homeVisibleCount[tab] += tab === "public" ? 12 : 20;
          render();
        }
      }, { rootMargin: "220px" });
      homeObserver.observe(sentinel);
    }

      if (saveBtn) {

          const title = d.title.trim();

          const parsed = parseItems(d.rawText);

              alert("保存をやめたよ");

            throw e;

          const finalTitle = unique.title;
          const newId = unique.id;
          const isExisting = !!state.doc;

            items,

            globalFlags,
            onOffControls,
            keyMode: effectiveKeyMode,
            key: effectiveKey,

            images

            state.doc = { ...payload, items, comments: sortComments(existingComments), images };
            d.title = finalTitle;

            const normalized = normalizeDoc(newId, payload);
            const idx = state.allDocs.findIndex(x => x.id === newId);
            if (idx >= 0) state.allDocs[idx] = normalized;
            else state.allDocs.unshift(normalized);
            rebuildPublicOrder();

            if (isOwner() || !isExisting) upsertMyMeta({
              id: newId,
              title: payload.title,
              subtitle: payload.subtitle,
              createdAt: payload.createdAt,
              updatedAt: payload.updatedAt
            });
            if (state.accessMode === "key") {
              rememberAccess(newId, effectiveKey, {
                title: payload.title,
                subtitle: payload.subtitle,
                createdAt: payload.createdAt,
                updatedAt: payload.updatedAt
              });
            }

            location.hash = `#/${encodeURIComponent(newId)}`;
            const link = prettyLink(newId);
            navigator.clipboard?.writeText(link).catch(() => {});
            alert(`保存したよ！\n\n${link}`);
            startQuiz(state.doc, newId);
          } catch (err) {
            console.error("save failed:", err);
            alert(`保存で失敗したよ: ${err?.message || err}`);
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = "保存";
          }
        });
      }

      if (deleteBtn) deleteBtn.addEventListener("click", openDeleteConfirmThenDelete);
      if (leaveBtn) leaveBtn.addEventListener("click", openLeaveConfirmThenLeave);

      scheduleEditorSync(problemText, gutter);
      setupEditorTagSuggestions(editorHost, problemText, tagSuggestBox);
      refreshKeyStatus();
      renderPicturePreview();
      titleInput.focus();
      bindGlobalButtons();
    }

    function renderCommentNode(comment, comments, depth = 0) {
      if (!canViewComment(comment)) return `<div class="commentItem" style="margin-left:${depth * 14}px"><div class="commentMask">🫥</div></div>`;
      const role = comment.authorRole || "viewer";
      const roleLabel = commentRoleLabel(role);

      const canManage = canManageComment(comment);
      const parent = comment.parentId ? comments.find(c => c.id === comment.parentId) : null;
      const children = comments.filter(c => c.parentId === comment.id).sort((a, b) => (normalizeTs(a.createdAt) || 0) - (normalizeTs(b.createdAt) || 0));
      const replyLine = parent ? `<div class="metaLine">↳ ${esc(parent.authorName || "匿名")} への返信</div>` : "";

      return `
        <div class="commentItem ${roleClass}" style="margin-left:${depth * 14}px">
          ${replyLine}

        renderHome();
      } else if (state.screen === "editor") {
        renderEditor();
      } else if (state.screen === "quiz") {
        if (!state.doc || !state.doc.items || !state.doc.items.length) {
          state.screen = "home";
          render();
          return;
        }
        if (state.quiz.phase === "settings") renderSettings();
        else if (state.quiz.phase === "question") renderQuestion();
        else if (state.quiz.phase === "result") renderResult();
        else if (state.quiz.phase === "done") renderDone();
      }
      renderTutorialLayer();
      renderPartnerLayer();
    }

    function tutorialPages() {
      return [
        {
          title: "ようこそ",
          subtitle: "このサイトの入口だよ。",
          body: `
            <div class="tutorialCard tutorialHero">

            </div>
          `

            </div>
          `
        },
        {
          title: "作る",
          subtitle: "文法を1つずつ見よう。",
          body: `
            <div class="tutorialCard tutorialHero">
              <h2>基本</h2>
              <p>1行に <b>A=B</b> と書くと、A が問題文、B が答えになる。<br>1行につき1問。<br><b>=</b> がない行は見出しになるよ。</p>
            </div>

              <h2>1行目に書くタグ</h2>
              <p>1行目の先頭に書く。<br>複数あるときは半角スペースで区切る。<br>1行目に書いたタグは、その下の全部の問題に効く。</p>
            </div>

              <h2>[picture(1)]</h2>
              <p>画像をつける。<br>同じ番号なら同じ画像が表示される。<br>問題文の前に置いて使う。</p>
            </div>
            <div class="tutorialCard tutorialHero">
              <h2>[random]</h2>
              <p>問題の順番をランダムにする。</p>
            </div>
            <div class="tutorialCard tutorialHero">
              <h2>[choice]</h2>
              <p>全体を選択式にする。</p>
            </div>
            <div class="tutorialCard tutorialHero">
              <h2>[random choice]</h2>
              <p>選択式にして、選択肢の順番もランダムにする。</p>
            </div>
            <div class="tutorialCard tutorialHero">
              <h2>[number]</h2>
              <p>数字入力モードにする。</p>
            </div>

              <h2>[open]</h2>
              <p>公開クイズにする。オンライン公開クイズ一覧に出る。</p>
            </div>

              <p>1行目に書くと、始める前にON/OFFを選べる項目になる。<br>このサイトでは今は <b>[ONorOFF:random]</b> だけを使う。</p>

          subtitle: "準備はできた。あとは始めるだけ。",
          body: `

              <h2>それじゃ、始めよう</h2>
              <p>「作成」から始めて、公開して、コメントして、遊んでみてね。<br>右上の「説明を読む」から、またいつでも見直せるよ。</p>
            </div>
