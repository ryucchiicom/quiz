<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題作成サイト</title>
  <style>
    :root{
      --bg1:#f8faff;
      --bg2:#eef2f8;
      --panel:#fff;
      --line:#d8dbe5;
      --text:#1f2430;
      --muted:#6b7280;
      --accent:#2f6fed;
      --good:#118a3a;
      --bad:#d33c3c;
      --radius:18px;
      --shadow:0 12px 30px rgba(20,25,40,.08);
      --ownerBg:rgba(47,111,237,.08);
      --ownerLine:rgba(47,111,237,.42);
      --editorBg:rgba(58,168,255,.08);
      --editorLine:rgba(58,168,255,.42);
    }

    body.dark{
      --bg1:#0b1120;
      --bg2:#111827;
      --panel:#111827;
      --line:#243043;
      --text:#e7ecf7;
      --muted:#9aa4b2;
      --accent:#5b8cff;
      --good:#39c66d;
      --bad:#ff7676;
      --shadow:0 12px 30px rgba(0,0,0,.26);
      --ownerBg:rgba(91,140,255,.12);
      --ownerLine:rgba(91,140,255,.45);
      --editorBg:rgba(58,168,255,.12);
      --editorLine:rgba(88,189,255,.45);
    }

    html, body{ overflow-x:auto; }
    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    button,input,textarea,select{ font:inherit; }
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
    }

    .hide{ display:none !important; }
    .page{ max-width:980px; margin:0 auto; padding:16px; min-height:100vh; }

    .titleArea{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      min-width:0;
    }
    .titleBlock{ min-width:0; }

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      position:sticky;
      top:0;
      padding:8px 0 12px;
      backdrop-filter:blur(8px);
      z-index:5;
    }

    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.1;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(15,23,42,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .hero{
      max-width:860px;
      margin:36px auto 0;
      display:grid;
      gap:16px;
    }

    .bigBtn,.primary{
      background:var(--accent);
      color:#fff;
      font-weight:800;
    }

    .ghost{
      background:#eef3ff;
      color:#244a9c;
      border:1px solid #d7e2ff;
      font-weight:700;
    }

    body.dark .ghost{
      background:#182133;
      color:#d7e5ff;
      border-color:#2d3a4f;
    }

    .danger{
      background:#ffeded;
      color:#a72b2b;
      border:1px solid #ffc7c7;
      font-weight:800;
    }

    body.dark .danger{
      background:#2a1620;
      color:#ffaaaa;
      border-color:#5b2a39;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .input{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 15px;
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .input:focus{
      border-color:#9ab8ff;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }

    .label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .gridEditor{
      display:grid;
      grid-template-columns:64px 1fr;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      min-height:420px;
      background:var(--panel);
      align-items:stretch;
    }

    .gutter{
      background:rgba(127,127,127,.07);
      border-right:1px solid var(--line);
      padding:14px 8px 14px 0;
      text-align:right;
      color:#8a93a8;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      user-select:none;
      overflow:hidden;
      align-self:stretch;
      min-height:420px;
    }

    .editorTextWrap{
      position:relative;
      min-height:420px;
      overflow:hidden;
      background:var(--panel);
    }

    .editorMirror{
      position:absolute;
      inset:0;
      padding:14px;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      overflow:auto;
      color:var(--text);
      pointer-events:none;
      z-index:1;
      scrollbar-gutter:stable;
    }

    .editorMirror .memoText{ color:#98a0af; }
    body.dark .editorMirror .memoText{ color:#7e8798; }

    .textarea{
      position:relative;
      z-index:2;
      width:100%;
      border:none;
      outline:none;
      resize:none;
      min-height:420px;
      padding:14px;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      overflow:auto;
      touch-action:pan-x pan-y;
      tab-size:2;
      background:transparent;
      color:transparent;
      caret-color:var(--text);
      scrollbar-gutter:stable;
    }

    .help,.note{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .quiz{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .progress{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .sectionText{
      font-size:18px;
      font-weight:900;
      line-height:1.35;
      color:#334155;
      word-break:break-word;
      white-space:normal;
    }
    body.dark .sectionText{ color:#d7def0; }

    .question{
      font-size:clamp(22px,4vw,32px);
      font-weight:900;
      line-height:1.4;
      word-break:break-word;
      white-space:normal;
    }

    .answer{
      width:100%;
      font-size:18px;
      padding:16px;
      border-radius:16px;
      border:1px solid var(--line);
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .answerFields{
      display:grid;
      gap:10px;
      grid-template-columns:1fr;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .submit{
      background:var(--accent);
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .next{
      background:#1c9c59;
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .good{
      border:1px solid rgba(47,111,237,.22);
      background:#eef4ff;
      color:var(--accent);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }
    body.dark .good{
      border-color:rgba(91,140,255,.35);
      background:#13264a;
      color:#9ebdff;
    }

    .bad{
      border:1px solid rgba(211,60,60,.22);
      background:#fff3f3;
      color:var(--bad);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }

    .explain{
      background:#f8faff;
      border:1px solid #dbe4fb;
      padding:14px 16px;
      border-radius:16px;
      line-height:1.8;
      word-break:break-word;
      color:#2b3241;
    }
    body.dark .explain{
      background:#182133;
      border-color:#2d3a4f;
      color:#e7ecf7;
    }

    .summary{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .score{
      font-size:28px;
      font-weight:1000;
      line-height:1.2;
    }

    .reviewList{
      display:grid;
      gap:10px;
    }

    .reviewItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 15px;
      background:var(--panel);
      display:grid;
      gap:6px;
    }

    .reviewItem.reviewGood{
      border-color:rgba(47,111,237,.35);
      background:rgba(47,111,237,.06);
    }

    .reviewItem.reviewBad{
      border-color:rgba(211,60,60,.35);
      background:rgba(211,60,60,.06);
    }

    body.dark .reviewItem.reviewGood{
      border-color:rgba(91,140,255,.40);
      background:rgba(91,140,255,.10);
    }
    body.dark .reviewItem.reviewBad{
      border-color:rgba(255,118,118,.35);
      background:rgba(255,118,118,.08);
    }

    .reviewSection{
      font-size:15px;
      font-weight:900;
      color:#334155;
      line-height:1.4;
    }
    body.dark .reviewSection{ color:#d7def0; }

    .reviewQ{
      font-weight:900;
      font-size:16px;
      word-break:break-word;
    }

    .reviewA{
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .listGrid{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      box-shadow:var(--shadow);
      padding:14px 15px;
    }

    .listMeta{
      min-width:0;
      display:grid;
      gap:4px;
      flex:1;
    }

    .listActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .miniAction{
      padding:10px 12px;
      font-size:13px;
      border-radius:12px;
      white-space:nowrap;
    }

    .metaLine{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .commentWrap{
      display:grid;
      gap:12px;
    }

    .commentForm{
      display:grid;
      gap:10px;
    }

    .commentHeader{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .commentToggleRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .commentBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      font-weight:800;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(127,127,127,.08);
      color:var(--text);
    }

    .commentPrivateNote{
      font-size:12px;
      color:var(--muted);
    }

    .commentMask{
      font-weight:900;
      font-size:18px;
      line-height:1.4;
    }

    .commentBody{
      white-space:pre-wrap;
      line-height:1.8;
      word-break:break-word;
      color:var(--text);
    }

    .scoreToken{
      color:#14994a;
      font-weight:900;
    }

    .timeToken{
      color:#2f6fed;
      font-weight:900;
    }
    body.dark .scoreToken{ color:#66e08d; }
    body.dark .timeToken{ color:#8db2ff; }

    .commentItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 15px;
      background:var(--panel);
      display:grid;
      gap:6px;
    }

    .commentOwner{
      border-color:var(--ownerLine);
      background:var(--ownerBg);
    }

    .commentEditor{
      border-color:var(--editorLine);
      background:var(--editorBg);
    }

    .commentViewer{
      border-color:var(--line);
      background:var(--panel);
    }

    .choiceGrid{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    }

    .choiceBtn{
      text-align:center;
      width:100%;
    }

    .choiceBtn.selected{
      background:#dfe9ff !important;
      border-color:#9ab8ff !important;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
      color:#173a88 !important;
    }

    body.dark .choiceBtn.selected{
      background:#31445f !important;
      border-color:#6b92ff !important;
      box-shadow:0 0 0 4px rgba(91,140,255,.15);
      color:#f3f7ff !important;
    }

    .homeControls{
      display:grid;
      gap:10px;
    }

    .homeTopRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .tabSelect{
      min-width:220px;
      max-width:100%;
      height:48px;
    }

    .searchWrap{
      display:flex;
      gap:8px;
      align-items:center;
      flex:1;
      min-width:220px;
    }

    .searchInput{
      flex:1;
      height:48px;
    }

    .homeSectionTitle{
      font-size:16px;
      font-weight:900;
      margin:0 0 10px;
      color:var(--text);
    }

    .dividerLine{
      text-align:center;
      color:var(--muted);
      font-weight:900;
      margin:10px 0 6px;
      user-select:none;
    }

    .publicBadge{
      font-size:12px;
      font-weight:900;
      color:var(--accent);
      border:1px solid rgba(47,111,237,.2);
      background:rgba(47,111,237,.08);
      padding:4px 8px;
      border-radius:999px;
      white-space:nowrap;
    }

    body.dark .publicBadge{
      color:#a9c0ff;
      border-color:rgba(91,140,255,.28);
      background:rgba(91,140,255,.10);
    }

    .homeMeta{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .editorHost,
    .commentInputHost{
      position:relative;
    }

    .floatSuggest{
      position:absolute;
      z-index:40;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:8px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      max-width:min(420px, calc(100% - 16px));
    }

    .replyBox{
      border:1px solid var(--line);
      background:rgba(127,127,127,.06);
      border-radius:14px;
      padding:10px 12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
    }

    .replyLabel{ font-size:13px; font-weight:900; color:var(--text); }
    .replyHint{ font-size:12px; color:var(--muted); }
    .timeOnlyNote{ font-size:12px; color:var(--muted); }

    .settingsScreen{
      display:grid;
      gap:14px;
    }

    .settingList{
      display:grid;
      gap:10px;
    }

    .settingRow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      width:100%;
      text-align:left;
      padding:16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:var(--shadow);
      color:var(--text);
    }

    .settingText{
      display:grid;
      gap:4px;
      min-width:0;
      flex:1;
    }

    .settingLabel{
      font-size:16px;
      font-weight:900;
      line-height:1.2;
    }

    .settingHint{
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .toggleSwitch{
      position:relative;
      width:58px;
      height:34px;
      border-radius:999px;
      background:#c8d0df;
      transition:.2s background;
      flex:none;
    }
    body.dark .toggleSwitch{ background:#42506a; }
    .toggleSwitch.on{ background:var(--accent); }

    .toggleKnob{
      position:absolute;
      top:3px;
      left:3px;
      width:28px;
      height:28px;
      border-radius:50%;
      background:#fff;
      box-shadow:0 4px 10px rgba(0,0,0,.15);
      transition:.2s transform;
    }
    .toggleSwitch.on .toggleKnob{ transform:translateX(24px); }

    .settingHeader{
      display:grid;
      gap:8px;
    }

    .settingTitle{
      font-size:26px;
      font-weight:1000;
      line-height:1.1;
      margin:0;
    }

    .settingSub{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    #tutorialLayer,
    #partnerLayer{
      position:fixed;
      inset:0;
      z-index:1000;
      pointer-events:none;
    }

    .tutorialOverlay,
    .partnerOverlay{
      position:fixed;
      inset:0;
      pointer-events:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:rgba(6,10,18,.64);
      backdrop-filter:blur(8px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .tutorialOverlay.closing,
    .partnerOverlay.closing{
      opacity:0;
      transform:translateY(18px);
    }

    .tutorialPanel,
    .partnerPanel{
      width:min(860px, 100%);
      max-height:min(86vh, 860px);
      overflow:hidden;
      border-radius:28px;
      background:var(--panel);
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 30px 80px rgba(0,0,0,.38);
      display:grid;
      grid-template-rows:auto 1fr auto;
    }

    .tutorialTop,
    .partnerTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:16px 18px 0;
    }

    .tutorialTitle,
    .partnerTitle{
      font-size:24px;
      font-weight:1000;
      line-height:1.1;
      margin:0;
    }

    .tutorialSub,
    .partnerSub{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    .tutorialClose,
    .partnerClose{
      width:44px;
      height:44px;
      border-radius:14px;
      padding:0;
      background:rgba(127,127,127,.10);
      color:var(--text);
      font-size:22px;
      font-weight:900;
    }

    .tutorialBody,
    .partnerBody{
      padding:14px 18px 6px;
      overflow:auto;
    }

    .tutorialPage{
      min-height:340px;
      display:grid;
      gap:14px;
      animation-duration:.26s;
      animation-fill-mode:both;
    }

    .tutorialPage.anim-open{ animation-name:tutInOpen; }
    .tutorialPage.anim-next{ animation-name:tutInRight; }
    .tutorialPage.anim-prev{ animation-name:tutInLeft; }
    .tutorialPage.anim-close{ animation-name:tutOutDown; }

    .tutorialCard{
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      background:rgba(127,127,127,.05);
    }
    body.dark .tutorialCard{ background:rgba(255,255,255,.03); }

    .tutorialHero{
      display:grid;
      gap:8px;
    }

    .tutorialHero h2{
      margin:0;
      font-size:28px;
      line-height:1.1;
      letter-spacing:-.03em;
    }

    .tutorialHero p{
      margin:0;
      line-height:1.8;
      color:var(--muted);
      font-size:15px;
    }

    .tutorialCode{
      background:#0f172a;
      color:#e8f0ff;
      border-radius:16px;
      padding:14px 16px;
      overflow:auto;
      font:600 14px/1.7 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre-wrap;
      word-break:break-word;
    }
    body.dark .tutorialCode{ background:#0a1220; }

    .tutorialFooter,
    .partnerFooter{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      padding:0 18px 18px;
      flex-wrap:wrap;
    }

    .tutorialDots{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
      flex:1;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:rgba(127,127,127,.35);
    }
    .dot.active{ background:var(--accent); }

    .tutorialNavBtn{
      min-width:110px;
      font-weight:900;
    }

    .partnerMenu{
      display:grid;
      gap:10px;
      padding:4px 0 0;
    }

    .partnerMenuBtn{
      width:100%;
      text-align:left;
      padding:16px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      box-shadow:var(--shadow);
      font-weight:900;
    }

    .partnerMenuBtn.primary{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }

    .inlinePicture{
      display:inline-block;
      max-width:min(100%, 280px);
      max-height:180px;
      vertical-align:middle;
      object-fit:contain;
      border-radius:12px;
      margin:2px 0;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }

    .pictureMissing{

    function uid() {

    function suffix4() {

    function slugify(text) {

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")

    function norm(s) {

        .replace(/\u3000/g, " ")

    function splitAnswers(text) {

    function normalizeOnOffTarget(raw) {

      if (t === "random") return t;

    function stripMemoSegments(text) {
      const s = String(text ?? "");
      let out = "";
      let memo = false;
      for (let i = 0; i < s.length; i++) {
        const ch = s[i];
        if (ch === "\n") {
          out += ch;
          memo = false;
          continue;
        }
        if (ch === ";") {
          memo = !memo;
          continue;
        }
        if (!memo) out += ch;
      }
      return out;
    }

    function renderMemoPreview(text) {
      const s = String(text ?? "");
      let html = "";
      let memo = false;

      const flush = () => {

      for (let i = 0; i < s.length; i++) {
        const ch = s[i];

          flush();
          html += "<br>";
          memo = false;
          continue;
        }
        if (ch === ";") {
          flush();
          html += `<span class="memoText">;</span>`;
          memo = !memo;
          continue;
        }
        buf += ch;

      flush();
      return html;

    function splitAnswerFields(text) {
      return String(text ?? "")
        .replace(/\s*\\n\s*/g, "\n")
        .replace(/\s*↵\s*/g, "\n")

        .split("\n")

    function normalizePictures(obj) {
      const out = {};
      if (!obj || typeof obj !== "object") return out;
      for (const [k, v] of Object.entries(obj)) {
        if (typeof v === "string" && v.startsWith("data:image/")) out[String(k)] = v;
      }

    function getPictureMap() {

    function getNextPictureNumber(text, pictures) {
      const nums = [];
      String(text || "").replace(/\[picture\((\d+)\)\]/g, (_, n) => { nums.push(Number(n)); return ""; });
      for (const k of Object.keys(pictures || {})) nums.push(Number(k));
      const max = nums.length ? Math.max(...nums.filter(n => Number.isFinite(n))) : 0;
      return max + 1;

    function getPictureRefsFromTexts(...texts) {
      const set = new Set();

        String(t || "").replace(/\[picture\((\d+)\)\]/g, (_, n) => {

        });

    function prunePicturesMap(pictures, refs) {
      const out = {};
      const keep = refs instanceof Set ? refs : new Set(refs || []);
      for (const [k, v] of Object.entries(normalizePictures(pictures || {}))) {
        if (keep.has(String(k))) out[String(k)] = v;

    function splitRespectingQuotes(text, separators) {
      const s = String(text ?? "");
      const seps = [...separators].sort((a, b) => b.length - a.length);
      const out = [];
      let buf = "";
      let inQuotes = false;

      for (let i = 0; i < s.length;) {
        const ch = s[i];
        if (ch === '"') {
          inQuotes = !inQuotes;
          i++;
          continue;
        }
        if (!inQuotes) {
          let matched = "";
          for (const sep of seps) {
            if (sep && s.startsWith(sep, i)) {
              matched = sep;
              break;
            }
          }
          if (matched) {
            out.push(buf);
            buf = "";
            i += matched.length;
            continue;
          }
        }
        buf += ch;
        i++;
      }
      out.push(buf);
      return out;
    }

    function unquoteAnswerLiteral(s) {
      return String(s ?? "").replace(/^"(.*)"$/s, "$1");
    }

    function normalizeAnswerText(s) {
      return norm(unquoteAnswerLiteral(s));
    }

    function parseSameTag(token) {
      const inside = token.slice(4).trim();
      const groups = [];
      const re = /\(([^)]*)\)/g;
      let m;
      while ((m = re.exec(inside))) {
        const v = unquoteAnswerLiteral(m[1].trim());
        if (v) groups.push(v);
      }
      return groups.length >= 2 ? groups : [];
    }

    function sameMatches(a, b, sameGroups, mode) {
      const na = normalizeForMode(a, mode);
      const nb = normalizeForMode(b, mode);
      if (na === nb) return true;
      for (const group of sameGroups || []) {
        const g = group.map(v => normalizeForMode(v, mode));
        if (g.includes(na) && g.includes(nb)) return true;
      }
      return false;
    }

    function splitAnswerValues(text) {
      const fields = splitRespectingQuotes(text, ["↵", "↩︎", "\\n"]);
      return fields.map(field => splitRespectingQuotes(field, [",", "、"]).map(v => unquoteAnswerLiteral(v.trim())).filter(Boolean));
    }

    function renderRichText(text, { allowColor = true, pictureMap = {} } = {}) {
      let s = String(text ?? "");
      s = s.replace(/\s*\\n\s*/g, "\n").replace(/\s*↵\s*/g, "\n").replace(/\s*↩︎\s*/g, "\n");

      let out = "";
      let color = null;
      let buf = "";

      const flush = () => {
        if (!buf) return;
        const safe = esc(buf);
        out += color ? `<span style="color:${color}">${safe}</span>` : safe;
        buf = "";
      };

      for (let i = 0; i < s.length;) {
        if (allowColor) {
          const m = s.slice(i).match(/^\[color\((#[0-9a-fA-F]{3,8})\)\]/);
          if (m) {
            flush();
            color = m[1];
            i += m[0].length;
            continue;
          }
        }

        const pm = s.slice(i).match(/^\[picture\((\d+)\)\]/);
        if (pm) {
          flush();
          const n = pm[1];
          const src = pictureMap[String(n)];
          if (src) {
            out += `<img class="inlinePicture" src="${esc(src)}" alt="picture ${esc(n)}">`;
          } else {
            out += `<span class="pictureMissing">[picture(${esc(n)})]</span>`;
          }
          i += pm[0].length;
          continue;
        }

        const ch = s[i];
        if (ch === "\n") {
          flush();
          out += "<br>";
          color = null;
          i++;
          continue;
        }
        if (ch === " ") {
          flush();
          out += " ";
          color = null;
          i++;
          continue;
        }
        buf += ch;
        i++;
      }
      flush();
      return out;
    }

    function renderAnswerText(answerGroups) {
      const groups = Array.isArray(answerGroups) ? answerGroups : [];
      if (!groups.length) return "";
      return groups.map(group => group.join(" / ")).join(" ↵ ");
    }

    function parseLeadingSettings(line) {
      let rest = String(line ?? "").trimStart();
      const tags = [];
      const onOffControls = [];
      const sameGroups = [];

      while (rest.startsWith("[")) {
        const tagMatch = rest.match(/^\[([^\]]+)\]/);
        if (!tagMatch) break;

        const token = tagMatch[1].trim();
        const tokenLower = token.toLowerCase();
        const after = rest.slice(tagMatch[0].length).trimStart();

        if (tokenLower.startsWith("onoroff:")) {
          const target = normalizeOnOffTarget(tokenLower.slice("onoroff:".length));
          if (target) onOffControls.push(target);
          rest = after;
          continue;
        }

        if (tokenLower.startsWith("same(")) {
          const g = parseSameTag(tokenLower);
          if (g.length) sameGroups.push(g);
          rest = after;
          continue;
        }

        if (TAGS.includes(tokenLower)) {
          tags.push(tokenLower);
          rest = after;
          continue;
        }

        break;
      }

      return { tags, onOffControls: Array.from(new Set(onOffControls)), sameGroups, rest };
    }

    function mergeFlags(base, tags) {
      const out = { ...base };
      for (const t of tags) {
        if (t === "random") out.random = true;
        if (t === "choice") out.choice = true;
        if (t === "random choice") { out.choice = true; out.randomChoice = true; }
        if (t === "number") out.number = true;
        if (t === "open") out.open = true;
      }
      return out;
    }

    function pickMode(globalFlags, localTags) {
      const localNumber = localTags.includes("number");
      const localChoice = localTags.includes("choice") || localTags.includes("random choice");
      const localRandomChoice = localTags.includes("random choice");
      if (localNumber) return { mode: "number", randomChoice: false };
      if (localChoice) return { mode: "choice", randomChoice: localRandomChoice || !!globalFlags.randomChoice };
      if (globalFlags.number) return { mode: "number", randomChoice: false };
      if (globalFlags.choice || globalFlags.randomChoice) return { mode: "choice", randomChoice: !!globalFlags.randomChoice };
      return { mode: "text", randomChoice: false };
    }

    function findFirstUnquoted(text, targets) {
      const s = String(text ?? "");
      const t = [...targets].sort((a, b) => b.length - a.length);
      let inQuotes = false;
      for (let i = 0; i < s.length; i++) {
        const ch = s[i];
        if (ch === '"') {
          inQuotes = !inQuotes;
          continue;
        }
        if (inQuotes) continue;
        for (const target of t) {
          if (s.startsWith(target, i)) return i;
        }
      }
      return -1;
    }

    function parseQuestionLine(line, globalFlags, globalSameGroups = []) {
      const { tags, onOffControls, sameGroups, rest } = parseLeadingSettings(line);
      const raw = rest.trim();
      if (!raw) return null;
      const eqIdx = findFirstUnquoted(raw, ["=", "＝"]);
      if (eqIdx < 0) return null;
      const question = raw.slice(0, eqIdx).trim();
      if (!question) return null;
      const { mode, randomChoice } = pickMode(globalFlags, tags);

      const mergedSameGroups = [...(globalSameGroups || []), ...(sameGroups || [])];

      if (mode === "choice") {
        const rawOptions = splitRespectingQuotes(raw.slice(eqIdx + 1).trim(), [",", "、"]).map(v => v.trim()).filter(Boolean);
        const options = rawOptions.map(opt => {
          let text = opt.trim(), correct = false;
          if (text.startsWith("!") || text.startsWith("*") || text.startsWith("＊")) {
            correct = true;
            text = text.slice(1).trim();
          }
          return { text: unquoteAnswerLiteral(text), correct };
        }).filter(o => o.text);
        if (!options.length) return null;
        if (!options.some(o => o.correct)) options[options.length - 1].correct = true;
        return { type: "question", mode: "choice", question, options, randomChoice, localTags: tags, localOnOffControls: onOffControls, sameGroups: mergedSameGroups };
      }

      if (mode === "number") {
        const answerText = raw.slice(eqIdx + 1).trim();
        const answerGroups = splitAnswerValues(answerText);
        if (!answerGroups.some(g => g.some(Boolean))) return null;
        return { type: "question", mode: "number", question, answerGroups, answers: answerGroups[0] || [], localTags: tags, localOnOffControls: onOffControls, sameGroups: mergedSameGroups };
      }

      const answerText = raw.slice(eqIdx + 1).trim();
      const answerGroups = splitAnswerValues(answerText);
      if (!answerGroups.some(g => g.some(Boolean))) return null;
      return { type: "question", mode: "text", question, answerGroups, answers: answerGroups[0] || [], localTags: tags, localOnOffControls: onOffControls, sameGroups: mergedSameGroups };
    }

    function parseItems(text, overrideFlags = null) {
      const cleanText = stripMemoSegments(String(text ?? ""));
      const lines = cleanText.split(/\r?\n/);
      const items = [];
      let globalFlags = { random: false, choice: false, randomChoice: false, number: false, open: false };
      let onOffControls = [];
      let globalSameGroups = [];

      let i = 0;
      while (i < lines.length && !String(lines[i]).trim()) i++;

      while (i < lines.length) {
        const raw = String(lines[i] ?? "");
        const trimmed = raw.trim();
        if (!trimmed) { i++; continue; }

        const parsed = parseLeadingSettings(raw);
        if (!parsed.rest && (parsed.tags.length || parsed.onOffControls.length || parsed.sameGroups.length)) {
          globalFlags = mergeFlags(globalFlags, parsed.tags);
          onOffControls = Array.from(new Set([...onOffControls, ...parsed.onOffControls]));
          globalSameGroups.push(...parsed.sameGroups);
          i++;
          continue;
        }

        break;
      }

      let currentSection = "";
      for (; i < lines.length; i++) {
        const line = String(lines[i] ?? "");
        const trimmed = line.trim();
        if (!trimmed) continue;

        const parsedSettings = parseLeadingSettings(line);
        if (!parsedSettings.rest && (parsedSettings.tags.length || parsedSettings.onOffControls.length || parsedSettings.sameGroups.length)) {
          globalFlags = mergeFlags(globalFlags, parsedSettings.tags);
          onOffControls = Array.from(new Set([...onOffControls, ...parsedSettings.onOffControls]));
          globalSameGroups.push(...parsedSettings.sameGroups);
          continue;
        }

        const parsed = parseQuestionLine(line, overrideFlags || globalFlags, globalSameGroups);
        if (parsed) {
          items.push({ id: uid(), section: currentSection, ...parsed });
          continue;
        }

        if (!trimmed.startsWith("[")) currentSection = trimmed;
      }

      return { globalFlags, onOffControls, items };
    }

    function packItemForFirestore(item) {
      if (!item || typeof item !== "object") return item;
      if (item.mode === "choice") {
        return {
          id: item.id || uid(),
          section: item.section || "",
          type: item.type || "question",
          mode: "choice",
          question: String(item.question || ""),
          options: (item.options || []).map(o => ({
            text: String(o?.text || ""),
            correct: !!o?.correct
          })).filter(o => o.text),
          randomChoice: !!item.randomChoice,
          localTags: Array.isArray(item.localTags) ? item.localTags.filter(Boolean).map(String) : [],
          localOnOffControls: Array.isArray(item.localOnOffControls) ? item.localOnOffControls.filter(Boolean).map(String) : [],
          sameGroups: Array.isArray(item.sameGroups) ? item.sameGroups.map(g => Array.isArray(g) ? g.map(String) : []).filter(g => g.length >= 2) : []
        };
      }

      const groups = Array.isArray(item.answerGroups) ? item.answerGroups : [];
      return {
        id: item.id || uid(),
        section: item.section || "",
        type: item.type || "question",
        mode: item.mode === "number" ? "number" : "text",
        question: String(item.question || ""),
        answerGroupsText: groups.map(group => Array.isArray(group) ? group.map(v => String(v ?? "")).join(",") : String(group ?? "")),
        localTags: Array.isArray(item.localTags) ? item.localTags.filter(Boolean).map(String) : [],
        localOnOffControls: Array.isArray(item.localOnOffControls) ? item.localOnOffControls.filter(Boolean).map(String) : [],
        sameGroups: Array.isArray(item.sameGroups) ? item.sameGroups.map(g => Array.isArray(g) ? g.map(String) : []).filter(g => g.length >= 2) : []
      };
    }

    function unpackItemFromFirestore(item) {
      if (!item || typeof item !== "object") return item;

      if (item.mode === "choice") {
        return {
          ...item,
          options: Array.isArray(item.options)
            ? item.options.map(o => ({
                text: String(o?.text || ""),
                correct: !!o?.correct
              })).filter(o => o.text)
            : [],
          randomChoice: !!item.randomChoice,
          localTags: Array.isArray(item.localTags) ? item.localTags.map(String) : [],
          localOnOffControls: Array.isArray(item.localOnOffControls) ? item.localOnOffControls.map(String) : [],
          sameGroups: Array.isArray(item.sameGroups) ? item.sameGroups.map(g => Array.isArray(g) ? g.map(String) : []).filter(g => g.length >= 2) : []
        };
      }

      const groupsSource =
        Array.isArray(item.answerGroupsText) && item.answerGroupsText.length
          ? item.answerGroupsText.map(txt => splitAnswerValues(txt))
          : Array.isArray(item.answerGroups) && item.answerGroups.length
            ? item.answerGroups.map(group => Array.isArray(group) ? group.map(v => String(v ?? "")) : splitAnswerValues(String(group ?? "")))
            : (item.answers ? [splitAnswerValues(Array.isArray(item.answers) ? item.answers.join(",") : String(item.answers))] : [[]]);

      const answerGroups = groupsSource.map(group => group.filter(Boolean)).filter(group => group.length > 0);

      return {
        ...item,
        mode: item.mode === "number" ? "number" : "text",
        answerGroups,
        answers: answerGroups[0] || [],
        localTags: Array.isArray(item.localTags) ? item.localTags.map(String) : [],
        localOnOffControls: Array.isArray(item.localOnOffControls) ? item.localOnOffControls.map(String) : [],

          });
        });
      };

      textarea.addEventListener("input", refresh);
      textarea.addEventListener("keyup", refresh);

      textarea.addEventListener("scroll", refresh);
      textarea.addEventListener("blur", () => setTimeout(hide, 120));

    async function fileToWebpDataUrl(file) {
      const url = URL.createObjectURL(file);
      try {
        const img = await new Promise((resolve, reject) => {
          const el = new Image();
          el.onload = () => resolve(el);
          el.onerror = reject;
          el.src = url;
        });

        const maxSide = 1400;
        const w = img.naturalWidth || img.width;
        const h = img.naturalHeight || img.height;
        const scale = Math.min(1, maxSide / Math.max(w, h));
        const cw = Math.max(1, Math.round(w * scale));
        const ch = Math.max(1, Math.round(h * scale));

        const canvas = document.createElement("canvas");
        canvas.width = cw;
        canvas.height = ch;
        const ctx = canvas.getContext("2d");
        if (!ctx) throw new Error("canvas context unavailable");
        ctx.drawImage(img, 0, 0, cw, ch);

        try {
          const webp = canvas.toDataURL("image/webp", 0.75);
          if (webp.startsWith("data:image/webp")) return webp;
        } catch {}

        const fallback = await new Promise(resolve => {
          canvas.toBlob(blob => {
            if (!blob) return resolve("");
            const reader = new FileReader();
            reader.onload = () => resolve(String(reader.result || ""));
            reader.readAsDataURL(blob);
          }, "image/png");
        });
        return fallback || "";
      } finally {
        URL.revokeObjectURL(url);
      }
    }

    async function pickPictureAndStore(number) {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.style.display = "none";
      document.body.appendChild(input);

      const result = await new Promise(resolve => {
        input.addEventListener("change", async () => {
          const file = input.files && input.files[0];
          if (!file) {
            resolve(null);
            return;
          }
          try {
            const dataUrl = await fileToWebpDataUrl(file);
            resolve(dataUrl || null);
          } catch (err) {
            console.error(err);
            resolve(null);
          }
        }, { once: true });

        input.click();
      });

      input.remove();

      if (result) {
        state.draftPictures[String(number)] = result;
        safeLocalSet(`qb_pic_draft_${state.docId || "new"}`, JSON.stringify(state.draftPictures));
      }
    }

    async function addComment() {

      let name = (state.commentDraft?.name || getCommentName()).trim() || "匿名";
      const text = (state.commentDraft?.text || "").trim();
      const isPrivate = !!state.commentDraft?.isPrivate;

    function normalizeDoc(id, data) {
      const parsed = data.rawText ? parseItems(data.rawText) : { globalFlags: { random:false, choice:false, randomChoice:false, number:false, open:false }, onOffControls: [], items: [] };
      const items = Array.isArray(data.items) && data.items.length
        ? data.items.map(unpackItemFromFirestore).filter(Boolean)
        : parsed.items;
      const globalFlags = {
        random: !!(data.globalFlags?.random ?? parsed.globalFlags?.random),
        choice: !!(data.globalFlags?.choice ?? parsed.globalFlags?.choice),
        randomChoice: !!(data.globalFlags?.randomChoice ?? parsed.globalFlags?.randomChoice),
        number: !!(data.globalFlags?.number ?? parsed.globalFlags?.number),
        open: !!(data.globalFlags?.open ?? parsed.globalFlags?.open)
      };
      return {
        id,
        title: data.title || "問題",
        subtitle: data.subtitle || "",
        items,
        rawText: data.rawText || "",
        globalFlags,
        onOffControls: Array.from(new Set(data.onOffControls || parsed.onOffControls || [])),
        keyMode: data.keyMode || "key",
        key: data.key || "",
        ownerToken: data.ownerToken || "",
        slug: data.slug || id,
        createdAt: data.createdAt || null,
        updatedAt: data.updatedAt || null,
        pictures: normalizePictures(data.pictures || {}),
        comments: sortComments(Array.isArray(data.comments) ? data.comments : [])
      };
    }

    function buildCodeText(docData) {
      const parts = [];
      if (docData.rawText) parts.push(stripMemoSegments(docData.rawText));
      for (const item of docData.items || []) {
        if (item.section) parts.push(stripMemoSegments(item.section));
        parts.push(stripMemoSegments(item.question || ""));
        if (item.mode === "choice") parts.push((item.options || []).map(o => stripMemoSegments(o.text)).join(" "));
        else {
          const answerText = Array.isArray(item.answerGroups) && item.answerGroups.length
            ? item.answerGroups.map(group => group.join(" ")).join(" ")
            : (item.answers || []).join(" ");
          parts.push(stripMemoSegments(answerText));
        }
      }
      return parts.join(" ").toLowerCase();
    }

    function scoreDocForQuery(docData, query) {
      const terms = splitSearchTerms(query);
      if (!terms.length) return null;
      const title = String(docData.title || "").toLowerCase();
      const subtitle = String(docData.subtitle || "").toLowerCase();
      const code = buildCodeText(docData);
      let group = 3, score = 0;
      for (const termRaw of terms) {
        const term = termRaw.toLowerCase();
        if (title.includes(term)) { score += term.length * 10; group = Math.min(group, 0); }
        else if (subtitle.includes(term)) { score += term.length * 5; group = Math.min(group, 1); }
        else if (code.includes(term)) { score += term.length * 1; group = Math.min(group, 2); }
        else return null;
      }
      return { group, score };
    }

    function getLibraryDocs() {
      const mineIds = new Set(loadMyList().map(v => v.id));
      const accessIds = new Set(loadAccessList().map(v => v.id));
      const ownerToken = getCookie(OWNER_COOKIE);
      const mine = [], access = [];
      for (const d of state.allDocs) {
        const ownedByMe = !!(ownerToken && d.ownerToken && d.ownerToken === ownerToken) || mineIds.has(d.id);
        const accessed = accessIds.has(d.id);
        if (ownedByMe) mine.push(d);
        else if (accessed) access.push(d);
      }
      mine.sort((a, b) => (normalizeTs(b.updatedAt) || 0) - (normalizeTs(a.updatedAt) || 0));
      access.sort((a, b) => (normalizeTs(b.updatedAt) || 0) - (normalizeTs(a.updatedAt) || 0));
      return { mine, access };
    }

    const getPublicDocs = () => state.allDocs.filter(isOpenDoc);

    function canEditDocMeta(docData) {
      if (docData.globalFlags?.open || docData.keyMode === "open") return true;
      const ownerToken = getCookie(OWNER_COOKIE);
      if (ownerToken && docData.ownerToken && ownerToken === docData.ownerToken) return true;
      const rec = findAccessRecord(docData.id);
      return !!(rec && docData.key && rec.key === docData.key);
    }

    function searchDocs(docs, query) {
      const q = String(query || "").trim();
      if (!q) return docs.slice();
      const ranked = [];
      for (const d of docs) {
        const result = scoreDocForQuery(d, q);
        if (!result) continue;
        ranked.push({ doc: d, ...result });
      }
      ranked.sort((a, b) => a.group !== b.group ? a.group - b.group : b.score !== a.score ? b.score - a.score : (normalizeTs(b.doc.updatedAt) || 0) - (normalizeTs(a.doc.updatedAt) || 0));
      return ranked.map(r => r.doc);
    }

    function getSearchResultsForHomeTab() {
      const tab = state.homeTab;
      const query = state.homeQueries[tab] || "";
      if (tab === "library") {
        const { mine, access } = getLibraryDocs();
        const union = [];
        const seen = new Set();
        const add = (docData, source) => {
          if (seen.has(docData.id)) return;
          seen.add(docData.id);
          union.push({ ...docData, source });
        };
        searchDocs(mine, query).forEach(d => add(d, "mine"));
        searchDocs(access, query).forEach(d => add(d, "access"));
        return union;
      }
      return searchDocs(getPublicDocs(), query);
    }

          const parsed = parseItems(d.rawText);
          const items = parsed.items;
          const globalFlags = parsed.globalFlags;
          const onOffControls = parsed.onOffControls;

          if (!title) return alert("タイトルを入れてね");
          if (!items.length) return alert("問題が1つも読めなかったよ。");

          const oldId = state.docId || "";
          let unique;
          try {
            unique = await ensureUniqueTitleAndId(title, oldId);
          } catch (e) {
            if (String(e?.message || e) === "SAVE_CANCELLED") {
              alert("保存をやめたよ");
              return;
            }
            throw e;
          }

          const finalTitle = unique.title;
          const newId = unique.id;
          const isExisting = !!state.doc;
          const ownerToken = isExisting ? (state.doc.ownerToken || getCookie(OWNER_COOKIE) || uid()) : (getCookie(OWNER_COOKIE) || uid());

          const canChangeKey = !state.doc || isOwner();

          const effectiveKey = canChangeKey ? (d.keyMode === "open" ? "" : d.key) : (state.doc?.key || "");
          const existingCreatedAt = normalizeTs(state.doc?.createdAt) || Date.now();
          const existingComments = Array.isArray(state.doc?.comments) ? state.doc.comments : [];

          const usedPics = getPictureRefsFromTexts(d.rawText, subtitle);
          const prunedPictures = prunePicturesMap(state.draftPictures || {}, usedPics);

          saveBtn.disabled = true;
          saveBtn.textContent = "保存中...";

          try {
            const uploadedPictures = await asyncUploadPicturesForDoc(newId, prunedPictures);

            const payload = {
              title: finalTitle,
              subtitle,
              items: items.map(packItemForFirestore),
              rawText: d.rawText,
              globalFlags,
              onOffControls,
              keyMode: effectiveKeyMode,
              key: effectiveKey,
              ownerToken,
              slug: newId,
              createdAt: existingCreatedAt,
              updatedAt: Date.now(),
              pictures: uploadedPictures,
              comments: existingComments
            };

            await setDoc(doc(db, COLLECTION, newId), payload, { merge: true });

            if (oldId && oldId !== newId) {
              try { await deleteDoc(doc(db, COLLECTION, oldId)); } catch (_) {}
              removeMyMeta(oldId);
              removeAccessRecord(oldId);
              state.allDocs = state.allDocs.filter(x => x.id !== oldId);
            }

            state.docId = newId;
            state.doc = { ...payload, items, comments: sortComments(existingComments) };
            state.draftPictures = { ...uploadedPictures };
            d.title = finalTitle;

            const normalized = normalizeDoc(newId, payload);
            const idx = state.allDocs.findIndex(x => x.id === newId);
            if (idx >= 0) state.allDocs[idx] = normalized;
            else state.allDocs.unshift(normalized);
            rebuildPublicOrder();

            if (isOwner() || !isExisting) upsertMyMeta({
              id: newId,
              title: payload.title,
              subtitle: payload.subtitle,
              createdAt: payload.createdAt,
              updatedAt: payload.updatedAt
            });
            if (state.accessMode === "key") {
              rememberAccess(newId, effectiveKey, {
                title: payload.title,
                subtitle: payload.subtitle,
                createdAt: payload.createdAt,
                updatedAt: payload.updatedAt
              });
            }

            location.hash = `#/${newId}`;
            const link = prettyLink(newId);
            navigator.clipboard?.writeText(link).catch(() => {});
            alert(`保存したよ！\n\n${link}`);
            startQuiz(state.doc, newId);
          } catch (err) {
            console.error("save failed:", err);
            alert(`保存で失敗したよ: ${err?.message || err}`);
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = "保存";
          }
        });
      }

                ${canManageQuiz() ? `<button class="ghost" id="forceEndBtn" type="button">残りを×で終わる</button>` : ""}

              </div>
            </div>
          </div>
        </div>
      `;

      bindGlobalButtons();

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open" || state.doc.globalFlags?.open) return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          state.accessMode = "key";
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      const forceEndBtn = document.getElementById("forceEndBtn");
      if (forceEndBtn) {
        forceEndBtn.addEventListener("click", () => {
          if (confirm("本当に残りを×で終わりますか？")) forceFinishAsWrong();
        });
      }

      if (q.item.mode === "choice") {
        const grid = document.getElementById("choiceGrid");
        const options = (q.item.randomChoice ? shuffle(q.item.options || []) : (q.item.options || [])).slice();
        grid.innerHTML = options.map((opt, idx) => `
          <button type="button" class="ghost miniAction choiceBtn" data-choice-index="${idx}" data-choice-text="${esc(opt.text)}">${esc(opt.text)}</button>
        `).join("");
        const buttons = [...grid.querySelectorAll(".choiceBtn")];
        buttons.forEach(btn => btn.addEventListener("click", () => {
          buttons.forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          state.quiz.typedAnswer = btn.dataset.choiceText || "";
        }));
      } else {
        const inputs = [...document.querySelectorAll('[id^="answerInput"]')];
        inputs.forEach((input, i) => {
          input.value = state.quiz.typedAnswers[i] || "";
          input.addEventListener("input", e => {
            if (q.item.mode === "number") e.target.value = e.target.value.replace(/\D/g, "");
            state.quiz.typedAnswers[i] = e.target.value;
          });
          input.addEventListener("keydown", e => {
            if (q.item.mode === "number" && e.key.length === 1 && !/^\d$/.test(e.key)) {
              e.preventDefault();
              return;
            }
            if (e.key === "Enter") {
              e.preventDefault();
              if (i < inputs.length - 1) {
                inputs[i + 1].focus();
              } else {
                submitAnswer();
              }
            }
          });
        });
        if (inputs[0]) inputs[0].focus();
      }

      document.getElementById("submitBtn").addEventListener("click", submitAnswer);
    }

    function renderCommentNode(comment, comments, depth = 0) {
      if (!canViewComment(comment)) return `<div class="commentItem" style="margin-left:${depth * 14}px"><div class="commentMask">🫥</div></div>`;
      const role = comment.authorRole || "viewer";
      const roleLabel = commentRoleLabel(role);
      const roleClass = commentRoleClass(role);
      const canManage = canManageComment(comment);
      const parent = comment.parentId ? comments.find(c => c.id === comment.parentId) : null;
      const children = comments.filter(c => c.parentId === comment.id).sort((a, b) => (normalizeTs(a.createdAt) || 0) - (normalizeTs(b.createdAt) || 0));
      const replyLine = parent ? `<div class="metaLine">↳ ${esc(parent.authorName || "匿名")} への返信</div>` : "";

      return `
        <div class="commentItem ${roleClass}" style="margin-left:${depth * 14}px">
          ${replyLine}
          <div class="reviewQ">${esc(comment.authorName || "匿名")} <span class="commentBadge">${esc(roleLabel)}</span>${comment.isPrivate ? ` <span class="commentBadge">🫥</span>` : ""}</div>
          <div class="metaLine">${esc(formatMinute(comment.createdAt))}</div>
          <div class="commentBody">${renderCommentBody(comment)}</div>
          <div class="row" style="justify-content:flex-end;">
            <button class="ghost miniAction" data-reply-comment="${esc(comment.id)}" type="button">返信</button>
            ${canManage ? `<button class="ghost miniAction" data-toggle-comment="${esc(comment.id)}" type="button">${comment.isPrivate ? "公開にする" : "非公開にする"}</button>` : ""}
            ${canManage ? `<button class="danger miniAction" data-delete-comment="${esc(comment.id)}" type="button">削除</button>` : ""}
          </div>
          ${children.length ? `<div class="reviewList" style="margin-top:8px">${children.map(child => renderCommentNode(child, comments, depth + 1)).join("")}</div>` : ""}
        </div>
      `;
    }

    function renderCommentsPanel(comments) {
      const visibleComments = comments.filter(c => canViewComment(c));
      const hiddenCount = comments.filter(c => c.isPrivate && !canViewComment(c)).length;
      const replyTarget = state.commentDraft.replyTo ? comments.find(c => c.id === state.commentDraft.replyTo) : null;
      const list = comments
        .filter(c => !c.parentId || !comments.some(p => p.id === c.parentId))
        .sort((a, b) => (normalizeTs(a.createdAt) || 0) - (normalizeTs(b.createdAt) || 0))
        .map(c => renderCommentNode(c, comments, 0))
        .join("");

      const scoreBox = state.quiz.onlyWrong
        ? `<div class="timeOnlyNote">間違えた問題だけのやり直しでは点数は入れられないよ。</div>`
        : `<div id="scoreSuggestBox" class="floatSuggest hide"></div>`;

      return `
        <div class="commentWrap">
          <div class="card commentWrap">
            <div class="commentHeader">
              <div class="label" style="font-size:14px">コメントを書く</div>

            </div>

              </div>

                <div class="replyBox">
                  <div>

                  <button class="ghost miniAction" id="cancelReplyBtn" type="button">解除</button>
                </div>
              ` : ""}

              <div class="commentInputHost">
                <div class="label">コメント</div>
                <textarea id="commentText" class="textarea" style="min-height:120px;overflow:auto;color:var(--text);background:var(--panel);" placeholder="感想やメモを書いてね">${esc(state.commentDraft?.text || "")}</textarea>

              </div>

              <div class="row" style="justify-content:space-between;align-items:center;">
                <label class="row" style="gap:8px;cursor:pointer;">
                  <input id="commentPrivate" type="checkbox" ${state.commentDraft?.isPrivate ? "checked" : ""} />

                <button class="primary" id="postCommentBtn" type="button">コメントする</button>
              </div>

          </div>

          <div class="card">
            <div class="commentHeader">
              <div class="label" style="font-size:14px">コメント一覧</div>
              <div class="commentToggleRow">
                <button class="ghost miniAction" id="commentsRefreshBtn" type="button">${esc(refreshLabel)}</button>
                <span class="commentBadge">表示 ${visibleComments.length}</span>
                ${hiddenCount > 0 ? `<span class="commentBadge">🫥 ${hiddenCount}</span>` : ""}

                      <div class="reviewA">あなたの答え: ${Array.isArray(given) ? given.map(v => renderRichText(stripMemoSegments(String(v)), { pictureMap: pics })).join("<br>") : renderRichText(stripMemoSegments(String(given)), { pictureMap: pics })}</div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          </div>
        </div>
      `;

      bindGlobalButtons();

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open" || state.doc.globalFlags?.open) return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          state.accessMode = "key";
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      document.getElementById("restartBtn").addEventListener("click", restartQuiz);
      const commentsBtn = document.getElementById("commentsBtn");
      if (commentsBtn) commentsBtn.addEventListener("click", () => { state.showComments = !state.showComments; render(); });
      const wrongOnlyBtn = document.getElementById("wrongOnlyBtn");
      if (wrongOnlyBtn) wrongOnlyBtn.addEventListener("click", startWrongOnlyQuiz);

      if (state.showComments) {
        const commentName = document.getElementById("commentName");
        const commentText = document.getElementById("commentText");
        const commentPrivate = document.getElementById("commentPrivate");
        const postCommentBtn = document.getElementById("postCommentBtn");
        const commentsRefreshBtn = document.getElementById("commentsRefreshBtn");
        const scoreSuggestBox = document.getElementById("scoreSuggestBox");
        const commentHost = document.querySelector(".commentInputHost");
        const cancelReplyBtn = document.getElementById("cancelReplyBtn");

        if (commentName) commentName.addEventListener("input", e => { state.commentDraft.name = e.target.value; setCommentName(e.target.value.trim() || "匿名"); });
        if (commentText) {
          commentText.addEventListener("input", e => {
            state.commentDraft.text = e.target.value;
            e.target.style.height = "auto";
            e.target.style.height = `${Math.max(120, e.target.scrollHeight)}px`;
          });
          commentText.style.height = "auto";
          commentText.style.height = `${Math.max(120, commentText.scrollHeight)}px`;
        }
        if (commentPrivate) commentPrivate.addEventListener("change", e => { state.commentDraft.isPrivate = !!e.target.checked; });
        if (postCommentBtn) postCommentBtn.addEventListener("click", addComment);
        if (commentsRefreshBtn) commentsRefreshBtn.addEventListener("click", () => refreshCurrentDoc({ keepCommentsVisible: true }));
        if (commentText && scoreSuggestBox && commentHost) setupCommentSuggestions(commentHost, commentText, scoreSuggestBox);
        if (cancelReplyBtn) cancelReplyBtn.addEventListener("click", () => { state.commentDraft.replyTo = ""; render(); });

        document.querySelectorAll("[data-toggle-comment]").forEach(btn => btn.addEventListener("click", () => toggleCommentVisibility(btn.dataset.toggleComment || "")));
        document.querySelectorAll("[data-delete-comment]").forEach(btn => btn.addEventListener("click", () => deleteComment(btn.dataset.deleteComment || "")));
        document.querySelectorAll("[data-reply-comment]").forEach(btn => btn.addEventListener("click", () => {
          state.commentDraft.replyTo = btn.dataset.replyComment || "";
          state.showComments = true;
          render();
        }));
      }
    }

    function render() {
      if (state.screen === "loading") {
        renderLoading();
      } else if (state.screen === "home") {
        renderHome();
      } else if (state.screen === "editor") {
        renderEditor();
      } else if (state.screen === "quiz") {
        if (!state.doc || !state.doc.items || !state.doc.items.length) {
          state.screen = "home";
          render();
          return;
        }
        if (state.quiz.phase === "settings") renderSettings();
        else if (state.quiz.phase === "question") renderQuestion();
        else if (state.quiz.phase === "result") renderResult();
        else if (state.quiz.phase === "done") renderDone();
      }
      renderTutorialLayer();
      renderPartnerLayer();
    }

            <div class="tutorialCard tutorialHero">
              <h2>改行・色・画像・答えの枠</h2>
              <p><b>↵</b> / <b>↩︎</b> / <b>\n</b> を問題文に入れると改行できる。<br>答え側にそれらを入れると、答える枠が複数になる。<br><b>[color(#ff0000)]</b> を入れると、その後の半角スペースまで文字色を変えられる。<br><b>[picture(1)]</b> で画像を入れられる。<br><b>;</b> のあとはメモとして扱うよ。もう一度 <b>;</b> か改行で戻る。<br><b>"..."</b> で <b>, 、 = ↵ \n</b> を普通の文字として答えに入れられる。</p>
            </div>
          `
        },
        {
          title: "GO!",
          subtitle: "準備はできた。あとは始めるだけ。",
          body: `
            <div class="tutorialCard tutorialHero">
              <h2>それじゃ、始めよう</h2>
              <p>「作成」から始めて、公開して、コメントして、遊んでみてね。<br>右上の「説明を読む」から、またいつでも見直せるよ。</p>
            </div>
            <div class="tutorialCard">
              <div class="tutorialCode">GO!</div>
            </div>
          `
        }
      ];
    }

    function renderTutorialLayer() {
      if (!tutorialLayer) return;
      if (!state.tutorial.open) {
        tutorialLayer.innerHTML = "";
        return;
      }

      const pages = tutorialPages();
      const pageIndex = Math.max(0, Math.min(state.tutorial.page, pages.length - 1));
      const page = pages[pageIndex];
      const isLast = pageIndex === pages.length - 1;
      const showTopClose = state.tutorial.seen;
      const showLeft = !(pageIndex === 0 && !state.tutorial.seen);
      const leftLabel = pageIndex === 0 && state.tutorial.seen ? "閉じる" : "前へ";
      const rightLabel = isLast ? "始める" : "次へ";

      tutorialLayer.innerHTML = `
        <div class="tutorialOverlay ${state.tutorial.closing ? "closing" : ""}">
          <div class="tutorialPanel">
            <div class="tutorialTop">
              <div>
                <div class="tutorialTitle">${esc(page.title)}</div>
                <div class="tutorialSub">${esc(page.subtitle)}</div>
              </div>
              ${showTopClose ? `<button class="tutorialClose" id="tutorialCloseBtn" type="button" aria-label="閉じる">×</button>` : `<div style="width:44px;height:44px"></div>`}
            </div>

            <div class="tutorialBody">
              <div class="tutorialPage anim-${state.tutorial.motion || "open"}">
                ${page.body}
              </div>
            </div>

            <div class="tutorialFooter">
              ${showLeft ? `<button class="ghost tutorialNavBtn" id="tutorialPrevBtn" type="button">${esc(leftLabel)}</button>` : `<div style="width:110px"></div>`}
              <div class="tutorialDots">
                ${pages.map((_, i) => `<div class="dot ${i === pageIndex ? "active" : ""}"></div>`).join("")}
              </div>
              <button class="primary tutorialNavBtn" id="tutorialNextBtn" type="button">${esc(rightLabel)}</button>
            </div>
          </div>
        </div>
      `;

      const closeBtn = document.getElementById("tutorialCloseBtn");
      const prevBtn = document.getElementById("tutorialPrevBtn");
      const nextBtn = document.getElementById("tutorialNextBtn");

      if (closeBtn) closeBtn.addEventListener("click", () => closeTutorial(true));
      if (prevBtn) {
        prevBtn.addEventListener("click", () => {
          if (pageIndex === 0) {
            if (state.tutorial.seen) closeTutorial(true);
            return;
          }
          state.tutorial.page = Math.max(0, pageIndex - 1);
          state.tutorial.motion = "prev";
          renderTutorialLayer();
        });
      }

      if (nextBtn) {
        nextBtn.addEventListener("click", () => {
          if (isLast) {
            closeTutorial(true);
            return;
          }
          state.tutorial.page = Math.min(pages.length - 1, pageIndex + 1);
          state.tutorial.motion = "next";
          renderTutorialLayer();
        });
      }
    }

    function openTutorial(auto = false) {
      state.tutorial.open = true;
      state.tutorial.page = 0;
      state.tutorial.closing = false;
      state.tutorial.motion = auto ? "open" : "open";
      render();
    }

    function closeTutorial(markSeen = true) {
      state.tutorial.closing = true;
      state.tutorial.motion = "close";
      renderTutorialLayer();

      setTimeout(() => {
        state.tutorial.open = false;
        state.tutorial.closing = false;
        state.tutorial.motion = "open";
        if (markSeen) {
          state.tutorial.seen = true;
          setCookie(TUTORIAL_COOKIE, "1");
        }
        renderTutorialLayer();
        render();
      }, 220);
    }

    function maybeAutoOpenTutorial() {
      if (state.tutorial.seen) return;
      if (state.tutorial.autoShown) return;
      state.tutorial.autoShown = true;
      setTimeout(() => {
        if (!state.tutorial.seen && !state.tutorial.open) openTutorial(true);
      }, 120);
    }

    function loadTutorialSeenState() {
      state.tutorial.seen = getCookie(TUTORIAL_COOKIE) === "1";
    }

    function renderPartnerLayer() {
      if (!partnerLayer) return;
      if (!state.partnerModal.open) {
        partnerLayer.innerHTML = "";
        return;
      }

      const admin = isPartnerAdmin();
      partnerLayer.innerHTML = `
        <div class="partnerOverlay">
          <div class="partnerPanel">
            <div class="partnerTop">
              <div>
                <div class="partnerTitle">パートナー</div>
                <div class="partnerSub">${admin ? "リンクを開くか、編集できるよ。" : "リンクへ移動するよ。"}</div>
              </div>
              <button class="partnerClose" id="partnerCloseBtn" type="button" aria-label="閉じる">×</button>
            </div>

            <div class="partnerBody">
              <div class="partnerMenu">
                <button class="partnerMenuBtn primary" id="partnerOpenBtn" type="button">リンクを開く</button>
                ${admin ? `<button class="partnerMenuBtn" id="partnerEditBtn" type="button">リンクを編集</button>` : ""}
              </div>
            </div>

            <div class="partnerFooter">
              <div class="note">現在のリンク: ${esc(state.partnerLink || "未設定")}</div>
            </div>
          </div>
        </div>
      `;

      const closeBtn = document.getElementById("partnerCloseBtn");
      const openBtn = document.getElementById("partnerOpenBtn");
      const editBtn = document.getElementById("partnerEditBtn");

      if (closeBtn) closeBtn.addEventListener("click", () => closePartnerModal());
      if (openBtn) openBtn.addEventListener("click", () => {
        if (state.partnerLink) {
          window.open(state.partnerLink, "_blank", "noopener,noreferrer");
        } else {
          alert("パートナーリンクはまだ未設定だよ");
        }
        closePartnerModal();
      });
      if (editBtn) editBtn.addEventListener("click", async () => {
        const next = prompt("新しいリンクを入力してね", state.partnerLink || "");
        if (next === null) return;
        const v = next.trim();
        if (!v) return alert("空では保存できないよ");
        try {
          await savePartnerLink(v);
          alert("パートナーリンクを更新したよ");
          closePartnerModal();
        } catch (err) {
          console.error(err);
          alert(`更新で失敗したよ: ${err?.message || err}`);
        }
      });
    }

    function openPartnerModal() {
      state.partnerModal.open = true;
      renderPartnerLayer();
    }

    function closePartnerModal() {
      state.partnerModal.open = false;
      renderPartnerLayer();
    }

    async function openEditRoute(id) {
      state.screen = "loading";
      render();

      try {
        const snap = await getDoc(doc(db, COLLECTION, id));
        if (!snap.exists()) { state.screen = "home"; render(); return; }
        const data = snap.data() || {};
        state.docId = id;
        state.doc = normalizeDoc(id, data);
        setAccessModeForDoc(state.doc, id);

        if (state.accessMode === "key" || state.accessMode === "owner" || state.accessMode === "open") {
          openEditFromDoc();
          return;
        }

        const entered = prompt("Key を入力して編集", "");
        if (entered === null) { location.hash = `#/${id}`; return; }
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          state.accessMode = "key";
          openEditFromDoc();
        } else {
          alert("Key が違うよ");
          location.hash = `#/${id}`;
        }
      } catch (err) {
        console.error(err);
        state.screen = "home";
        render();
      }
    }

    async function loadRoute() {
      applySystemTheme();
      loadTutorialSeenState();
      await loadSiteSettings();
      const r = route();

      if (r.name === "home") {
        try { await loadCatalog(); } catch (e) { console.error(e); }
        state.screen = "home";
        state.showComments = false;
        render();
        maybeAutoOpenTutorial();
        return;
      }

      if (r.name === "create") { openCreate(); maybeAutoOpenTutorial(); return; }
      if (r.name === "edit") { await openEditRoute(r.id); maybeAutoOpenTutorial(); return; }

      if (r.name === "quiz") {
        state.screen = "loading";
        state.showComments = false;
        render();
        try {
          const snap = await getDoc(doc(db, COLLECTION, r.id));
          if (!snap.exists()) { state.screen = "home"; render(); maybeAutoOpenTutorial(); return; }
          const data = snap.data() || {};
          startQuiz(normalizeDoc(r.id, data), r.id);
          maybeAutoOpenTutorial();
        } catch (err) {
          console.error(err);
          state.screen = "home";
          render();
          maybeAutoOpenTutorial();
        }
      }
    }

    if (systemDark) {
      const onThemeChange = () => { applySystemTheme(); render(); };
      if (systemDark.addEventListener) systemDark.addEventListener("change", onThemeChange);
      else if (systemDark.addListener) systemDark.addListener(onThemeChange);
    }

    window.addEventListener("hashchange", loadRoute);
    loadRoute();
  </script>
</body>
</html>
