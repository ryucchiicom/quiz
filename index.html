<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題作成サイト</title>
  <style>
    :root{
      --bg1:#f8faff;
      --bg2:#eef2f8;
      --panel:#ffffff;
      --line:#d8dbe5;
      --text:#1f2430;
      --muted:#6b7280;
      --accent:#2f6fed;
      --accent2:#1f5ad1;
      --good:#118a3a;
      --bad:#d33c3c;
      --radius:18px;
      --shadow:0 12px 30px rgba(20,25,40,.08);
    }

    body.dark{
      --bg1:#0b1120;
      --bg2:#111827;
      --panel:#111827;
      --line:#243043;
      --text:#e7ecf7;
      --muted:#9aa4b2;
      --accent:#5b8cff;
      --accent2:#7aa2ff;
      --good:#39c66d;
      --bad:#ff7676;
      --shadow:0 12px 30px rgba(0,0,0,.26);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    button,input,textarea{font:inherit}
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
    }

    a{color:inherit}

    .page{
      max-width:980px;
      margin:0 auto;
      padding:16px;
      min-height:100vh;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      position:sticky;
      top:0;
      padding:8px 0 12px;
      backdrop-filter:blur(8px);
      z-index:5;
    }

    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.1;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sub{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(15,23,42,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .hero{
      max-width:860px;
      margin:36px auto 0;
      display:grid;
      gap:16px;
    }

    .bigBtn,.primary{
      background:var(--accent);
      color:#fff;
      font-weight:800;
    }

    .ghost{
      background:#eef3ff;
      color:#244a9c;
      border:1px solid #d7e2ff;
      font-weight:700;
    }

    body.dark .ghost{
      background:#182133;
      color:#d7e5ff;
      border-color:#2d3a4f;
    }

    .danger{
      background:#ffeded;
      color:#a72b2b;
      border:1px solid #ffc7c7;
      font-weight:800;
    }

    body.dark .danger{
      background:#2a1620;
      color:#ffaaaa;
      border-color:#5b2a39;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .input{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 15px;
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .input:focus{
      border-color:#9ab8ff;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }

    .label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }

    .gridEditor{
      display:grid;
      grid-template-columns:64px 1fr;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      min-height:420px;
      background:var(--panel);
      align-items:stretch;
    }

    .gutter{
      background:rgba(127,127,127,.07);
      border-right:1px solid var(--line);
      padding:14px 10px 14px 0;
      text-align:right;
      color:#8a93a8;
      font:600 14px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      user-select:none;
      overflow:hidden;
      align-self:stretch;
    }

    .textarea{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      min-height:420px;
      padding:14px;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;
      overflow:hidden;
      tab-size:2;
      background:var(--panel);
      color:var(--text);
    }

    .help,.note{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .quiz{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .progress{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .sectionText{
      font-size:18px;
      font-weight:900;
      line-height:1.35;
      color:#334155;
      word-break:break-word;
    }

    body.dark .sectionText{
      color:#d7def0;
    }

    .question{
      font-size:clamp(22px,4vw,32px);
      font-weight:900;
      line-height:1.4;
      word-break:break-word;
    }

    .answer{
      width:100%;
      font-size:18px;
      padding:16px;
      border-radius:16px;
      border:1px solid var(--line);
      outline:none;
      background:var(--panel);
      color:var(--text);
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .submit{
      background:var(--accent);
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .next{
      background:#1c9c59;
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }

    .good{
      border:1px solid rgba(17,138,58,.22);
      background:#effaf3;
      color:var(--good);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }

    .bad{
      border:1px solid rgba(211,60,60,.22);
      background:#fff3f3;
      color:var(--bad);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }

    .explain{
      background:#f8faff;
      border:1px solid #dbe4fb;
      padding:14px 16px;
      border-radius:16px;
      line-height:1.8;
      word-break:break-word;
      color:#2b3241;
    }

    body.dark .explain{
      background:#182133;
      border-color:#2d3a4f;
      color:#e7ecf7;
    }

    .summary{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }

    .score{
      font-size:28px;
      font-weight:1000;
      line-height:1.2;
    }

    .reviewList{
      display:grid;
      gap:10px;
    }

    .reviewItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 15px;
      background:var(--panel);
      display:grid;
      gap:6px;
    }

    .reviewSection{
      font-size:15px;
      font-weight:900;
      color:#334155;
      line-height:1.4;
    }

    body.dark .reviewSection{
      color:#d7def0;
    }

    .reviewQ{
      font-weight:900;
      font-size:16px;
      word-break:break-word;
    }

    .reviewA{
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .listGrid{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      box-shadow:var(--shadow);
      padding:14px 15px;
    }

    .listMeta{
      min-width:0;
      display:grid;
      gap:4px;
      flex:1;
    }

    .listActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .miniAction{
      padding:10px 12px;
      font-size:13px;
      border-radius:12px;
      white-space:nowrap;
    }

    .metaLine{
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .commentWrap{
      display:grid;
      gap:12px;
    }

    .commentForm{
      display:grid;
      gap:10px;
    }

    .commentHeader{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .commentToggleRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .commentBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      font-weight:800;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(127,127,127,.08);
      color:var(--text);
    }

    .commentPrivateNote{
      font-size:12px;
      color:var(--muted);
    }

    .commentMask{
      font-weight:900;
      font-size:18px;
      line-height:1.4;
    }

    @media (max-width:640px){
      .page{padding:14px}
      .title{font-size:22px}
      .gridEditor{grid-template-columns:52px 1fr;min-height:380px}
      .question{font-size:22px}
      .answer{font-size:16px}
      .bigBtn{width:100%}
      .actions{justify-content:stretch}
      .actions button{flex:1}
      .topbar{align-items:flex-start}
      .listItem{align-items:flex-start;flex-direction:column}
      .listActions{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsiyr6pq0CLo4dT2c7QtoshZBqBKsviwE",
      authDomain: "quiz-f46d6.firebaseapp.com",
      projectId: "quiz-f46d6",
      storageBucket: "quiz-f46d6.firebasestorage.app",
      messagingSenderId: "75573053604",
      appId: "1:75573053604:web:6b20006ca68e685e18fe31",
      measurementId: "G-KQVMD2YYDP"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const db = getFirestore(appFirebase);

    const root = document.getElementById("app");
    if (!root) throw new Error('Missing <div id="app"></div>');

    const COLLECTION = "quizzes";
    const OWNER_COOKIE = "qb_owner_token";
    const MY_KEY = "qb_my_quizzes";
    const ACCESS_KEY = "qb_access_quizzes";
    const COMMENT_TOKEN_KEY = "qb_comment_token";
    const COMMENT_NAME_KEY = "qb_comment_name";

    const state = {
      screen: "loading",
      docId: "",
      doc: null,
      draft: null,
      accessMode: "none", // none | owner | open | key
      showComments: false,
      commentDraft: {
        name: "",
        text: "",
        isPrivate: false
      },
      quiz: {
        phase: "question",
        order: [],
        index: 0,
        typedAnswer: "",
        lastResult: null,
        attempts: {}
      }
    };

    let resultEnterHandler = null;
    const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");

    function uid() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID().replace(/-/g, "");
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function slugify(text) {
      return (text || "quiz")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^\p{L}\p{N}\-]+/gu, "")
        .replace(/\-+/g, "-")
        .replace(/^-+|-+$/g, "") || "quiz";
    }

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function norm(s) {
      return String(s ?? "")
        .replace(/\u3000/g, " ")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase();
    }

    function splitAnswers(text) {
      return String(text ?? "")
        .split(/[、,]/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function parseLine(line) {
      const raw = String(line ?? "").trim();
      if (!raw) return null;

      const hasEq = raw.includes("=") || raw.includes("＝");
      if (!hasEq) return { kind: "section", text: raw };

      const parts = raw.split(/[=＝]/).map(v => v.trim());
      if (parts.length < 2) return null;

      const question = parts[0];
      if (!question) return null;

      let answerText = "";
      if ((parts[1] || "").toLowerCase() === "choice") {
        answerText = parts.slice(2).join("=");
      } else {
        answerText = parts.slice(1).join("=");
      }

      const answers = splitAnswers(answerText);
      if (!answers.length) return null;

      return { kind: "item", question, answers };
    }

    function parseItems(text) {
      const lines = String(text ?? "").split(/\r?\n/);
      const items = [];
      let currentSection = "";

      for (const line of lines) {
        const parsed = parseLine(line);
        if (!parsed) continue;
        if (parsed.kind === "section") {
          currentSection = parsed.text;
          continue;
        }
        items.push({
          section: currentSection,
          question: parsed.question,
          answers: parsed.answers,
          rawLine: line.trim()
        });
      }

      return items;
    }

    function itemsToRawText(items) {
      const lines = [];
      let lastSection = null;

      for (const item of items || []) {
        if (item.section && item.section !== lastSection) {
          lines.push(item.section);
          lastSection = item.section;
        }
        lines.push(`${item.question}=${(item.answers || []).join(",")}`);
      }

      return lines.join("\n");
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setCookie(name, value, days = 3650) {
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`;
    }

    function getCookie(name) {
      const parts = document.cookie ? document.cookie.split("; ") : [];
      for (const part of parts) {
        const idx = part.indexOf("=");
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : "");
      }
      return "";
    }

    function safeLocalGet(key) {
      try { return localStorage.getItem(key); } catch { return null; }
    }

    function safeLocalSet(key, value) {
      try { localStorage.setItem(key, value); } catch {}
    }

    function loadMyList() {
      try {
        const raw = safeLocalGet(MY_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch {
        return [];
      }
    }

    function saveMyList(list) {
      safeLocalSet(MY_KEY, JSON.stringify(list.slice(0, 50)));
    }

    function loadAccessList() {
      try {
        const raw = safeLocalGet(ACCESS_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch {
        return [];
      }
    }

    function saveAccessList(list) {
      safeLocalSet(ACCESS_KEY, JSON.stringify(list.slice(0, 50)));
    }

    function findAccessRecord(id) {
      return loadAccessList().find(v => v.id === id) || null;
    }

    function rememberAccess(id, key, meta = {}) {
      if (!id || !key) return;
      const list = loadAccessList();
      const next = {
        id,
        key,
        title: String(meta.title || ""),
        subtitle: String(meta.subtitle || ""),
        createdAt: Number(meta.createdAt || Date.now()),
        updatedAt: Number(meta.updatedAt || Date.now())
      };

      const idx = list.findIndex(v => v.id === id);
      if (idx >= 0) list[idx] = { ...list[idx], ...next };
      else list.unshift(next);

      list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      saveAccessList(list);
    }

    function removeAccessRecord(id) {
      const next = loadAccessList().filter(v => v.id !== id);
      saveAccessList(next);
    }

    function upsertMyMeta(meta) {
      const list = loadMyList();
      const id = String(meta?.id || "");
      if (!id) return;

      const next = {
        id,
        title: String(meta.title || ""),
        subtitle: String(meta.subtitle || ""),
        createdAt: Number(meta.createdAt || Date.now()),
        updatedAt: Number(meta.updatedAt || Date.now())
      };

      const idx = list.findIndex(v => v.id === id);
      if (idx >= 0) list[idx] = { ...list[idx], ...next };
      else list.unshift(next);

      list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      saveMyList(list);
    }

    function removeMyMeta(id) {
      const next = loadMyList().filter(v => v.id !== id);
      saveMyList(next);
    }

    function normalizeTs(value) {
      if (typeof value === "number") return value;
      if (!value) return null;
      if (typeof value.toDate === "function") {
        const d = value.toDate();
        return d instanceof Date ? d.getTime() : null;
      }
      if (typeof value.seconds === "number") {
        return value.seconds * 1000 + Math.floor((value.nanoseconds || 0) / 1e6);
      }
      return null;
    }

    function formatMinute(value) {
      const ts = normalizeTs(value);
      if (!ts) return "—";
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function applySystemTheme() {
      document.body.classList.toggle("dark", !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches));
    }

    function clearResultEnterHandler() {
      if (resultEnterHandler) {
        window.removeEventListener("keydown", resultEnterHandler);
        resultEnterHandler = null;
      }
    }

    function enableResultEnterHandler() {
      clearResultEnterHandler();
      const isDesktop = window.matchMedia && window.matchMedia("(pointer:fine)").matches && window.innerWidth >= 700;
      if (!isDesktop) return;

      resultEnterHandler = (e) => {
        if (e.key !== "Enter") return;
        const active = document.activeElement;
        if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) return;
        e.preventDefault();
        nextQuestion();
      };

      window.addEventListener("keydown", resultEnterHandler);
    }

    function basePath() {
      const p = location.pathname;
      if (p.endsWith("/")) return p;
      const i = p.lastIndexOf("/");
      return i >= 0 ? p.slice(0, i + 1) : "/";
    }

    function prettyLink(id) {
      return `${location.origin}${basePath()}#/${encodeURIComponent(id)}`;
    }

    function route() {
      const raw = location.hash.replace(/^#/, "");
      const parts = raw.split("/").filter(Boolean);
      if (!parts.length) return { name: "home" };
      if (parts[0] === "create") return { name: "create" };
      if (parts[0] === "edit" && parts[1]) return { name: "edit", id: decodeURIComponent(parts[1]) };
      return { name: "quiz", id: decodeURIComponent(parts[0]) };
    }

    function getCommentToken() {
      let token = safeLocalGet(COMMENT_TOKEN_KEY);
      if (!token) {
        token = uid();
        safeLocalSet(COMMENT_TOKEN_KEY, token);
      }
      return token;
    }

    function getCommentName() {
      const n = safeLocalGet(COMMENT_NAME_KEY);
      if (!n) {
        safeLocalSet(COMMENT_NAME_KEY, "匿名");
        return "匿名";
      }
      return n;
    }

    function setCommentName(name) {
      safeLocalSet(COMMENT_NAME_KEY, name || "匿名");
    }

    function sortComments(comments) {
      return (comments || []).slice().sort((a, b) => (normalizeTs(b.createdAt) || 0) - (normalizeTs(a.createdAt) || 0));
    }

    function canViewComment(comment) {
      if (!comment?.isPrivate) return true;
      if (!state.doc) return false;
      if (state.doc.keyMode === "open") return true;
      if (state.accessMode === "owner" || state.accessMode === "key") return true;
      return comment.authorToken && comment.authorToken === getCommentToken();
    }

    function canManageComment(comment) {
      if (!comment) return false;
      if (!state.doc) return false;
      if (state.accessMode === "owner") return true;
      return comment.authorToken && comment.authorToken === getCommentToken();
    }

    function refreshCommentDraftDefaults() {
      if (!state.commentDraft) {
        state.commentDraft = {
          name: getCommentName(),
          text: "",
          isPrivate: false
        };
        return;
      }
      if (!state.commentDraft.name) state.commentDraft.name = getCommentName();
    }

    function setAccessModeForDoc(docData, id) {
      if (docData.keyMode === "open") {
        state.accessMode = isOwner() ? "owner" : "open";
        return;
      }
      if (isOwner()) {
        state.accessMode = "owner";
        return;
      }
      const rec = findAccessRecord(id);
      if (rec && docData.key && rec.key === docData.key) {
        state.accessMode = "key";
        return;
      }
      state.accessMode = "none";
    }

    function isOwner() {
      return !!(state.doc?.ownerToken && getCookie(OWNER_COOKIE) === state.doc.ownerToken);
    }

    function canEdit() {
      if (!state.doc) return false;
      if (state.doc.keyMode === "open") return true;
      return state.accessMode === "owner" || state.accessMode === "key";
    }

    function currentQuestion() {
      if (!state.doc?.items?.length) return null;
      const idx = state.quiz.order[state.quiz.index];
      if (idx === undefined) return null;
      return { idx, item: state.doc.items[idx] };
    }

    function blankDraft() {
      return { title: "", subtitle: "", rawText: "", keyMode: "key", key: "" };
    }

    function topButtonHtml() {
      return `<button class="ghost" id="topBtn">トップ</button>`;
    }

    function editorActionButtonsHtml() {
      const buttons = [`<button class="ghost" id="topBtn">トップ</button>`];

      if (state.doc) {
        if (state.accessMode === "owner") {
          buttons.push(`<button class="danger" id="deleteBtn">削除</button>`);
        } else if (state.accessMode === "key") {
          buttons.push(`<button class="danger" id="leaveBtn">脱退</button>`);
        }
      }

      buttons.push(`<button class="primary" id="saveBtn">保存</button>`);
      return buttons.join("");
    }

    function openEditFromDoc() {
      state.draft = {
        title: state.doc?.title || "",
        subtitle: state.doc?.subtitle || "",
        rawText: itemsToRawText(state.doc?.items || []),
        keyMode: state.doc?.keyMode || "key",
        key: state.doc?.key || ""
      };
      state.screen = "editor";
      render();
    }

    function startQuiz(docData, id) {
      state.doc = {
        ...docData,
        comments: sortComments(docData.comments || [])
      };
      state.docId = id;
      setAccessModeForDoc(state.doc, id);
      state.showComments = false;
      state.commentDraft = {
        name: getCommentName(),
        text: "",
        isPrivate: false
      };

      if (state.accessMode === "key") {
        rememberAccess(id, docData.key, {
          title: docData.title || "",
          subtitle: docData.subtitle || "",
          createdAt: normalizeTs(docData.createdAt) || Date.now(),
          updatedAt: normalizeTs(docData.updatedAt) || Date.now()
        });
      }

      if (state.accessMode === "owner") {
        upsertMyMeta({
          id,
          title: docData.title || "",
          subtitle: docData.subtitle || "",
          createdAt: normalizeTs(docData.createdAt) || Date.now(),
          updatedAt: normalizeTs(docData.updatedAt) || Date.now()
        });
      }

      state.quiz = {
        phase: "question",
        order: shuffle((docData.items || []).map((_, i) => i)),
        index: 0,
        typedAnswer: "",
        lastResult: null,
        attempts: {}
      };

      state.screen = "quiz";
      document.title = docData.title ? `${docData.title} | 問題作成サイト` : "問題作成サイト";
      render();
    }

    function restartQuiz() {
      if (!state.doc) return;
      startQuiz(state.doc, state.docId);
    }

    function nextQuestion() {
      state.quiz.index += 1;
      state.quiz.typedAnswer = "";
      state.quiz.lastResult = null;
      state.quiz.phase = state.quiz.index >= state.quiz.order.length ? "done" : "question";
      render();
    }

    function submitAnswer() {
      const q = currentQuestion();
      if (!q) return;

      const given = state.quiz.typedAnswer;
      if (!String(given || "").trim()) {
        alert("答えを入れてね");
        return;
      }

      const correct = q.item.answers.map(norm).includes(norm(given));
      state.quiz.attempts[q.idx] = { given, correct };
      state.quiz.lastResult = { idx: q.idx, given, correct };
      state.quiz.phase = "result";
      render();
    }

    function syncEditorArea(textarea, gutter) {
      const minHeight = 420;
      textarea.style.height = "auto";
      const next = Math.max(minHeight, textarea.scrollHeight);
      textarea.style.height = `${next}px`;
      if (gutter) gutter.style.height = `${next}px`;

      const count = Math.max(1, textarea.value.split(/\r?\n/).length + 1);
      gutter.textContent = Array.from({ length: count }, (_, i) => i + 1).join("\n");
    }

    async function persistComments(nextComments) {
      if (!state.docId) return;
      const sorted = sortComments(nextComments);

      await setDoc(doc(db, COLLECTION, state.docId), {
        comments: sorted
      }, { merge: true });

      state.doc.comments = sorted;
      render();
    }

    function openDeleteConfirmThenDelete() {
      if (!state.docId) return;

      const title = state.doc?.title || state.draft?.title || "";
      const typed = prompt(`削除するには、タイトル「${title}」をそのまま入力してね`, "");
      if (typed === null) return;
      if (typed.trim() !== title.trim()) {
        alert("タイトルが違うから削除をやめたよ");
        return;
      }

      if (!confirm(`本当に「${title}」を削除する？\nこの操作は戻せないよ。`)) return;

      const btn = document.getElementById("deleteBtn");
      if (btn) btn.disabled = true;

      (async () => {
        try {
          await deleteDoc(doc(db, COLLECTION, state.docId));
          removeMyMeta(state.docId);
          removeAccessRecord(state.docId);
          state.docId = "";
          state.doc = null;
          state.draft = null;
          state.accessMode = "none";
          state.showComments = false;
          location.hash = "";
          alert("削除したよ");
          render();
        } catch (err) {
          console.error("delete failed:", err);
          alert(`削除で失敗したよ: ${err?.message || err}`);
        } finally {
          if (btn) btn.disabled = false;
        }
      })();
    }

    function openLeaveConfirmThenLeave() {
      if (!state.docId) return;
      if (!confirm("本当に共同編集から脱退しますか？")) return;
      removeAccessRecord(state.docId);
      state.accessMode = "none";
      alert("脱退したよ");
      render();
    }

    function openCommentToggle() {
      state.showComments = !state.showComments;
      render();
    }

    async function addComment() {
      if (!state.docId || !state.doc) return;

      const name = (state.commentDraft?.name || getCommentName()).trim() || "匿名";
      const text = (state.commentDraft?.text || "").trim();
      const isPrivate = !!state.commentDraft?.isPrivate;
      if (!text) {
        alert("コメントを書いてね");
        return;
      }

      const comment = {
        id: uid(),
        authorToken: getCommentToken(),
        authorName: name,
        text,
        isPrivate,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      setCommentName(name);

      const next = sortComments([...(state.doc.comments || []), comment]);
      await persistComments(next);

      state.commentDraft.text = "";
      state.commentDraft.isPrivate = false;
      state.commentDraft.name = name;
      state.showComments = true;
      render();
    }

    async function toggleCommentVisibility(commentId) {
      if (!state.doc?.comments?.length) return;
      const next = state.doc.comments.map(c => c.id === commentId ? { ...c, isPrivate: !c.isPrivate, updatedAt: Date.now() } : c);
      await persistComments(next);
      state.showComments = true;
      render();
    }

    async function deleteComment(commentId) {
      if (!state.doc?.comments?.length) return;
      if (!confirm("このコメントを削除する？")) return;
      const next = state.doc.comments.filter(c => c.id !== commentId);
      await persistComments(next);
      state.showComments = true;
      render();
    }

    function bindTopButton() {
      const topBtn = document.getElementById("topBtn");
      if (topBtn) {
        topBtn.addEventListener("click", () => {
          location.hash = "";
        });
      }
    }

    function bindHomeActions() {
      document.querySelectorAll("[data-open-quiz]").forEach(btn => {
        btn.addEventListener("click", () => {
          location.hash = `#/${encodeURIComponent(btn.dataset.openQuiz || "")}`;
        });
      });

      document.querySelectorAll("[data-edit-quiz]").forEach(btn => {
        btn.addEventListener("click", () => {
          location.hash = `#/edit/${encodeURIComponent(btn.dataset.editQuiz || "")}`;
        });
      });

      document.querySelectorAll("[data-copy-quiz]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.copyQuiz || "";
          const link = prettyLink(id);
          try {
            await navigator.clipboard.writeText(link);
            alert("リンクをコピーしたよ");
          } catch {
            prompt("コピーできない環境だったよ。手動でコピーしてね", link);
          }
        });
      });

      document.querySelectorAll("[data-leave-quiz]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.leaveQuiz || "";
          if (!confirm("本当に共同編集から脱退しますか？")) return;
          removeAccessRecord(id);
          render();
        });
      });

      const createBtn = document.getElementById("createBtn");
      if (createBtn) {
        createBtn.addEventListener("click", () => {
          location.hash = "#/create";
        });
      }
    }

    function commentButtonLabel(comments) {
      const total = comments.length;
      const hidden = comments.filter(c => c.isPrivate && !canViewComment(c)).length;
      if (state.showComments) return "コメントを閉じる";
      return hidden > 0 ? `コメント (${total}) 🫥 ${hidden}` : `コメント (${total})`;
    }

      const visibleComments = comments.filter(c => canViewComment(c));

      const composer = `
        <div class="card commentWrap">
          <div class="commentHeader">

      const hiddenNote = hiddenCount > 0 ? `<div class="note">🫥 非公開コメントが ${hiddenCount} 件あるよ。</div>` : "";

              ${list}

    }

            <button class="ghost miniAction" data-copy-quiz="${esc(item.id)}">コピー</button>
          </div>
        </div>
      `).join("") : `<div class="note">まだないよ。作成ボタンからどうぞ。</div>`;

        <div class="listItem">
          <div class="listMeta">
            <div class="reviewQ">${esc(item.title || "無題")}</div>
            <div class="reviewA">${esc(item.subtitle || "")}</div>
            <div class="metaLine">作成: ${esc(formatMinute(item.createdAt))}</div>
            <div class="metaLine">最終編集: ${esc(formatMinute(item.updatedAt))}</div>
          </div>
          <div class="listActions">
            <button class="ghost miniAction" data-open-quiz="${esc(item.id)}">開く</button>
            <button class="ghost miniAction" data-edit-quiz="${esc(item.id)}">編集</button>
            <button class="ghost miniAction" data-copy-quiz="${esc(item.id)}">コピー</button>
            <button class="ghost miniAction" data-leave-quiz="${esc(item.id)}">脱退</button>

      `).join("") : `<div class="note">まだないよ。Key を入れたものがここに出るよ。</div>`;

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">問題作成サイト</h1>
              <div class="sub">作って、そのまま遊べる</div>
            </div>
          </div>

          <div class="hero">
            <div class="card">
              <h1 style="margin:0;font-size:clamp(34px,6vw,54px);line-height:1.05;letter-spacing:-.03em">作成して、公開して、答える。</h1>
              <p style="margin:12px 0 0;color:var(--muted);line-height:1.8;font-size:16px">
                1行ごとに <b>問題=答え</b> を入れるだけ。<br>
                <b>= なしの行</b> は共通見出しになるよ。たとえば「日本について」の下にいくつか問題を並べられる。
              </p>
              <div style="height:14px"></div>
              <button class="bigBtn" id="createBtn">作成</button>
              <div style="height:10px"></div>
              <div class="note">cookie で作成者を覚えるよ。Key が open なら誰でも編集できる。</div>

              <div class="label" style="font-size:14px">マイクイズ</div>

      bindHomeActions();

    function renderEditor() {
      clearResultEnterHandler();
      const d = state.draft || blankDraft();
      document.title = "作成 / 編集 | 問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">作成 / 編集</h1>
              <div class="sub">タイトルの右に Key ボタン</div>
            </div>
            <div class="row">
              ${editorActionButtonsHtml()}
            </div>
          </div>

          <div class="card" style="display:grid;gap:14px">
            <div class="row">
              <div style="flex:1;min-width:220px">
                <div class="label">タイトル</div>
                <input id="titleInput" class="input" type="text" placeholder="タイトル" value="${esc(d.title)}">
              </div>
              <button class="ghost" id="keyBtn" style="height:48px;align-self:end">Key</button>
            </div>

            <div>
              <div class="label">サブタイトル</div>
              <input id="subInput" class="input" type="text" placeholder="サブタイトル" value="${esc(d.subtitle)}">
            </div>

            <div>
              <div class="label">問題欄</div>
              <div class="gridEditor">
                <div id="gutter" class="gutter"></div>
                <textarea id="problemText" class="textarea" wrap="off" spellcheck="false" placeholder="例:
日本について
首都=東京
人口=約1.2億人
面積=377975km²
">${esc(d.rawText)}</textarea>
              </div>
              <div class="help">
                1行に1つ書くよ。<br>
                <b>= なしの行</b> は共通見出し。<br>
                <b>問題=答え</b> で普通の問題。<br>
                <b>問題=答え1,答え2</b> で複数正解。
              </div>
            </div>

            <div id="editorInfo" class="note"></div>
          </div>
        </div>
      `;

      const titleInput = document.getElementById("titleInput");
      const subInput = document.getElementById("subInput");
      const problemText = document.getElementById("problemText");
      const gutter = document.getElementById("gutter");
      const keyBtn = document.getElementById("keyBtn");
      const saveBtn = document.getElementById("saveBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const leaveBtn = document.getElementById("leaveBtn");
      const topBtn = document.getElementById("topBtn");
      const editorInfo = document.getElementById("editorInfo");

      function refreshKeyStatus() {
        if (!state.doc) {
          editorInfo.textContent = d.keyMode === "open"
            ? "Key: open（誰でも編集）"
            : (d.key ? "Key: 設定済み" : "Key: 未設定");
          keyBtn.disabled = false;
          keyBtn.textContent = "Key";
          return;
        }

        if (isOwner()) {
          editorInfo.textContent = d.keyMode === "open"
            ? "Key: open（誰でも編集）"
            : (d.key ? "Key: 設定済み" : "Key: 未設定");
          keyBtn.disabled = false;
          keyBtn.textContent = "Key";
          keyBtn.title = "";
        } else {
          editorInfo.textContent = state.doc.keyMode === "open"
            ? "公開編集モード"
            : "Keyは主催者のみ変更できます";
          keyBtn.disabled = true;
          keyBtn.textContent = "Key";
          keyBtn.title = "Keyは主催者のみ変更できます";
        }
      }

      titleInput.addEventListener("input", e => d.title = e.target.value);
      subInput.addEventListener("input", e => d.subtitle = e.target.value);
      problemText.addEventListener("input", e => {
        d.rawText = e.target.value;
        syncEditorArea(problemText, gutter);
      });
      problemText.addEventListener("scroll", () => {});

      keyBtn.addEventListener("click", () => {
        if (state.doc && !isOwner()) return;

        const cur = d.keyMode === "open" ? "open" : (d.key || "");
        const next = prompt("Key を入力。open で誰でも編集。", cur);
        if (next === null) return;
        const v = next.trim();
        if (!v) {
          d.keyMode = "key";
          d.key = "";
        } else if (v.toLowerCase() === "open") {
          d.keyMode = "open";
          d.key = "";
        } else {
          d.keyMode = "key";
          d.key = v;
        }
        refreshKeyStatus();
      });

      if (topBtn) {
        topBtn.addEventListener("click", () => {
          location.hash = "";
        });
      }

      if (saveBtn) {
        saveBtn.addEventListener("click", async () => {
          const title = d.title.trim();
          const subtitle = d.subtitle.trim();
          const items = parseItems(d.rawText);

          if (!title) return alert("タイトルを入れてね");
          if (!items.length) return alert("問題が1つも読めなかったよ。");

          const newId = slugify(title);
          const oldId = state.docId || "";

          const isExisting = !!state.doc;
          const ownerToken = isExisting ? (state.doc.ownerToken || getCookie(OWNER_COOKIE) || uid()) : (getCookie(OWNER_COOKIE) || uid());
          if (!isExisting) setCookie(OWNER_COOKIE, ownerToken);

          const canChangeKey = !state.doc || isOwner();
          const effectiveKeyMode = canChangeKey ? d.keyMode : (state.doc?.keyMode || "key");
          const effectiveKey = canChangeKey ? (d.keyMode === "open" ? "" : d.key) : (state.doc?.key || "");
          const existingCreatedAt = normalizeTs(state.doc?.createdAt) || Date.now();
          const existingComments = Array.isArray(state.doc?.comments) ? state.doc.comments : [];

          const payload = {
            title,
            subtitle,
            items,
            problems: items,
            rawText: d.rawText,
            keyMode: effectiveKeyMode,
            key: effectiveKey,
            ownerToken,
            slug: newId,
            createdAt: existingCreatedAt,
            updatedAt: Date.now(),
            comments: existingComments
          };

          saveBtn.disabled = true;
          saveBtn.textContent = "保存中...";

          try {
            await setDoc(doc(db, COLLECTION, newId), payload, { merge: true });

            const keyChanged = !!state.doc && (
              (state.doc.keyMode || "key") !== effectiveKeyMode ||
              (effectiveKeyMode !== "open" && (state.doc.key || "") !== effectiveKey)
            );

            if (oldId && oldId !== newId) {
              try {
                await deleteDoc(doc(db, COLLECTION, oldId));
              } catch (_) {}
              removeMyMeta(oldId);
              removeAccessRecord(oldId);
            }

            if (keyChanged && oldId === newId) {
              removeAccessRecord(newId);
            }

            state.docId = newId;
            state.doc = {
              ...payload,
              items,
              comments: sortComments(existingComments)
            };

            if (isOwner() || !isExisting) {
              upsertMyMeta({
                id: newId,
                title: payload.title,
                subtitle: payload.subtitle,
                createdAt: payload.createdAt,
                updatedAt: payload.updatedAt
              });
            }

            if (state.accessMode === "key") {
              rememberAccess(newId, effectiveKey, {
                title: payload.title,
                subtitle: payload.subtitle,
                createdAt: payload.createdAt,
                updatedAt: payload.updatedAt
              });
            }

            location.hash = `#/${encodeURIComponent(newId)}`;
            const link = prettyLink(newId);
            navigator.clipboard?.writeText(link).catch(() => {});
            alert(`保存したよ！\n\n${link}`);

            startQuiz(state.doc, newId);
          } catch (err) {
            console.error("save failed:", err);
            alert(`保存で失敗したよ: ${err?.message || err}`);
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = "保存";
          }
        });
      }

      if (deleteBtn) deleteBtn.addEventListener("click", openDeleteConfirmThenDelete);
      if (leaveBtn) leaveBtn.addEventListener("click", openLeaveConfirmThenLeave);

      syncEditorArea(problemText, gutter);
      refreshKeyStatus();
      titleInput.focus();
    }

    function renderQuestion() {
      clearResultEnterHandler();
      const q = currentQuestion();
      if (!q) {
        state.quiz.phase = "done";
        render();
        return;
      }

      document.title = state.doc.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">${esc(state.doc.title || "問題")}</h1>
              <div class="sub">${esc(state.doc.subtitle || "")}</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
              <button class="ghost" id="editBtn">${canEdit() ? "編集" : "Keyを入力して編集"}</button>
            </div>
          </div>

          <div class="quiz">
            <div class="card">
              <div class="progress">
                <div>問題 ${state.quiz.index + 1} / ${state.quiz.order.length}</div>
                <div>${state.doc.items.length}問中</div>
              </div>
              <div style="height:12px"></div>
              ${q.item.section ? `<div class="sectionText">${esc(q.item.section)}</div><div style="height:10px"></div>` : ""}
              <div class="question">${esc(q.item.question)}</div>
            </div>

            <div class="card" style="display:grid;gap:10px">
              <div class="label">答え</div>
              <input id="answerInput" class="answer" type="text" placeholder="ここに入力" autocomplete="off" autocapitalize="off" spellcheck="false">
              <div class="actions">
                <button class="submit" id="submitBtn">✅</button>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => {
        location.hash = "";
      });

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open") return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          state.accessMode = "key";
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      const input = document.getElementById("answerInput");
      input.focus();
      input.addEventListener("input", e => state.quiz.typedAnswer = e.target.value);
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          submitAnswer();
        }
      });

      document.getElementById("submitBtn").addEventListener("click", submitAnswer);
    }

    function renderResult() {
      const r = state.quiz.lastResult;
      if (!r) {
        state.quiz.phase = "question";
        render();
        return;
      }

      const q = state.doc.items[r.idx];
      document.title = state.doc.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">${esc(state.doc.title || "問題")}</h1>
              <div class="sub">${esc(state.doc.subtitle || "")}</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
              <button class="ghost" id="editBtn">${canEdit() ? "編集" : "Keyを入力して編集"}</button>
            </div>
          </div>

          <div class="quiz">
            <div class="${r.correct ? "good" : "bad"}">${r.correct ? "正解！" : "ちがう！"}</div>

            <div class="card">
              ${q.section ? `<div class="sectionText">${esc(q.section)}</div><div style="height:10px"></div>` : ""}
              <div class="label">問題</div>
              <div class="question" style="font-size:22px">${esc(q.question)}</div>
              <div style="height:12px"></div>
              <div class="label">答え</div>
              <div class="explain">${esc(q.answers.join(" / "))}</div>
              <div style="height:12px"></div>
              <div class="label">あなたの答え</div>
              <div class="explain">${esc(r.given)}</div>
            </div>

            <div class="actions">
              <button class="next" id="nextBtn">次へ</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => {
        location.hash = "";
      });

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open") return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          state.accessMode = "key";
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      document.getElementById("nextBtn").addEventListener("click", nextQuestion);
      enableResultEnterHandler();
    }

    function renderDone() {
      clearResultEnterHandler();
      const total = state.doc.items.length;
      const correctCount = Object.values(state.quiz.attempts).filter(v => v.correct).length;
      const comments = sortComments(state.doc.comments || []);

      document.title = state.doc.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">${esc(state.doc.title || "問題")}</h1>
              <div class="sub">${esc(state.doc.subtitle || "")}</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
              <button class="ghost" id="editBtn">${canEdit() ? "編集" : "Keyを入力して編集"}</button>
            </div>
          </div>

          <div class="summary">
            <div class="card">
              <div class="score">${correctCount} / ${total} 問正解</div>
              <div class="note" style="margin-top:10px">もう一回やり直せるよ。</div>
            </div>

            <div class="actions" style="justify-content:flex-start">
              <button class="primary" id="restartBtn">もう一度！</button>
              <button class="ghost" id="commentsBtn">${esc(commentButtonLabel(comments))}</button>
            </div>

            ${state.showComments ? renderCommentsPanel(comments) : ""}

            <div class="card">
              <div class="label">全問題と答え</div>
              <div class="reviewList">
                ${state.doc.items.map(item => `
                  <div class="reviewItem">
                    ${item.section ? `<div class="reviewSection">${esc(item.section)}</div>` : ""}
                    <div class="reviewQ">${esc(item.question)}</div>
                    <div class="reviewA">答え: ${esc(item.answers.join(" / "))}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => {
        location.hash = "";
      });

      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open") return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          state.accessMode = "key";
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      document.getElementById("restartBtn").addEventListener("click", restartQuiz);

      const commentsBtn = document.getElementById("commentsBtn");
      if (commentsBtn) commentsBtn.addEventListener("click", openCommentToggle);

      if (state.showComments) {
        const commentName = document.getElementById("commentName");
        const commentText = document.getElementById("commentText");
        const commentPrivate = document.getElementById("commentPrivate");
        const postCommentBtn = document.getElementById("postCommentBtn");

        if (commentName) {
          commentName.addEventListener("input", e => {
            state.commentDraft.name = e.target.value;
            setCommentName(e.target.value.trim() || "匿名");
          });
        }
        if (commentText) {
          commentText.addEventListener("input", e => {
            state.commentDraft.text = e.target.value;
            e.target.style.height = "auto";
            e.target.style.height = `${Math.max(120, e.target.scrollHeight)}px`;
          });
          commentText.style.height = "auto";
          commentText.style.height = `${Math.max(120, commentText.scrollHeight)}px`;
        }
        if (commentPrivate) {
          commentPrivate.addEventListener("change", e => {
            state.commentDraft.isPrivate = !!e.target.checked;
          });
        }
        if (postCommentBtn) postCommentBtn.addEventListener("click", addComment);

        document.querySelectorAll("[data-toggle-comment]").forEach(btn => {
          btn.addEventListener("click", () => toggleCommentVisibility(btn.dataset.toggleComment || ""));
        });
        document.querySelectorAll("[data-delete-comment]").forEach(btn => {
          btn.addEventListener("click", () => deleteComment(btn.dataset.deleteComment || ""));
        });
      }
    }

    function renderLoading() {
      clearResultEnterHandler();
      document.title = "読み込み中 | 問題作成サイト";
      root.innerHTML = `
        <div class="page">
          <div class="hero">
            <div class="card">
              <h1 style="margin:0">読み込み中…</h1>
              <p style="margin:12px 0 0;color:var(--muted)">Firestore からデータを取ってるよ。</p>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.screen === "loading") return renderLoading();
      if (state.screen === "home") return renderHome();
      if (state.screen === "editor") return renderEditor();

      if (state.screen === "quiz") {
        if (!state.doc || !state.doc.items || !state.doc.items.length) {
          state.screen = "home";
          return render();
        }
        if (state.quiz.phase === "question") return renderQuestion();
        if (state.quiz.phase === "result") return renderResult();
        if (state.quiz.phase === "done") return renderDone();
      }
    }

    async function openEditRoute(id) {
      state.screen = "loading";
      render();

      try {
        const snap = await getDoc(doc(db, COLLECTION, id));
        if (!snap.exists()) {
          state.screen = "home";
          render();
          return;
        }

        const data = snap.data() || {};
        const items = Array.isArray(data.items)
          ? data.items
          : Array.isArray(data.problems)
            ? data.problems.map(p => ({
                section: p.section || "",
                question: p.question,
                answers: p.answers || [],
                rawLine: p.rawLine || ""
              }))
            : parseItems(data.rawText || "");

        state.docId = id;
        state.doc = {
          title: data.title || "問題",
          subtitle: data.subtitle || "",
          items,
          problems: items,
          rawText: data.rawText || "",
          keyMode: data.keyMode || "key",
          key: data.key || "",
          ownerToken: data.ownerToken || "",
          slug: data.slug || id,
          createdAt: data.createdAt || null,
          updatedAt: data.updatedAt || null,
          comments: sortComments(Array.isArray(data.comments) ? data.comments : [])
        };

        setAccessModeForDoc(state.doc, id);

        if (state.accessMode === "key") {
          rememberAccess(id, state.doc.key, {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          openEditFromDoc();
          return;
        }

        if (state.accessMode === "owner" || state.accessMode === "open") {
          openEditFromDoc();
          return;
        }

        const entered = prompt("Key を入力して編集", "");
        if (entered === null) {
          location.hash = `#/${encodeURIComponent(id)}`;
          return;
        }

        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            createdAt: normalizeTs(state.doc.createdAt) || Date.now(),
            updatedAt: normalizeTs(state.doc.updatedAt) || Date.now()
          });
          state.accessMode = "key";
          openEditFromDoc();
        } else {
          alert("Key が違うよ");
          location.hash = `#/${encodeURIComponent(id)}`;
        }
      } catch (err) {
        console.error(err);
        state.screen = "home";
        render();
      }
    }

    async function loadRoute() {
      applySystemTheme();
      const r = route();

      if (r.name === "home") {
        state.screen = "home";
        state.showComments = false;
        render();
        return;
      }

      if (r.name === "create") {
        state.doc = null;
        state.docId = "";
        state.accessMode = "none";
        state.draft = blankDraft();
        state.showComments = false;
        render();
        return;
      }

      if (r.name === "edit") {
        await openEditRoute(r.id);
        return;
      }

      if (r.name === "quiz") {
        state.screen = "loading";
        state.showComments = false;
        render();

        try {
          const snap = await getDoc(doc(db, COLLECTION, r.id));
          if (!snap.exists()) {
            state.screen = "home";
            render();
            return;
          }

          const data = snap.data() || {};
          const items = Array.isArray(data.items)
            ? data.items
            : Array.isArray(data.problems)
              ? data.problems.map(p => ({
                  section: p.section || "",
                  question: p.question,
                  answers: p.answers || [],
                  rawLine: p.rawLine || ""
                }))
              : parseItems(data.rawText || "");

          startQuiz({
            title: data.title || "問題",
            subtitle: data.subtitle || "",
            items,
            problems: items,
            rawText: data.rawText || "",
            keyMode: data.keyMode || "key",
            key: data.key || "",
            ownerToken: data.ownerToken || "",
            slug: data.slug || r.id,
            createdAt: data.createdAt || null,
            updatedAt: data.updatedAt || null,
            comments: sortComments(Array.isArray(data.comments) ? data.comments : [])
          }, r.id);
        } catch (err) {
          console.error(err);
          state.screen = "home";
          render();
        }
      }
    }

    if (systemDark) {
      const onThemeChange = () => {
        applySystemTheme();
        render();
      };
      if (systemDark.addEventListener) {
        systemDark.addEventListener("change", onThemeChange);
      } else if (systemDark.addListener) {
        systemDark.addListener(onThemeChange);
      }
    }

    window.addEventListener("hashchange", loadRoute);
    loadRoute();
  </script>
</body>
</html>
