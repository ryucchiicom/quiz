<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題作成サイト</title>
  <style>
    :root{
      --bg1:#f8faff;
      --bg2:#eef2f8;
      --panel:#fff;
      --line:#d8dbe5;
      --text:#1f2430;
      --muted:#6b7280;
      --accent:#2f6fed;
      --good:#118a3a;
      --bad:#d33c3c;
      --radius:18px;
      --shadow:0 12px 30px rgba(20,25,40,.08);
      --ownerBg:rgba(47,111,237,.08);
      --ownerLine:rgba(47,111,237,.42);
      --editorBg:rgba(58,168,255,.08);
      --editorLine:rgba(58,168,255,.42);
    }

    body.dark{
      --bg1:#0b1120;
      --bg2:#111827;
      --panel:#111827;
      --line:#243043;
      --text:#e7ecf7;
      --muted:#9aa4b2;
      --accent:#5b8cff;
      --good:#39c66d;
      --bad:#ff7676;
      --shadow:0 12px 30px rgba(0,0,0,.26);
      --ownerBg:rgba(91,140,255,.12);
      --ownerLine:rgba(91,140,255,.45);
      --editorBg:rgba(58,168,255,.12);
      --editorLine:rgba(88,189,255,.45);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    button,input,textarea,select{font:inherit}
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
    }

    .hide{display:none !important;}
    .page{max-width:980px;margin:0 auto;padding:16px;min-height:100vh;}
    .topbar{
      display:flex;justify-content:space-between;gap:12px;align-items:center;
      position:sticky;top:0;padding:8px 0 12px;backdrop-filter:blur(8px);z-index:5;
    }
    .title{
      font-size:28px;font-weight:900;line-height:1.1;margin:0;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .sub{margin-top:4px;color:var(--muted);font-size:13px;}
    .card{
      background:var(--panel);border:1px solid rgba(15,23,42,.08);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:18px;
    }
    .hero{max-width:860px;margin:36px auto 0;display:grid;gap:16px;}
    .bigBtn,.primary{background:var(--accent);color:#fff;font-weight:800;}
    .ghost{background:#eef3ff;color:#244a9c;border:1px solid #d7e2ff;font-weight:700;}
    body.dark .ghost{background:#182133;color:#d7e5ff;border-color:#2d3a4f;}
    .danger{background:#ffeded;color:#a72b2b;border:1px solid #ffc7c7;font-weight:800;}
    body.dark .danger{background:#2a1620;color:#ffaaaa;border-color:#5b2a39;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .input{
      width:100%;border:1px solid var(--line);border-radius:14px;padding:14px 15px;outline:none;
      background:var(--panel);color:var(--text);
    }
    .input:focus{border-color:#9ab8ff;box-shadow:0 0 0 4px rgba(47,111,237,.08);}
    .label{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;}
    .gridEditor{
      display:grid;grid-template-columns:64px 1fr;border:1px solid var(--line);border-radius:18px;
      overflow:hidden;min-height:420px;background:var(--panel);align-items:stretch;
    }
    .gutter{
      background:rgba(127,127,127,.07);border-right:1px solid var(--line);padding:14px 10px 14px 0;
      text-align:right;color:#8a93a8;font:600 14px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      white-space:pre;user-select:none;overflow:hidden;align-self:stretch;min-height:420px;
    }
    .textarea{
      width:100%;border:none;outline:none;resize:none;min-height:420px;padding:14px;
      font:600 15px/1.8 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;white-space:pre;overflow:hidden;
      tab-size:2;background:var(--panel);color:var(--text);
    }
    .help,.note{color:var(--muted);font-size:13px;line-height:1.8;}
    .quiz{max-width:860px;margin:20px auto 0;display:grid;gap:14px;}
    .progress{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:13px;font-weight:700;}
    .sectionText{font-size:18px;font-weight:900;line-height:1.35;color:#334155;word-break:break-word;}
    body.dark .sectionText{color:#d7def0;}
    .question{font-size:clamp(22px,4vw,32px);font-weight:900;line-height:1.4;word-break:break-word;}
    .answer{
      width:100%;font-size:18px;padding:16px;border-radius:16px;border:1px solid var(--line);outline:none;
      background:var(--panel);color:var(--text);
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;align-items:center;}
    .submit{background:var(--accent);color:#fff;font-weight:900;padding:14px 20px;border-radius:16px;min-width:116px;}
    .next{background:#1c9c59;color:#fff;font-weight:900;padding:14px 20px;border-radius:16px;min-width:116px;}
    .good{
      border:1px solid rgba(47,111,237,.22);background:#eef4ff;color:var(--accent);padding:14px 16px;
      border-radius:16px;font-weight:900;font-size:18px;
    }
    body.dark .good{border-color:rgba(91,140,255,.35);background:#13264a;color:#9ebdff;}
    .bad{
      border:1px solid rgba(211,60,60,.22);background:#fff3f3;color:var(--bad);padding:14px 16px;
      border-radius:16px;font-weight:900;font-size:18px;
    }
    .explain{
      background:#f8faff;border:1px solid #dbe4fb;padding:14px 16px;border-radius:16px;line-height:1.8;
      word-break:break-word;color:#2b3241;
    }
    body.dark .explain{background:#182133;border-color:#2d3a4f;color:#e7ecf7;}
    .summary{max-width:860px;margin:20px auto 0;display:grid;gap:14px;}
    .score{font-size:28px;font-weight:1000;line-height:1.2;}
    .reviewList{display:grid;gap:10px;}
    .reviewItem{
      border:1px solid var(--line);border-radius:16px;padding:14px 15px;background:var(--panel);display:grid;gap:6px;
    }
    .reviewItem.reviewGood{border-color:rgba(47,111,237,.35);background:rgba(47,111,237,.06);}
    .reviewItem.reviewBad{border-color:rgba(211,60,60,.35);background:rgba(211,60,60,.06);}
    body.dark .reviewItem.reviewGood{border-color:rgba(91,140,255,.40);background:rgba(91,140,255,.10);}
    body.dark .reviewItem.reviewBad{border-color:rgba(255,118,118,.35);background:rgba(255,118,118,.08);}
    .reviewSection{font-size:15px;font-weight:900;color:#334155;line-height:1.4;}
    body.dark .reviewSection{color:#d7def0;}
    .reviewQ{font-weight:900;font-size:16px;word-break:break-word;}
    .reviewA{font-size:14px;color:var(--muted);line-height:1.6;word-break:break-word;}
    .listGrid{display:grid;gap:10px;margin-top:12px;}
    .listItem{
      display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);
      border-radius:16px;background:var(--panel);box-shadow:var(--shadow);padding:14px 15px;
    }
    .listMeta{min-width:0;display:grid;gap:4px;flex:1;}
    .listActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
    .miniAction{padding:10px 12px;font-size:13px;border-radius:12px;white-space:nowrap;}
    .metaLine{font-size:12px;color:var(--muted);line-height:1.6;word-break:break-word;}
    .commentWrap{display:grid;gap:12px;}
    .commentForm{display:grid;gap:10px;}
    .commentHeader{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;}
    .commentToggleRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .commentBadge{
      display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:800;padding:6px 10px;
      border-radius:999px;background:rgba(127,127,127,.08);color:var(--text);
    }
    .commentPrivateNote{font-size:12px;color:var(--muted);}
    .commentMask{font-weight:900;font-size:18px;line-height:1.4;}
    .commentBody{white-space:pre-wrap;line-height:1.8;word-break:break-word;color:var(--text);}
    .scoreToken{color:#14994a;font-weight:900;}
    body.dark .scoreToken{color:#66e08d;}
    .commentItem{
      border:1px solid var(--line);border-radius:16px;padding:14px 15px;background:var(--panel);display:grid;gap:6px;
    }
    .commentOwner{border-color:var(--ownerLine);background:var(--ownerBg);}
    .commentEditor{border-color:var(--editorLine);background:var(--editorBg);}
    .commentViewer{border-color:var(--line);background:var(--panel);}
    .choiceGrid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));}
    .choiceBtn{text-align:center;width:100%;}
    .selected{background:#dfe9ff !important;border-color:#9ab8ff !important;box-shadow:0 0 0 4px rgba(47,111,237,.08);}
    .homeControls{display:grid;gap:10px;}
    .homeTopRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
    .tabSelect{min-width:220px;max-width:100%;height:48px;}
    .searchWrap{display:flex;gap:8px;align-items:center;flex:1;min-width:220px;}
    .searchInput{flex:1;height:48px;}
    .homeSectionTitle{font-size:16px;font-weight:900;margin:0 0 10px;color:var(--text);}
    .dividerLine{text-align:center;color:var(--muted);font-weight:900;margin:10px 0 6px;user-select:none;}
    .publicBadge{
      font-size:12px;font-weight:900;color:var(--accent);border:1px solid rgba(47,111,237,.2);
      background:rgba(47,111,237,.08);padding:4px 8px;border-radius:999px;white-space:nowrap;
    }
    body.dark .publicBadge{color:#a9c0ff;border-color:rgba(91,140,255,.28);background:rgba(91,140,255,.10);}
    .homeMeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

    .editorHost,.commentInputHost{position:relative;}
    .floatSuggest{
      position:absolute;z-index:40;display:flex;gap:8px;flex-wrap:wrap;padding:8px;
      background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
      max-width:min(360px, calc(100% - 16px));
    }

    @media (max-width:640px){
      .page{padding:14px}
      .title{font-size:22px}
      .gridEditor{grid-template-columns:52px 1fr;min-height:380px}
      .question{font-size:22px}
      .answer{font-size:16px}
      .bigBtn{width:100%}
      .actions{justify-content:stretch}
      .actions button{flex:1}
      .topbar{align-items:flex-start}
      .listItem{align-items:flex-start;flex-direction:column}
      .listActions{justify-content:flex-start}
      .tabSelect,.searchInput{min-width:0}
      .homeTopRow{align-items:stretch}
      .searchWrap{min-width:0}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getFirestore, doc, getDoc, getDocs, setDoc, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsiyr6pq0CLo4dT2c7QtoshZBqBKsviwE",
      authDomain: "quiz-f46d6.firebaseapp.com",
      projectId: "quiz-f46d6",
      storageBucket: "quiz-f46d6.firebasestorage.app",
      messagingSenderId: "75573053604",
      appId: "1:75573053604:web:6b20006ca68e685e18fe31",
      measurementId: "G-KQVMD2YYDP"
    };

    const appFirebase = initializeApp(firebaseConfig);
    const db = getFirestore(appFirebase);
    const root = document.getElementById("app");
    if (!root) throw new Error("Missing #app");

    const COLLECTION = "quizzes";
    const OWNER_COOKIE = "qb_owner_token";
    const MY_KEY = "qb_my_quizzes";
    const ACCESS_KEY = "qb_access_quizzes";
    const COMMENT_TOKEN_KEY = "qb_comment_token";
    const COMMENT_NAME_KEY = "qb_comment_name";
    const TAGS = ["random", "choice", "random choice", "number", "open"];

    const state = {
      screen: "loading",
      docId: "",
      doc: null,
      draft: null,
      accessMode: "none",
      showComments: false,
      allDocs: [],
      catalogLoaded: false,
      homeTab: localStorage.getItem("qb_home_tab") || "library",
      homeQueries: { library: "", public: "" },
      homeVisibleCount: { library: 20, public: 12 },
      publicOrder: [],
      commentDraft: { name: "", text: "", isPrivate: false, scoreWanted: false },
      quiz: { phase: "question", order: [], index: 0, typedAnswer: "", lastResult: null, attempts: {}, onlyWrong: false }
    };

    let resultEnterHandler = null;
    let homeObserver = null;
    const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)");

    const uid = () => (crypto && crypto.randomUUID ? crypto.randomUUID().replace(/-/g, "") : Math.random().toString(36).slice(2) + Date.now().toString(36));
    const suffix4 = () => (crypto && crypto.randomUUID ? crypto.randomUUID().replace(/-/g, "").slice(0, 4) : Math.random().toString(16).slice(2, 6).padEnd(4, "0"));
    const slugify = (text) => (text || "quiz").trim().toLowerCase().replace(/\s+/g, "-").replace(/[^\p{L}\p{N}\-]+/gu, "").replace(/\-+/g, "-").replace(/^-+|-+$/g, "") || "quiz";
    const esc = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    const norm = (s) => String(s ?? "").replace(/\u3000/g, " ").trim().replace(/\s+/g, " ").toLowerCase();
    const splitAnswers = (text) => String(text ?? "").split(/[、,]/).map(v => v.trim()).filter(Boolean);
    const splitSearchTerms = (q) => String(q ?? "").trim().split(/[\s\u3000]+/).map(v => v.trim()).filter(Boolean);

    function parseLeadingTags(line) {
      let rest = String(line ?? "").trimStart();
      const tags = [];
      while (rest.startsWith("[")) {
        const end = rest.indexOf("]");
        if (end < 0) break;
        const token = rest.slice(1, end).trim().toLowerCase();
        if (!TAGS.includes(token)) break;
        tags.push(token);
        rest = rest.slice(end + 1).trimStart();
      }
      return { tags, rest };
    }
    function mergeFlags(base, tags) {
      const out = { ...base };
      for (const t of tags) {
        if (t === "random") out.random = true;
        if (t === "choice") out.choice = true;
        if (t === "random choice") { out.choice = true; out.randomChoice = true; }
        if (t === "number") out.number = true;
        if (t === "open") out.open = true;
      }
      return out;
    }
    function pickMode(globalFlags, localTags) {
      const localNumber = localTags.includes("number");
      const localChoice = localTags.includes("choice") || localTags.includes("random choice");
      const localRandomChoice = localTags.includes("random choice");
      if (localNumber) return { mode: "number", randomChoice: false };
      if (localChoice) return { mode: "choice", randomChoice: localRandomChoice || !!globalFlags.randomChoice };
      if (globalFlags.number) return { mode: "number", randomChoice: false };
      if (globalFlags.choice || globalFlags.randomChoice) return { mode: "choice", randomChoice: !!globalFlags.randomChoice };
      return { mode: "text", randomChoice: false };
    }
    function parseQuestionLine(line, globalFlags) {
      const { tags, rest } = parseLeadingTags(line);
      const raw = rest.trim();
      if (!raw) return null;
      const parts = raw.split(/[=＝]/);
      if (parts.length < 2) return null;
      const question = parts[0].trim();
      if (!question) return null;
      const { mode, randomChoice } = pickMode(globalFlags, tags);

      if (mode === "choice") {
        const rawOptions = splitAnswers(parts.slice(1).join("=").trim());
        const options = rawOptions.map(opt => {
          let text = opt.trim(), correct = false;
          if (text.startsWith("!") || text.startsWith("*") || text.startsWith("＊")) { correct = true; text = text.slice(1).trim(); }
          return { text, correct };
        }).filter(o => o.text);
        if (!options.length) return null;
        if (!options.some(o => o.correct)) options[options.length - 1].correct = true;
        return { type: "question", mode: "choice", question, options, randomChoice };
      }

      if (mode === "number") {
        const answerText = parts.slice(1).join("=").trim();
        if (!answerText) return null;
        return { type: "question", mode: "number", question, answers: [answerText] };
      }

      const answers = splitAnswers(parts.slice(1).join("=").trim());
      if (!answers.length) return null;
      return { type: "question", mode: "text", question, answers };
    }
    function parseItems(text) {
      const lines = String(text ?? "").split(/\r?\n/);
      const items = [];
      let globalFlags = { random: false, choice: false, randomChoice: false, number: false, open: false };

      let i = 0;
      while (i < lines.length && !String(lines[i]).trim()) i++;
      while (i < lines.length) {
        const raw = String(lines[i] ?? "");
        const trimmed = raw.trim();
        if (!trimmed) { i++; continue; }
        const { tags, rest } = parseLeadingTags(raw);
        if (tags.length && !rest) { globalFlags = mergeFlags(globalFlags, tags); i++; continue; }
        break;
      }

      let currentSection = "";
      for (; i < lines.length; i++) {
        const line = String(lines[i] ?? "");
        const trimmed = line.trim();
        if (!trimmed) continue;
        const { tags, rest } = parseLeadingTags(line);
        if (tags.length && !rest) { globalFlags = mergeFlags(globalFlags, tags); continue; }
        const parsed = parseQuestionLine(line, globalFlags);
        if (parsed) { items.push({ id: uid(), section: currentSection, ...parsed }); continue; }
        if (!trimmed.startsWith("[")) currentSection = trimmed;
      }
      return { globalFlags, items };
    }
    function itemsToRawText(items, globalFlags = { random:false, choice:false, randomChoice:false, number:false, open:false }) {
      const lines = [], gf = [];
      if (globalFlags.open) gf.push("[open]");
      if (globalFlags.random) gf.push("[random]");
      if (globalFlags.choice && globalFlags.randomChoice) gf.push("[random choice]");
      else if (globalFlags.choice) gf.push("[choice]");
      if (globalFlags.number) gf.push("[number]");
      if (gf.length) lines.push(gf.join(" "));
      let lastSection = null;
      for (const item of items || []) {
        if (item.section && item.section !== lastSection) { lines.push(item.section); lastSection = item.section; }
        let prefix = "";
        if (item.mode === "choice") prefix = item.randomChoice ? "[random choice] " : "[choice] ";
        if (item.mode === "number") prefix = "[number] ";
        if (item.mode === "choice") lines.push(`${prefix}${item.question}=${(item.options || []).map(o => `${o.correct ? "!" : ""}${o.text}`).join(",")}`);
        else lines.push(`${prefix}${item.question}=${(item.answers || []).join(",")}`);
      }
      return lines.join("\n");
    }
    const shuffle = (arr) => { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

    function setCookie(name, value, days = 3650) { document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${days * 24 * 60 * 60}; SameSite=Lax`; }
    function getCookie(name) {
      const parts = document.cookie ? document.cookie.split("; ") : [];
      for (const part of parts) {
        const idx = part.indexOf("=");
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name) return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : "");
      }
      return "";
    }
    function safeLocalGet(key) { try { return localStorage.getItem(key); } catch { return null; } }
    function safeLocalSet(key, value) { try { localStorage.setItem(key, value); } catch {} }

    function loadMyList() { try { const raw = safeLocalGet(MY_KEY); const list = raw ? JSON.parse(raw) : []; return Array.isArray(list) ? list : []; } catch { return []; } }
    function saveMyList(list) { safeLocalSet(MY_KEY, JSON.stringify(list.slice(0, 50))); }
    function loadAccessList() { try { const raw = safeLocalGet(ACCESS_KEY); const list = raw ? JSON.parse(raw) : []; return Array.isArray(list) ? list : []; } catch { return []; } }
    function saveAccessList(list) { safeLocalSet(ACCESS_KEY, JSON.stringify(list.slice(0, 50))); }

    function findAccessRecord(id) { return loadAccessList().find(v => v.id === id) || null; }
    function rememberAccess(id, key, meta = {}) {
      if (!id || !key) return;
      const list = loadAccessList();
      const next = { id, key, title: String(meta.title || ""), subtitle: String(meta.subtitle || ""), createdAt: Number(meta.createdAt || Date.now()), updatedAt: Number(meta.updatedAt || Date.now()) };
      const idx = list.findIndex(v => v.id === id);
      if (idx >= 0) list[idx] = { ...list[idx], ...next }; else list.unshift(next);
      list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      saveAccessList(list);
    }
    function removeAccessRecord(id) { saveAccessList(loadAccessList().filter(v => v.id !== id)); }
    function upsertMyMeta(meta) {
      const list = loadMyList();
      const id = String(meta?.id || "");
      if (!id) return;
      const next = { id, title: String(meta.title || ""), subtitle: String(meta.subtitle || ""), createdAt: Number(meta.createdAt || Date.now()), updatedAt: Number(meta.updatedAt || Date.now()) };
      const idx = list.findIndex(v => v.id === id);
      if (idx >= 0) list[idx] = { ...list[idx], ...next }; else list.unshift(next);
      list.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      saveMyList(list);
    }
    function removeMyMeta(id) { saveMyList(loadMyList().filter(v => v.id !== id)); }

    function normalizeTs(value) {
      if (typeof value === "number") return value;
      if (!value) return null;
      if (typeof value.toDate === "function") { const d = value.toDate(); return d instanceof Date ? d.getTime() : null; }
      if (typeof value.seconds === "number") return value.seconds * 1000 + Math.floor((value.nanoseconds || 0) / 1e6);
      return null;
    }
    function formatMinute(value) {
      const ts = normalizeTs(value);
      if (!ts) return "—";
      const d = new Date(ts), pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;

        const result = scoreDocForQuery(d, q);
        if (!result) continue;
        ranked.push({ doc: d, ...result });
      }
      ranked.sort((a, b) => a.group !== b.group ? a.group - b.group : b.score !== a.score ? b.score - a.score : (normalizeTs(b.doc.updatedAt) || 0) - (normalizeTs(a.doc.updatedAt) || 0));
      return ranked.map(r => r.doc);
    }
    function getSearchResultsForHomeTab() {
      const tab = state.homeTab;
      const query = state.homeQueries[tab] || "";
      if (tab === "library") {
        const { mine, access } = getLibraryDocs();
        const union = [];
        const seen = new Set();
        const add = (docData, source) => { if (seen.has(docData.id)) return; seen.add(docData.id); union.push({ ...docData, source }); };
        searchDocs(mine, query).forEach(d => add(d, "mine"));
        searchDocs(access, query).forEach(d => add(d, "access"));
        return union;
      }
      return searchDocs(getPublicDocs(), query);
    }
    function resetHomePaging(tab) { state.homeVisibleCount[tab] = tab === "public" ? 12 : 20; }
    const getHomeQuery = () => state.homeQueries[state.homeTab] || "";
    function setHomeQuery(query) { state.homeQueries[state.homeTab] = query; resetHomePaging(state.homeTab); render(); }
    function setHomeTab(tab) { state.homeTab = tab; localStorage.setItem("qb_home_tab", tab); resetHomePaging(tab); render(); }

    function attachHomeObserver(tab, hasMore) {
      if (homeObserver) { homeObserver.disconnect(); homeObserver = null; }
      const sentinel = document.getElementById("homeSentinel");
      if (!sentinel || !hasMore || !("IntersectionObserver" in window)) return;
      homeObserver = new IntersectionObserver(entries => {
        if (entries.some(e => e.isIntersecting)) {
          state.homeVisibleCount[tab] += tab === "public" ? 12 : 20;
          render();
        }
      }, { rootMargin: "220px" });
      homeObserver.observe(sentinel);
    }

              ${q.section ? `<div class="sectionText">${esc(q.section)}</div><div style="height:10px"></div>` : ""}
              <div class="label">問題</div>
              <div class="question" style="font-size:22px">${esc(q.question)}</div>
              <div style="height:12px"></div>
              <div class="label">答え</div>
              <div class="explain">${esc(answerText)}</div>
              <div style="height:12px"></div>
              <div class="label">あなたの答え</div>
              <div class="explain">${esc(r.given)}</div>
            </div>

            <div class="actions">
              <button class="next" id="nextBtn" type="button">次へ</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => { location.hash = ""; });
      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open" || state.doc.globalFlags?.open) return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), { title: state.doc.title || "", subtitle: state.doc.subtitle || "", createdAt: normalizeTs(state.doc.createdAt) || Date.now(), updatedAt: normalizeTs(state.doc.updatedAt) || Date.now() });
          state.accessMode = "key";
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });
      document.getElementById("nextBtn").addEventListener("click", nextQuestion);
      enableResultEnterHandler();
    }

    function renderCommentsPanel(comments) {
      const hiddenCount = comments.filter(c => c.isPrivate && !canViewComment(c)).length;
      const visibleComments = comments.filter(c => canViewComment(c));

      const list = visibleComments.length ? visibleComments.map(comment => {
        const role = comment.authorRole || "viewer";
        const roleLabel = commentRoleLabel(role);
        const roleClass = commentRoleClass(role);
        const canManage = canManageComment(comment);
        if (!canViewComment(comment)) {
          return `<div class="commentItem"><div class="commentMask">🫥</div></div>`;
        }
        return `
          <div class="commentItem ${roleClass}">
            <div class="reviewQ">${esc(comment.authorName || "匿名")} <span class="commentBadge">${esc(roleLabel)}</span>${comment.isPrivate ? ` <span class="commentBadge">🫥</span>` : ""}</div>
            <div class="metaLine">${esc(formatMinute(comment.createdAt))}</div>
            <div class="commentBody">${renderCommentBody(comment)}</div>
            <div class="row" style="justify-content:flex-end;">
              ${canManage ? `<button class="ghost miniAction" data-toggle-comment="${esc(comment.id)}" type="button">${comment.isPrivate ? "公開にする" : "非公開にする"}</button>` : ""}
              ${canManage ? `<button class="danger miniAction" data-delete-comment="${esc(comment.id)}" type="button">削除</button>` : ""}
            </div>
          </div>
        `;
      }).join("") : `<div class="note">まだコメントはないよ。</div>`;

      const scoreBox = state.quiz.onlyWrong
        ? `<div class="note">間違えた問題だけのやり直しでは点数は入れられないよ。</div>`
        : `<div id="scoreSuggestBox" class="floatSuggest hide"></div>`;

      return `
        <div class="commentWrap">
          <div class="card commentWrap">
            <div class="commentHeader">
              <div class="label" style="font-size:14px">コメントを書く</div>
              <div class="commentPrivateNote">🫥 は非公開コメント</div>
            </div>

            <div class="commentForm">
              <div>
                <div class="label">名前（任意）</div>
                <input id="commentName" class="input" type="text" placeholder="匿名でもOK" value="${esc(state.commentDraft?.name || getCommentName())}">
              </div>

              ${scoreBox}

              <div class="commentInputHost">
                <div class="label">コメント</div>
                <textarea id="commentText" class="textarea" style="min-height:120px;overflow:hidden;" placeholder="感想やメモを書いてね">${esc(state.commentDraft?.text || "")}</textarea>
              </div>

              <div class="row" style="justify-content:space-between;align-items:center;">
                <label class="row" style="gap:8px;cursor:pointer;">
                  <input id="commentPrivate" type="checkbox" ${state.commentDraft?.isPrivate ? "checked" : ""} />
                  <span>非公開にする</span>
                </label>
                <button class="primary" id="postCommentBtn" type="button">コメントする</button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="commentHeader">
              <div class="label" style="font-size:14px">コメント一覧</div>
              <div class="commentToggleRow">
                <span class="commentBadge">表示 ${visibleComments.length}</span>
                ${hiddenCount > 0 ? `<span class="commentBadge">🫥 ${hiddenCount}</span>` : ""}
              </div>
            </div>
            <div class="reviewList">${list}</div>
          </div>
        </div>
      `;
    }

    function renderDone() {
      clearResultEnterHandler();
      const { correctCount, total } = currentScoreMeta();
      const comments = sortComments(state.doc.comments || []);
      const attempts = state.quiz.attempts || {};
      document.title = state.doc.title ? `${state.doc.title} | 問題作成サイト` : "問題作成サイト";

      root.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div>
              <h1 class="title">${esc(state.doc.title || "問題")}</h1>
              <div class="sub">${esc(state.doc.subtitle || "")}</div>
            </div>
            <div class="row">
              ${topButtonHtml()}
              <button class="ghost" id="editBtn" type="button">${canEdit() ? "編集" : "Keyを入力して編集"}</button>
            </div>
          </div>

          <div class="summary">
            <div class="card">
              <div class="score">${correctCount} / ${total} 問正解</div>
              ${state.quiz.onlyWrong ? `<div class="note" style="margin-top:10px">間違えた問題だけのやり直しだよ。</div>` : `<div class="note" style="margin-top:10px">もう一回やり直せるよ。</div>`}
            </div>

            <div class="actions" style="justify-content:flex-start">
              <button class="primary" id="restartBtn" type="button">もう一度！</button>
              <button class="ghost" id="commentsBtn" type="button">${esc(quizCommentsToggleLabel(comments))}</button>
              ${state.quiz.onlyWrong ? "" : (state.quiz.order.filter(idx => !state.quiz.attempts[idx]?.correct).length > 0 ? `<button class="ghost" id="wrongOnlyBtn" type="button">間違えた問題だけやり直す</button>` : "")}
            </div>

            ${state.showComments ? renderCommentsPanel(comments) : ""}

            <div class="card">
              <div class="label">全問題と答え</div>
              <div class="reviewList">
                ${state.doc.items.map((item, i) => {
                  const idx = state.quiz.order[i];
                  const attempt = attempts[idx] || null;
                  const isGood = !!attempt?.correct;
                  const cls = attempt ? (isGood ? "reviewGood" : "reviewBad") : "";
                  const answerText = item.mode === "choice" ? (item.options || []).filter(o => o.correct).map(o => o.text).join(" / ") : (item.answers || []).join(" / ");
                  const given = attempt?.given ?? "未回答";
                  return `
                    <div class="reviewItem ${cls}">
                      ${item.section ? `<div class="reviewSection">${esc(item.section)}</div>` : ""}
                      <div class="reviewQ">${esc(item.question)}</div>
                      <div class="reviewA">正解: ${esc(answerText)}</div>
                      <div class="reviewA">あなたの答え: ${esc(given)}</div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("topBtn").addEventListener("click", () => { location.hash = ""; });
      document.getElementById("editBtn").addEventListener("click", () => {
        if (canEdit()) return openEditFromDoc();
        const entered = prompt("Key を入力して編集", "");
        if (entered === null) return;
        if (state.doc.keyMode === "open" || state.doc.globalFlags?.open) return openEditFromDoc();
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), { title: state.doc.title || "", subtitle: state.doc.subtitle || "", createdAt: normalizeTs(state.doc.createdAt) || Date.now(), updatedAt: normalizeTs(state.doc.updatedAt) || Date.now() });
          state.accessMode = "key";
          return openEditFromDoc();
        }
        alert("Key が違うよ");
      });

      document.getElementById("restartBtn").addEventListener("click", restartQuiz);
      const commentsBtn = document.getElementById("commentsBtn");
      if (commentsBtn) commentsBtn.addEventListener("click", () => { state.showComments = !state.showComments; render(); });
      const wrongOnlyBtn = document.getElementById("wrongOnlyBtn");
      if (wrongOnlyBtn) wrongOnlyBtn.addEventListener("click", startWrongOnlyQuiz);

      if (state.showComments) {
        const commentName = document.getElementById("commentName");
        const commentText = document.getElementById("commentText");
        const commentPrivate = document.getElementById("commentPrivate");
        const postCommentBtn = document.getElementById("postCommentBtn");
        const scoreSuggestBox = document.getElementById("scoreSuggestBox");
        const commentHost = document.querySelector(".commentInputHost");

        if (commentName) commentName.addEventListener("input", e => { state.commentDraft.name = e.target.value; setCommentName(e.target.value.trim() || "匿名"); });
        if (commentText) {
          commentText.addEventListener("input", e => { state.commentDraft.text = e.target.value; e.target.style.height = "auto"; e.target.style.height = `${Math.max(120, e.target.scrollHeight)}px`; });
          commentText.style.height = "auto";
          commentText.style.height = `${Math.max(120, commentText.scrollHeight)}px`;
        }
        if (commentPrivate) commentPrivate.addEventListener("change", e => { state.commentDraft.isPrivate = !!e.target.checked; });
        if (postCommentBtn) postCommentBtn.addEventListener("click", addComment);
        if (commentText && scoreSuggestBox && commentHost) setupCommentSuggestions(commentHost, commentText, scoreSuggestBox);

        document.querySelectorAll("[data-toggle-comment]").forEach(btn => btn.addEventListener("click", () => toggleCommentVisibility(btn.dataset.toggleComment || "")));
        document.querySelectorAll("[data-delete-comment]").forEach(btn => btn.addEventListener("click", () => deleteComment(btn.dataset.deleteComment || "")));
      }
    }

    function renderLoading() {
      clearResultEnterHandler();
      document.title = "読み込み中 | 問題作成サイト";
      root.innerHTML = `
        <div class="page">
          <div class="hero">
            <div class="card">
              <h1 style="margin:0">読み込み中…</h1>
              <p style="margin:12px 0 0;color:var(--muted)">Firestore からデータを取ってるよ。</p>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      if (state.screen === "loading") return renderLoading();
      if (state.screen === "home") return renderHome();
      if (state.screen === "editor") return renderEditor();
      if (state.screen === "quiz") {
        if (!state.doc || !state.doc.items || !state.doc.items.length) { state.screen = "home"; return render(); }
        if (state.quiz.phase === "question") return renderQuestion();
        if (state.quiz.phase === "result") return renderResult();
        if (state.quiz.phase === "done") return renderDone();
      }
    }

    async function openEditRoute(id) {
      state.screen = "loading"; render();
      try {
        const snap = await getDoc(doc(db, COLLECTION, id));
        if (!snap.exists()) { state.screen = "home"; render(); return; }
        const data = snap.data() || {};
        const parsed = data.rawText ? parseItems(data.rawText) : { globalFlags: data.globalFlags || { random:false, choice:false, randomChoice:false, number:false, open:false }, items: [] };
        const items = Array.isArray(data.items) && data.items.length ? data.items : parsed.items;

        state.docId = id;
        state.doc = {
          title: data.title || "問題",
          subtitle: data.subtitle || "",
          items,
          rawText: data.rawText || "",
          globalFlags: { random: !!(data.globalFlags?.random ?? parsed.globalFlags?.random), choice: !!(data.globalFlags?.choice ?? parsed.globalFlags?.choice), randomChoice: !!(data.globalFlags?.randomChoice ?? parsed.globalFlags?.randomChoice), number: !!(data.globalFlags?.number ?? parsed.globalFlags?.number), open: !!(data.globalFlags?.open ?? parsed.globalFlags?.open) },
          keyMode: data.keyMode || "key",
          key: data.key || "",
          ownerToken: data.ownerToken || "",
          slug: data.slug || id,
          createdAt: data.createdAt || null,
          updatedAt: data.updatedAt || null,
          comments: sortComments(Array.isArray(data.comments) ? data.comments : [])
        };

        setAccessModeForDoc(state.doc, id);
        if (state.accessMode === "key" || state.accessMode === "owner" || state.accessMode === "open") { openEditFromDoc(); return; }

        const entered = prompt("Key を入力して編集", "");
        if (entered === null) { location.hash = `#/${encodeURIComponent(id)}`; return; }
        if ((entered || "").trim() === (state.doc.key || "")) {
          if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
          rememberAccess(state.docId, (state.doc.key || ""), { title: state.doc.title || "", subtitle: state.doc.subtitle || "", createdAt: normalizeTs(state.doc.createdAt) || Date.now(), updatedAt: normalizeTs(state.doc.updatedAt) || Date.now() });
          state.accessMode = "key";
          openEditFromDoc();
        } else {
          alert("Key が違うよ");
          location.hash = `#/${encodeURIComponent(id)}`;
        }
      } catch (err) {
        console.error(err);
        state.screen = "home";
        render();
      }
    }

    async function loadRoute() {
      applySystemTheme();
      const r = route();

      if (r.name === "home") {
        try { await loadCatalog(); } catch (e) { console.error(e); }
        state.screen = "home";
        state.showComments = false;
        render();
        return;
      }

      if (r.name === "create") { openCreate(); return; }
      if (r.name === "edit") { await openEditRoute(r.id); return; }

      if (r.name === "quiz") {
        state.screen = "loading";
        state.showComments = false;
        render();
        try {
          const snap = await getDoc(doc(db, COLLECTION, r.id));
          if (!snap.exists()) { state.screen = "home"; render(); return; }
          const data = snap.data() || {};
          const parsed = data.rawText ? parseItems(data.rawText) : { globalFlags: data.globalFlags || { random:false, choice:false, randomChoice:false, number:false, open:false }, items: [] };
          const items = Array.isArray(data.items) && data.items.length ? data.items : parsed.items;
          startQuiz(normalizeDoc(r.id, { ...data, items, rawText: data.rawText || "", globalFlags: { random: !!(data.globalFlags?.random ?? parsed.globalFlags?.random), choice: !!(data.globalFlags?.choice ?? parsed.globalFlags?.choice), randomChoice: !!(data.globalFlags?.randomChoice ?? parsed.globalFlags?.randomChoice), number: !!(data.globalFlags?.number ?? parsed.globalFlags?.number), open: !!(data.globalFlags?.open ?? parsed.globalFlags?.open) } }), r.id);
        } catch (err) {
          console.error(err);
          state.screen = "home";
          render();
        }
      }
    }

    if (systemDark) {
      const onThemeChange = () => { applySystemTheme(); render(); };
      if (systemDark.addEventListener) systemDark.addEventListener("change", onThemeChange);
      else if (systemDark.addListener) systemDark.addListener(onThemeChange);
    }

    window.addEventListener("hashchange", loadRoute);
    loadRoute();
  </script>
</body>
</html>
