<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>問題作成サイト</title>
  <style>
    :root{
      --bg:#f7f7fb;
      --panel:#ffffff;
      --line:#d8dbe5;
      --text:#1f2430;
      --muted:#6b7280;
      --accent:#2f6fed;
      --accent2:#1f5ad1;
      --good:#138a36;
      --bad:#d33c3c;
      --shadow:0 12px 30px rgba(20,25,40,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:linear-gradient(180deg,#f8faff, #f4f6fb 55%, #eef2f8);
      color:var(--text);
      min-height:100vh;
    }
    button, input, textarea{
      font:inherit;
    }
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      transition:.15s transform, .15s opacity, .15s background;
    }
    button:active{transform:scale(.98)}
    .page{
      max-width:980px;
      margin:0 auto;
      padding:20px;
      padding-top:16px;
      min-height:100vh;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
      position:sticky;
      top:0;
      z-index:10;
      padding:10px 0 12px;
      backdrop-filter: blur(8px);
    }
    .titleWrap{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .siteTitle{
      font-size:28px;
      font-weight:900;
      letter-spacing:.02em;
      line-height:1.1;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .subTop{
      margin-top:4px;
      font-size:13px;
      color:var(--muted);
    }
    .topActions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .ghostBtn{
      background:#eef3ff;
      color:#244a9c;
      border:1px solid #d7e2ff;
      font-weight:700;
    }
    .primaryBtn{
      background:var(--accent);
      color:white;
      font-weight:800;
      box-shadow:0 10px 20px rgba(47,111,237,.18);
    }
    .primaryBtn:hover{background:var(--accent2)}
    .dangerBtn{
      background:#ffecec;
      color:#a22b2b;
      font-weight:800;
      border:1px solid #ffd0d0;
    }
    .card{
      background:var(--panel);
      border:1px solid rgba(15,23,42,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .hero{
      display:grid;
      gap:16px;
      margin-top:36px;
      max-width:860px;
      margin-inline:auto;
    }
    .hero h1{
      margin:0;
      font-size:clamp(34px, 6vw, 54px);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .hero p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.8;
    }
    .bigBtn{
      padding:16px 22px;
      border-radius:18px;
      font-size:18px;
      font-weight:900;
      background:var(--accent);
      color:#fff;
      width:fit-content;
    }
    .formGrid{
      display:grid;
      gap:14px;
    }
    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .input{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:14px 15px;
      outline:none;
      color:var(--text);
    }
    .input:focus{
      border-color:#9ab8ff;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }
    .titleInput{
      font-size:20px;
      font-weight:900;
      flex:1;
      min-width:220px;
    }
    .subtitleInput{
      font-size:15px;
      font-weight:650;
    }
    .miniLabel{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
      letter-spacing:.02em;
    }
    .lineEditorWrap{
      display:grid;
      grid-template-columns:64px 1fr;
      gap:0;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
      min-height:420px;
    }
    .gutter{
      background:#f5f7fb;
      border-right:1px solid var(--line);
      color:#8a93a8;
      padding:14px 10px 14px 0;
      text-align:right;
      font: 600 14px/1.8 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      overflow:hidden;
      white-space:pre;
      user-select:none;
    }
    .textarea{
      width:100%;
      border:none;
      outline:none;
      resize:none;
      padding:14px 14px 34px 14px;
      font: 600 15px/1.8 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      color:#141824;
      white-space:pre;
      overflow:auto;
      tab-size:2;
    }
    .help{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      margin-top:4px;
    }
    .statusLine{
      font-size:13px;
      color:var(--muted);
    }
    .quizPanel{
      max-width:860px;
      margin:20px auto 0;
      display:grid;
      gap:14px;
    }
    .progress{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }
    .questionBox{
      font-size:clamp(22px, 4vw, 32px);
      font-weight:900;
      line-height:1.4;
      word-break:break-word;
    }
    .answerRow{
      display:grid;
      gap:10px;
    }
    .answerInput{
      width:100%;
      font-size:18px;
      padding:16px 16px;
      border-radius:16px;
      border:1px solid var(--line);
      outline:none;
      background:#fff;
    }
    .answerInput:focus{
      border-color:#9ab8ff;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }
    .choiceGrid{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    }
    .choiceBtn{
      background:#f4f7ff;
      border:1px solid #d6e1ff;
      color:#173a88;
      font-weight:800;
      padding:14px 12px;
      border-radius:16px;
      text-align:center;
    }
    .choiceBtn.selected{
      background:#dfe9ff;
      border-color:#9ab8ff;
      box-shadow:0 0 0 4px rgba(47,111,237,.08);
    }
    .quizActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
      margin-top:2px;
    }
    .submitBtn{
      background:var(--accent);
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }
    .nextBtn{
      background:#1c9c59;
      color:#fff;
      font-weight:900;
      padding:14px 20px;
      border-radius:16px;
      min-width:116px;
    }
    .resultGood{
      border:1px solid rgba(19,138,54,.22);
      background:#effaf3;
      color:var(--good);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }
    .resultBad{
      border:1px solid rgba(211,60,60,.22);
      background:#fff3f3;
      color:var(--bad);
      padding:14px 16px;
      border-radius:16px;
      font-weight:900;
      font-size:18px;
    }
    .explain{
      background:#f8faff;
      border:1px solid #dbe4fb;
      padding:14px 16px;
      border-radius:16px;
      line-height:1.8;
      color:#2b3241;
      word-break:break-word;
    }
    .summaryGrid{
      display:grid;
      gap:14px;
      max-width:860px;
      margin:20px auto 0;
    }
    .summaryScore{
      font-size:28px;
      font-weight:1000;
      line-height:1.2;
    }
    .reviewList{
      display:grid;
      gap:10px;
    }
    .reviewItem{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 15px;
      background:#fff;
      display:grid;
      gap:6px;
    }
    .reviewQ{
      font-weight:900;
      font-size:16px;
      word-break:break-word;
    }
    .reviewA, .reviewU{
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }
    .reviewMark.good{color:var(--good); font-weight:900;}
    .reviewMark.bad{color:var(--bad); font-weight:900;}
    .smallNote{
      color:var(--muted);
      font-size:12px;
      line-height:1.7;
    }
    .hide{display:none !important;}
    @media (max-width: 640px){
      .page{padding:14px}
      .siteTitle{font-size:22px}
      .lineEditorWrap{grid-template-columns:52px 1fr; min-height:380px}
      .gutter{font-size:13px}
      .questionBox{font-size:22px}
      .answerInput{font-size:16px}
      .bigBtn{width:100%; justify-content:center; text-align:center}
      .quizActions{justify-content:stretch}
      .quizActions button{flex:1}
      .topbar{align-items:flex-start}
      .topActions{width:100%}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getFirestore(firebaseApp);
    const app = document.getElementById("app");

    const COLLECTION = "quizzes";
    const OWNER_COOKIE = "qb_owner_token";

    const state = {
      screen: "home", // home | editor | quiz
      loading: false,
      message: "",
      docId: null,
      doc: null,
      canEditByOwner: false,
      unlockedByKey: false,
      draft: null,
      quiz: {
        phase: "question", // question | result | done
        order: [],
        index: 0,
        selectedChoice: "",
        typedAnswer: "",
        lastResult: null,
      }
    };

    function uid(){
      if (crypto && crypto.randomUUID) return crypto.randomUUID().replace(/-/g, "");
      return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function slugify(text){
      return (text || "quiz")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^\p{L}\p{N}\-]+/gu, "")
        .replace(/\-+/g, "-")
        .replace(/^-+|-+$/g, "") || "quiz";
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeAnswer(str){
      return String(str ?? "")
        .replace(/\u3000/g, " ")
        .trim()
        .replace(/\s+/g, " ")
        .toLowerCase();
    }

    function splitAnswers(text){
      return String(text ?? "")
        .split(/[、,]/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function parseProblemLine(line){
      const raw = String(line ?? "").trim();
      if (!raw) return null;
      const parts = raw.split(/[=＝]/).map(v => v.trim());
      if (parts.length < 2) return null;

      const question = parts[0];
      if (!question) return null;

      let choice = false;
      let answerText = "";
      if (parts[1] && parts[1].toLowerCase() === "choice") {
        choice = true;
        answerText = parts.slice(2).join("=");
      } else {
        answerText = parts.slice(1).join("=");
      }
      const answers = splitAnswers(answerText);
      if (!answers.length) return null;

      return {
        question,
        answers,
        choice
      };
    }

    function parseProblemsFromText(text){
      const lines = String(text ?? "").split(/\r?\n/);
      return lines
        .map(parseProblemLine)
        .filter(Boolean);
    }

    function shuffle(array){
      const a = array.slice();
      for (let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function setCookie(name, value, days = 3650){
      const maxAge = days * 24 * 60 * 60;
      document.cookie = `${name}=${encodeURIComponent(value)}; Path=/; Max-Age=${maxAge}; SameSite=Lax`;
    }

    function getCookie(name){
      const parts = document.cookie ? document.cookie.split("; ") : [];
      for (const part of parts){
        const idx = part.indexOf("=");
        const key = idx >= 0 ? part.slice(0, idx) : part;
        if (key === name){
          return decodeURIComponent(idx >= 0 ? part.slice(idx + 1) : "");
        }
      }
      return "";
    }

    function getPathDocId(){
      const parts = location.pathname.split("/").filter(Boolean);
      if (!parts.length) return "";
      const last = parts[parts.length - 1];
      if (last === "index.html") return "";
      if (parts[0] !== "q" && parts.length === 1) {
        return "";
      }
      const maybe = parts[0] === "q" ? parts[1] : last;
      if (!maybe) return "";
      return decodeURIComponent(maybe).split("-").pop();
    }

    function getPrettyLink(docId, slug){
      const host = location.origin;
      return `${host}/q/${encodeURIComponent(slug)}-${encodeURIComponent(docId)}`;
    }

    function currentQuestion(){
      if (!state.doc || !state.doc.problems?.length) return null;
      const idx = state.quiz.order[state.quiz.index];
      if (idx === undefined) return null;
      return { idx, problem: state.doc.problems[idx] };
    }

    function canEditNow(){
      if (!state.doc) return false;
      if (state.doc.keyMode === "open") return true;
      if (state.doc.ownerToken && getCookie(OWNER_COOKIE) && getCookie(OWNER_COOKIE) === state.doc.ownerToken) return true;
      if (state.docId && getCookie(`qb_key_${state.docId}`) === "1") return true;
      return false;
    }

    function startQuiz(docData){
      state.doc = docData;
      state.canEditByOwner = !!(docData.ownerToken && getCookie(OWNER_COOKIE) === docData.ownerToken);
      state.unlockedByKey = !!(state.docId && getCookie(`qb_key_${state.docId}`) === "1");
      state.quiz = {
        phase: "question",
        order: shuffle((docData.problems || []).map((_, i) => i)),
        index: 0,
        selectedChoice: "",
        typedAnswer: "",
        lastResult: null,
      };
      state.screen = "quiz";
      document.title = docData.title ? `${docData.title} | 問題作成サイト` : "問題作成サイト";
      render();
    }

    function blankDraft(){
      return {
        title: "",
        subtitle: "",
        rawText: "",
        keyMode: "key", // key | open
        key: "",
        slug: "quiz"
      };
    }

    function openEditor(){
      state.draft = state.doc
        ? {
            title: state.doc.title || "",
            subtitle: state.doc.subtitle || "",
            rawText: (state.doc.problems || [])
              .map(p => `${p.question}=${p.choice ? "choice=" : ""}${p.answers.join(",")}`)
              .join("\n"),
            keyMode: state.doc.keyMode || "key",
            key: state.doc.key || "",
            slug: state.doc.slug || slugify(state.doc.title || "quiz")
          }
        : blankDraft();

      state.screen = "editor";
      render();
    }

    function openCreate(){
      state.doc = null;
      state.docId = null;
      state.canEditByOwner = false;
      state.unlockedByKey = false;
      state.draft = blankDraft();
      state.screen = "editor";
      render();
    }

    function restartQuiz(){
      if (!state.doc) return;
      state.quiz = {
        phase: "question",
        order: shuffle((state.doc.problems || []).map((_, i) => i)),
        index: 0,
        selectedChoice: "",
        typedAnswer: "",
        lastResult: null,
      };
      render();
    }

    function submitAnswer(){
      const q = currentQuestion();
      if (!q) return;

      const given = q.problem.choice
        ? state.quiz.selectedChoice
        : state.quiz.typedAnswer;

      if (!String(given || "").trim()){
        alert("答えを入れてね");
        return;
      }

      const normalizedGiven = normalizeAnswer(given);
      const normalizedAnswers = q.problem.answers.map(normalizeAnswer);
      const correct = normalizedAnswers.includes(normalizedGiven);

      state.quiz.lastResult = {
        idx: q.idx,
        given,
        correct,
        question: q.problem.question,
        answers: q.problem.answers.slice(),
        choice: q.problem.choice
      };
      state.quiz.phase = "result";
      render();
    }

    function goNext(){
      state.quiz.index += 1;
      state.quiz.selectedChoice = "";
      state.quiz.typedAnswer = "";
      state.quiz.lastResult = null;

      if (state.quiz.index >= state.quiz.order.length){
        state.quiz.phase = "done";
      } else {
        state.quiz.phase = "question";
      }
      render();
    }

    function updateLineNumbers(textarea, gutter){
      const lines = Math.max(1, String(textarea.value || "").split(/\r?\n/).length + 1);
      gutter.textContent = Array.from({length: lines}, (_, i) => i + 1).join("\n");
      gutter.scrollTop = textarea.scrollTop;
    }

    function renderHome(){
      app.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div class="titleWrap">
              <div>
                <h2 class="siteTitle">問題作成サイト</h2>
                <div class="subTop">タイトル・サブタイトル・問題をまとめて作って、そのまま遊べるやつ</div>
              </div>
            </div>
          </div>

          <div class="hero">
            <div class="card">
              <h1>作成して、公開して、答える。</h1>
              <p>
                まずは「作成」を押すだけ。<br>
                1行ごとに <b>問題=答え</b> を入れて保存すると、リンクができるよ。<br>
                <b>問題=choice=答え1,答え2,答え3</b> で選択式にもできる。
              </p>
              <div style="height:14px"></div>
              <button class="bigBtn" id="createBtn">作成</button>
              <div style="height:10px"></div>
              <div class="smallNote">
                ※ この版は cookie で本人判定するので、作ったブラウザでは編集しやすい形。Key を使うと別端末でも編集できる。
              </div>
            </div>
          </div>
        </div>
      `;
      document.getElementById("createBtn").addEventListener("click", openCreate);
    }

    function renderEditor(){
      const title = state.draft?.title || "";
      const subtitle = state.draft?.subtitle || "";
      const rawText = state.draft?.rawText || "";
      const keyMode = state.draft?.keyMode || "key";
      const key = state.draft?.key || "";

      app.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div class="titleWrap">
              <div>
                <h2 class="siteTitle">作成 / 編集</h2>
                <div class="subTop">タイトルの右に Key ボタン。ここで公開編集か、Key あり編集かを決める。</div>
              </div>
            </div>
            <div class="topActions">
              <button class="ghostBtn" id="backHomeBtn">戻る</button>
            </div>
          </div>

          <div class="card formGrid">
            <div class="row">
              <div style="flex:1; min-width:220px;">
                <div class="miniLabel">タイトル</div>
                <input id="titleInput" class="input titleInput" type="text" placeholder="タイトル" value="${escapeHtml(title)}" />
              </div>
              <button class="ghostBtn" id="keyBtn" style="height:48px; align-self:end;">Key</button>
            </div>

            <div class="row">
              <div style="flex:1; min-width:220px;">
                <div class="miniLabel">サブタイトル</div>
                <input id="subtitleInput" class="input subtitleInput" type="text" placeholder="サブタイトル" value="${escapeHtml(subtitle)}" />
              </div>
            </div>

            <div>
              <div class="miniLabel">問題欄</div>
              <div class="lineEditorWrap">
                <div id="gutter" class="gutter"></div>
                <textarea id="problemText" class="textarea" wrap="off" spellcheck="false" placeholder="例:
リンゴ=りんご
2+2=4,四
日本の首都=choice=東京,大阪,名古屋
">${escapeHtml(rawText)}</textarea>
              </div>
              <div class="help">
                1行に1問。<br>
                <b>問題=答え</b> で普通の問題。<br>
                <b>問題=答え1,答え2</b> で複数正解。<br>
                <b>問題=choice=答え1,答え2,答え3</b> で選択式。<br>
                ＝ や 、 でも大丈夫。
              </div>
            </div>

            <div class="row" style="justify-content:space-between;">
              <div id="keyStatus" class="statusLine"></div>
              <button class="primaryBtn" id="saveBtn">保存</button>
            </div>
          </div>
        </div>
      `;

      const backHomeBtn = document.getElementById("backHomeBtn");
      const titleInput = document.getElementById("titleInput");
      const subtitleInput = document.getElementById("subtitleInput");
      const problemText = document.getElementById("problemText");
      const gutter = document.getElementById("gutter");
      const keyBtn = document.getElementById("keyBtn");
      const keyStatus = document.getElementById("keyStatus");
      const saveBtn = document.getElementById("saveBtn");

      function refreshKeyStatus(){
        if (state.draft.keyMode === "open"){
          keyStatus.textContent = "Key: open（誰でも編集できる）";
          keyBtn.textContent = "Key";
        } else {
          keyStatus.textContent = state.draft.key ? "Key: 設定済み" : "Key: 未設定";
          keyBtn.textContent = "Key";
        }
      }

      titleInput.addEventListener("input", e => {
        state.draft.title = e.target.value;
      });

      subtitleInput.addEventListener("input", e => {
        state.draft.subtitle = e.target.value;
      });

      problemText.addEventListener("input", e => {
        state.draft.rawText = e.target.value;
        updateLineNumbers(problemText, gutter);
      });

      problemText.addEventListener("scroll", () => {
        gutter.scrollTop = problemText.scrollTop;
      });

      keyBtn.addEventListener("click", () => {
        const current = state.draft.keyMode === "open"
          ? "open"
          : (state.draft.key || "");

        const next = prompt("Key を入力。open にすると誰でも編集できます。", current);
        if (next === null) return;

        const v = next.trim();
        if (!v){
          state.draft.keyMode = "key";
          state.draft.key = "";
        } else if (v.toLowerCase() === "open"){
          state.draft.keyMode = "open";
          state.draft.key = "";
        } else {
          state.draft.keyMode = "key";
          state.draft.key = v;
        }
        refreshKeyStatus();
      });

      backHomeBtn.addEventListener("click", () => {
        if (confirm("今の編集は消えるけど、戻る？")){
          state.screen = "home";
          state.draft = null;
          render();
        }
      });

      saveBtn.addEventListener("click", async () => {
        const title = state.draft.title.trim();
        const subtitle = state.draft.subtitle.trim();
        const problems = parseProblemsFromText(state.draft.rawText);

        if (!title){
          alert("タイトルを入れてね");
          return;
        }
        if (!problems.length){
          alert("問題が1つも読めなかったよ。1行ずつ「問題=答え」の形で書いてね。");
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = "保存中...";

        try{
          const existingId = state.docId || uid();
          const slug = slugify(title);
          const ownerToken = getCookie(OWNER_COOKIE) || uid();
          setCookie(OWNER_COOKIE, ownerToken);

          const payload = {
            title,
            subtitle,
            problems,
            rawText: state.draft.rawText,
            keyMode: state.draft.keyMode,
            key: state.draft.keyMode === "open" ? "" : (state.draft.key || ""),
            ownerToken,
            slug,
            updatedAt: serverTimestamp(),
            createdAt: state.doc?.createdAt || serverTimestamp()
          };

          await setDoc(doc(db, COLLECTION, existingId), payload, { merge: true });

          state.docId = existingId;
          state.doc = {
            ...payload,
            ownerToken,
            problems
          };

          const link = getPrettyLink(existingId, slug);
          history.replaceState({}, "", `/q/${encodeURIComponent(slug)}-${encodeURIComponent(existingId)}`);

          state.canEditByOwner = true;
          state.unlockedByKey = false;
          startQuiz(state.doc);

          setTimeout(() => {
            navigator.clipboard?.writeText(link).catch(() => {});
            alert("保存したよ。リンクをコピーしやすいようにしてあるけど、必要なら手動でもOK。");
          }, 50);
        } catch (err){
          console.error(err);
          alert("保存で失敗したよ。Firebase 設定か通信を見てみて。");
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = "保存";
        }
      });

      updateLineNumbers(problemText, gutter);
      refreshKeyStatus();
      titleInput.focus();
    }

    function renderQuestion(){
      const q = currentQuestion();
      if (!q){
        state.quiz.phase = "done";
        render();
        return;
      }

      const progressText = `${state.quiz.index + 1} / ${state.quiz.order.length}`;
      const canEdit = canEditNow();
      const topEditLabel = state.doc?.keyMode === "open" || canEdit
        ? "編集"
        : "Keyを入力して編集";

      app.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div class="titleWrap">
              <div>
                <h2 class="siteTitle">${escapeHtml(state.doc.title || "問題")}</h2>
                <div class="subTop">${escapeHtml(state.doc.subtitle || "")}</div>
              </div>
            </div>
            <div class="topActions">
              ${canEdit || state.doc.keyMode === "open" ? `<button class="ghostBtn" id="editBtn">${topEditLabel}</button>` : `<button class="ghostBtn" id="keyEditBtn">${topEditLabel}</button>`}
            </div>
          </div>

          <div class="quizPanel">
            <div class="card">
              <div class="progress">
                <div>問題 ${progressText}</div>
                <div>${state.doc.problems.length}問中</div>
              </div>
              <div style="height:12px"></div>
              <div class="questionBox">${escapeHtml(q.problem.question)}</div>
            </div>

            <div class="card answerRow">
              ${q.problem.choice ? `
                <div class="miniLabel">選択してね</div>
                <div id="choiceGrid" class="choiceGrid">
                  ${q.problem.answers.map(ans => `<button type="button" class="choiceBtn" data-choice="${escapeHtml(ans)}">${escapeHtml(ans)}</button>`).join("")}
                </div>
              ` : `
                <div class="miniLabel">答え</div>
                <input id="answerInput" class="answerInput" type="text" placeholder="ここに入力" autocomplete="off" autocapitalize="off" spellcheck="false" />
              `}
              <div class="quizActions">
                <button class="submitBtn" id="submitBtn">✅</button>
              </div>
            </div>
          </div>
        </div>
      `;

      const editBtn = document.getElementById("editBtn");
      const keyEditBtn = document.getElementById("keyEditBtn");
      const submitBtn = document.getElementById("submitBtn");

      if (editBtn){
        editBtn.addEventListener("click", openEditor);
      }
      if (keyEditBtn){
        keyEditBtn.addEventListener("click", () => {
          const entered = prompt("Key を入力して編集", "");
          if (entered === null) return;
          const value = String(entered).trim();

          if (state.doc.keyMode === "open"){
            openEditor();
            return;
          }

          if (state.doc.key && value === state.doc.key){
            if (state.docId){
              setCookie(`qb_key_${state.docId}`, "1");
            }
            state.unlockedByKey = true;
            openEditor();
          } else {
            alert("Key が違うよ");
          }
        });
      }

      if (q.problem.choice){
        const buttons = [...document.querySelectorAll(".choiceBtn")];
        buttons.forEach(btn => {
          btn.addEventListener("click", () => {
            state.quiz.selectedChoice = btn.dataset.choice || "";
            buttons.forEach(b => b.classList.toggle("selected", b === btn));
          });
        });
      } else {
        const input = document.getElementById("answerInput");
        input.focus();
        input.addEventListener("input", e => {
          state.quiz.typedAnswer = e.target.value;
        });
        input.addEventListener("keydown", e => {
          if (e.key === "Enter"){
            e.preventDefault();
            submitAnswer();
          }
        });
      }

      submitBtn.addEventListener("click", submitAnswer);
    }

    function renderResult(){
      const r = state.quiz.lastResult;
      if (!r){
        state.quiz.phase = "question";
        render();
        return;
      }

      const q = state.doc.problems[r.idx];
      const answerText = q.answers.join(" / ");
      const canEdit = canEditNow();
      const topEditLabel = state.doc?.keyMode === "open" || canEdit
        ? "編集"
        : "Keyを入力して編集";

      app.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div class="titleWrap">
              <div>
                <h2 class="siteTitle">${escapeHtml(state.doc.title || "問題")}</h2>
                <div class="subTop">${escapeHtml(state.doc.subtitle || "")}</div>
              </div>
            </div>
            <div class="topActions">
              ${canEdit || state.doc.keyMode === "open" ? `<button class="ghostBtn" id="editBtn">${topEditLabel}</button>` : `<button class="ghostBtn" id="keyEditBtn">${topEditLabel}</button>`}
            </div>
          </div>

          <div class="quizPanel">
            <div class="${r.correct ? "resultGood" : "resultBad"}">
              ${r.correct ? "正解！" : "ちがう！"}
            </div>

            <div class="card">
              <div class="miniLabel">問題</div>
              <div class="questionBox" style="font-size:22px;">${escapeHtml(q.question)}</div>
              <div style="height:12px"></div>
              <div class="miniLabel">答え</div>
              <div class="explain">${escapeHtml(answerText)}</div>
              <div style="height:12px"></div>
              <div class="miniLabel">あなたの答え</div>
              <div class="explain">${escapeHtml(r.given)}</div>
            </div>

            <div class="quizActions">
              <button class="nextBtn" id="nextBtn">次へ</button>
            </div>
          </div>
        </div>
      `;

      const editBtn = document.getElementById("editBtn");
      const keyEditBtn = document.getElementById("keyEditBtn");
      const nextBtn = document.getElementById("nextBtn");

      if (editBtn) editBtn.addEventListener("click", openEditor);
      if (keyEditBtn) {
        keyEditBtn.addEventListener("click", () => {
          const entered = prompt("Key を入力して編集", "");
          if (entered === null) return;
          const value = String(entered).trim();

          if (state.doc.keyMode === "open"){
            openEditor();
            return;
          }

          if (state.doc.key && value === state.doc.key){
            if (state.docId){
              setCookie(`qb_key_${state.docId}`, "1");
            }
            state.unlockedByKey = true;
            openEditor();
          } else {
            alert("Key が違うよ");
          }
        });
      }

      nextBtn.addEventListener("click", goNext);
    }

    function renderDone(){
      const total = state.doc.problems.length;
      const correctCount = state.quiz.order.reduce((acc, idx) => {
        const q = state.doc.problems[idx];
        const given = state.quiz.typedAnswer; // not used
        const result = state.quiz.orderMap?.[idx];
        return acc;
      }, 0);

      const answers = state.doc.problems.map(p => p.answers.join(" / "));
      let score = 0;
      const reviewItems = state.doc.problems.map((p, i) => {
        const idx = state.quiz.order[i];
        return "";
      });

      // ここは終了時の正答数を計算
      const doneMap = state.quiz.doneMap || {};
      const doneCount = state.quiz.correctCount || 0;

      const listHtml = state.doc.problems.map((p, i) => {
        const attempted = state.quiz.attempts?.[i];
        const isGood = attempted?.correct;
        return `
          <div class="reviewItem">
            <div class="reviewQ">${escapeHtml(p.question)}</div>
            <div class="reviewA">答え: ${escapeHtml(p.answers.join(" / "))}</div>
            <div class="reviewU">あなた: ${escapeHtml(attempted?.given ?? "")} ${
              attempted ? `<span class="reviewMark ${isGood ? "good" : "bad"}">${isGood ? "○" : "×"}</span>` : ""
            }</div>
          </div>
        `;
      }).join("");

      app.innerHTML = `
        <div class="page">
          <div class="topbar">
            <div class="titleWrap">
              <div>
                <h2 class="siteTitle">${escapeHtml(state.doc.title || "問題")}</h2>
                <div class="subTop">${escapeHtml(state.doc.subtitle || "")}</div>
              </div>
            </div>
            <div class="topActions">
              ${canEditNow() || state.doc.keyMode === "open" ? `<button class="ghostBtn" id="editBtn">編集</button>` : `<button class="ghostBtn" id="keyEditBtn">Keyを入力して編集</button>`}
            </div>
          </div>

          <div class="summaryGrid">
            <div class="card">
              <div class="summaryScore">${escapeHtml(String(state.quiz.correctCount ?? 0))} / ${escapeHtml(String(total))} 問正解</div>
              <div style="height:10px"></div>
              <div class="smallNote">おつかれさま。もう一回やり直せるよ。</div>
            </div>

            <div class="quizActions" style="justify-content:flex-start;">
              <button class="primaryBtn" id="restartBtn">もう一度！</button>
            </div>

            <div class="card">
              <div class="miniLabel">全問題と答え</div>
              <div class="reviewList">
                ${state.doc.problems.map((p, i) => `
                  <div class="reviewItem">
                    <div class="reviewQ">${escapeHtml(p.question)}</div>
                    <div class="reviewA">答え: ${escapeHtml(p.answers.join(" / "))}</div>
                  </div>
                `).join("")}
              </div>
            </div>
          </div>
        </div>
      `;

      const editBtn = document.getElementById("editBtn");
      const keyEditBtn = document.getElementById("keyEditBtn");
      const restartBtn = document.getElementById("restartBtn");

      if (editBtn) editBtn.addEventListener("click", openEditor);
      if (keyEditBtn) {
        keyEditBtn.addEventListener("click", () => {
          const entered = prompt("Key を入力して編集", "");
          if (entered === null) return;
          const value = String(entered).trim();

          if (state.doc.keyMode === "open"){
            openEditor();
            return;
          }

          if (state.doc.key && value === state.doc.key){
            if (state.docId){
              setCookie(`qb_key_${state.docId}`, "1");
            }
            state.unlockedByKey = true;
            openEditor();
          } else {
            alert("Key が違うよ");
          }
        });
      }
      if (restartBtn) restartBtn.addEventListener("click", restartQuiz);
    }

    async function loadFromRoute(){
      const id = getPathDocId();
      state.docId = id || null;

      if (!id){
        state.screen = "home";
        render();
        return;
      }

      state.screen = "loading";
      app.innerHTML = `
        <div class="page">
          <div class="hero">
            <div class="card">
              <h1>読み込み中…</h1>
              <p>Firestore からデータを取りにいってるよ。</p>
            </div>
          </div>
        </div>
      `;

      try{
        const snap = await getDoc(doc(db, COLLECTION, id));
        if (!snap.exists()){
          state.message = "その問題は見つからなかったよ";
          state.screen = "home";
          render();
          return;
        }

        const data = snap.data() || {};
        const problems = Array.isArray(data.problems) ? data.problems : parseProblemsFromText(data.rawText || "");
        const docData = {
          title: data.title || "問題",
          subtitle: data.subtitle || "",
          problems,
          rawText: data.rawText || "",
          keyMode: data.keyMode || "key",
          key: data.key || "",
          ownerToken: data.ownerToken || "",
          slug: data.slug || slugify(data.title || "quiz"),
          createdAt: data.createdAt || null,
          updatedAt: data.updatedAt || null
        };

        state.doc = docData;
        state.canEditByOwner = !!(docData.ownerToken && getCookie(OWNER_COOKIE) === docData.ownerToken);
        state.unlockedByKey = !!(state.docId && getCookie(`qb_key_${state.docId}`) === "1");
        state.quiz = {
          phase: "question",
          order: shuffle((docData.problems || []).map((_, i) => i)),
          index: 0,
          selectedChoice: "",
          typedAnswer: "",
          lastResult: null,
          attempts: {},
          correctCount: 0,
        };

        state.screen = "quiz";
        document.title = docData.title ? `${docData.title} | 問題作成サイト` : "問題作成サイト";
        render();
      } catch (err){
        console.error(err);
        state.message = "読み込みで失敗したよ";
        state.screen = "home";
        render();
      }
    }

    function submitAnswerWrapped(){
      const q = currentQuestion();
      if (!q) return;

      const given = q.problem.choice
        ? state.quiz.selectedChoice
        : state.quiz.typedAnswer;

      if (!String(given || "").trim()){
        alert("答えを入れてね");
        return;
      }

      const normalizedGiven = normalizeAnswer(given);
      const normalizedAnswers = q.problem.answers.map(normalizeAnswer);
      const correct = normalizedAnswers.includes(normalizedGiven);

      if (!state.quiz.attempts) state.quiz.attempts = {};
      state.quiz.attempts[q.idx] = {
        given,
        correct
      };
      state.quiz.correctCount = Object.values(state.quiz.attempts).filter(v => v.correct).length;

      state.quiz.lastResult = {
        idx: q.idx,
        given,
        correct,
        question: q.problem.question,
        answers: q.problem.answers.slice(),
        choice: q.problem.choice
      };
      state.quiz.phase = "result";
      render();
    }

    function goNextWrapped(){
      state.quiz.index += 1;
      state.quiz.selectedChoice = "";
      state.quiz.typedAnswer = "";

      if (state.quiz.index >= state.quiz.order.length){
        state.quiz.phase = "done";
      } else {
        state.quiz.phase = "question";
      }
      render();
    }

    // 上の renderQuestion / renderResult / renderDone で使う関数を差し替え
    const submitAnswer = submitAnswerWrapped;
    const goNext = goNextWrapped;

    function render(){
      if (state.screen === "home") return renderHome();
      if (state.screen === "editor") return renderEditor();

      if (state.screen === "quiz"){
        if (!state.doc || !state.doc.problems || !state.doc.problems.length){
          app.innerHTML = `
            <div class="page">
              <div class="hero">
                <div class="card">
                  <h1>問題がないよ</h1>
                  <p>編集画面から 1 行ずつ「問題=答え」を入れて保存してね。</p>
                  <div style="height:10px"></div>
                  <button class="bigBtn" id="backHome2">作成に戻る</button>
                </div>
              </div>
            </div>
          `;
          document.getElementById("backHome2").addEventListener("click", openCreate);
          return;
        }

        if (state.quiz.phase === "result") return renderResult();
        if (state.quiz.phase === "done"){
          const total = state.doc.problems.length;
          app.innerHTML = `
            <div class="page">
              <div class="topbar">
                <div class="titleWrap">
                  <div>
                    <h2 class="siteTitle">${escapeHtml(state.doc.title || "問題")}</h2>
                    <div class="subTop">${escapeHtml(state.doc.subtitle || "")}</div>
                  </div>
                </div>
                <div class="topActions">
                  ${canEditNow() || state.doc.keyMode === "open" ? `<button class="ghostBtn" id="editBtn">編集</button>` : `<button class="ghostBtn" id="keyEditBtn">Keyを入力して編集</button>`}
                </div>
              </div>

              <div class="summaryGrid">
                <div class="card">
                  <div class="summaryScore">${escapeHtml(String(state.quiz.correctCount ?? 0))} / ${escapeHtml(String(total))} 問正解</div>
                  <div style="height:10px"></div>
                  <div class="smallNote">全問終わったよ。もう一回できる。</div>
                </div>

                <div class="quizActions" style="justify-content:flex-start;">
                  <button class="primaryBtn" id="restartBtn">もう一度！</button>
                </div>

                <div class="card">
                  <div class="miniLabel">全問題と答え</div>
                  <div class="reviewList">
                    ${state.doc.problems.map((p) => `
                      <div class="reviewItem">
                        <div class="reviewQ">${escapeHtml(p.question)}</div>
                        <div class="reviewA">答え: ${escapeHtml(p.answers.join(" / "))}</div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              </div>
            </div>
          `;
          const editBtn = document.getElementById("editBtn");
          const keyEditBtn = document.getElementById("keyEditBtn");
          const restartBtn = document.getElementById("restartBtn");
          if (editBtn) editBtn.addEventListener("click", openEditor);
          if (keyEditBtn) {
            keyEditBtn.addEventListener("click", () => {
              const entered = prompt("Key を入力して編集", "");
              if (entered === null) return;
              const value = String(entered).trim();
              if (state.doc.keyMode === "open"){
                openEditor();
                return;
              }
              if (state.doc.key && value === state.doc.key){
                if (state.docId) setCookie(`qb_key_${state.docId}`, "1");
                state.unlockedByKey = true;
                openEditor();
              } else {
                alert("Key が違うよ");
              }
            });
          }
          if (restartBtn) restartBtn.addEventListener("click", restartQuiz);
          return;
        }
        return renderQuestion();
      }
    }

    window.addEventListener("popstate", loadFromRoute);

    loadFromRoute();
  </script>
</body>
</html>
